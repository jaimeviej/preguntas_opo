const PREGUNTAS=[{n:101,texto:`En relación con la fisiopatología de la pancreatitis aguda, señale la afirmación FALSA:`,opts:{'A':`La activación intrapancreática de enzimas digestivas contribuye al daño tisular local y a la respuesta inflamatoria inicial.`,'B':`La liberación de mediadores inflamatorios desde el páncreas puede participar en el desarrollo de alteraciones sistémicas y fallo multiorgánico.`,'C':`En la pancreatitis aguda asociada a litiasis biliar, la obstrucción del sistema de conductos pancreáticos puede favorecer la activación enzimática.`,'D':`La necrosis pancreática constituye un requisito fisiopatológico previo para que se inicie la activación de las enzimas digestivas.`}},
{n:102,texto:`Tras la inserción de una sonda nasogástrica destinada a aspiración gástrica en un paciente adulto, ¿cuál de las siguientes actuaciones es la opción VERDADERA para identificar de forma correcta su colocación antes de utilizarla?`,opts:{'A':`Insuflar aire con una jeringa y auscultar el epigastrio en busca de borborigmos, como se ha hecho tradicionalmente.`,'B':`Comprobar que el paciente no presenta tos, disnea ni cambios en la saturación de oxígeno tras la inserción.`,'C':`Aspirar contenido a través de la sonda y valorar sus características junto con la medición del pH.`,'D':`Verificar que la longitud externa de la sonda coincide con la medida estimada previamente.`}},
{n:103,texto:`En un paciente portador de una ileostomía reciente, ¿cuál es la recomendación dietética CORRECTA durante las primeras cuatro semanas tras la cirugía para reducir el riesgo de obstrucción intestinal?`,opts:{'A':`Priorizar el consumo de frutas y verduras crudas bien masticadas desde el inicio para favorecer la motilidad intestinal.`,'B':`Consumir frutas y verduras en puré y seguir una dieta baja en residuos.`,'C':`Mantener una dieta sin restricciones específicas siempre que no aparezcan molestias abdominales.`,'D':`Introducir los alimentos ricos en fibra junto con un aumento de la ingesta hídrica.`}},
{n:104,texto:`Un paciente con resección extensa del duodeno presenta cansancio progresivo, palidez cutáneo-mucosa y glositis. ¿Qué alteración nutricional explica mejor este cuadro clínico?`,opts:{'A':`Déficit de vitamina B₁₂ por alteración de la absorción ileal.`,'B':`Déficit de hierro por alteración de su absorción intestinal.`,'C':`Déficit de vitamina D con alteración del metabolismo óseo.`,'D':`Déficit de ácido fólico secundario a malabsorción yeyunal distal.`}},
{n:105,texto:`¿Cuál de los siguientes medicamentos puede alterar los resultados de una prueba tiroidea?`,opts:{'A':`Amoxicilina.`,'B':`Amiodarona.`,'C':`Paracetamol.`,'D':`Metformina.`}},
{n:106,texto:`En relación con el metabolismo basal disminuido en el hipotiroidismo, ¿cuál de las siguientes combinaciones de signos clínicos es más coherente con el estado metabólico de estos pacientes?`,opts:{'A':`Pérdida de peso con aumento del apetito.`,'B':`Pérdida rápida de masa muscular con hiperreflexia generalizada.`,'C':`Bradicardia, gasto cardiaco disminuido y fatiga fácil al esfuerzo mínimo.`,'D':`Aumento del consumo de oxígeno en reposo y disnea por aumento del trabajo respiratorio.`}},
{n:107,texto:`¿Cuál de los siguientes valores cumple criterios diagnósticos de diabetes mellitus en una persona asintomática, siempre que se confirme en una segunda determinación?`,opts:{'A':`Glucemia plasmática en ayunas de 110 mg/dl tras 6 horas de ayuno.`,'B':`Hemoglobina A1c del 6,6 %.`,'C':`Glucemia plasmática a las 2 horas de una Prueba de Tolerncia Oral de la Glucosa de 180 mg/dl.`,'D':`Glucemia plasmática aleatoria de 180 mg/dl sin síntomas.`}},
{n:108,texto:`En las dietas para personas con diabetes mellitus, ¿cuál es el límite de calorías procedentes de grasas saturadas?`,opts:{'A':`Menos del 10 % de las calorías totales.`,'B':`Menos del 20 % de las calorías totales.`,'C':`Hasta el 30 % de las calorías totales.`,'D':`No existe un límite específico si se controla el colesterol total.`}},
{n:109,texto:`En relación con la fibra dietética en personas con diabetes mellitus, ¿cuál de las siguientes afirmaciones es CORRECTA?`,opts:{'A':`La fibra soluble acelera el vaciamiento gástrico y la absorción de la glucosa.`,'B':`El aumento de la fibra dietética incrementa la necesidad de insulina exógena.`,'C':`La relevancia clínica de la fibra dietética en el control glucémico es insignificante.`,'D':`Se recomienda una ingesta diaria mínima de 25 g de fibra.`}},
{n:110,texto:`¿Cuál de las siguientes insulinas se caracteriza por un inicio de acción de 10– 15 minutos, un pico máximo aproximado de 1 hora y una duración de 2 a 4 horas?`,opts:{'A':`Insulina lispro.`,'B':`Insulina regular.`,'C':`Insulina NPH.`,'D':`Insulina glargina.`}},
{n:111,texto:`¿Cuál de las siguientes características corresponde al fenómeno del alba como causa de hiperglucemia matutina?`,opts:{'A':`Hipoglucemia nocturna seguida de hiperglucemia de rebote al despertar.`,'B':`Glucemia normal hasta aproximadamente las 3:00 a. m., con aumento posterior.`,'C':`Incremento progresivo de la glucemia desde la hora de acostarse hasta las primeras horas de la mañana.`,'D':`Descenso de la glucemia nocturna por exceso de insulina vespertina.`}},
{n:112,texto:`Paciente con diabetes mellitus tipo 2 presenta glucemias en ayunas dentro de objetivos, pero picos repetidos de hiperglucemia posprandial tras las comidas. ¿Qué grupo farmacológico sería el más adecuado para actuar sobre este mecanismo?`,opts:{'A':`Biguanidas.`,'B':`Tiazolidinedionas.`,'C':`Inhibidores de la α-glucosidasa.`,'D':`Secretagogos de insulina.`}},
{n:113,texto:`Paciente de 72 años con diabetes mellitus tipo 2 tratado con insulina NPH por la tarde acude a urgencias tras presentar desorientación y dificultad para despertar durante la madrugada. A su llegada, la glucemia capilar es de 38 mg/dL. En relación con este caso, ¿cuál de las siguientes afirmaciones es VERDADERA?`,opts:{'A':`El cuadro clínico es compatible con hipoglucemia moderada, que puede tratarse exclusivamente con hidratos de carbono por vía oral.`,'B':`La causa más probable es el fenómeno del alba, caracterizado por hiperglucemia progresiva desde las 3:00 a. m.`,'C':`En este contexto, está indicada la administración de glucagón por vía intramuscular si el paciente no puede deglutir.`,'D':`Una vez corregida la glucemia y recuperado el nivel de conciencia, no es necesaria vigilancia posterior si el paciente se encuentra estable.`}},
{n:114,texto:`Paciente de 24 años con diabetes mellitus tipo 1 acude a urgencias por vómitos, dolor abdominal y respiración profunda y rápida. Presenta poliuria, polidipsia y aliento afrutado. La glucemia capilar es de 520 mg/dL y el pH arterial es de 7,18. En relación con este cuadro clínico, ¿cuál de las siguientes afirmaciones es VERDADERA?`,opts:{'A':`La cetoacidosis diabética se produce por un exceso de insulina que favorece la hipoglucemia y la alcalosis metabólica.`,'B':`En la cetoacidosis diabética, la administración de bicarbonato intravenoso es una medida de primera línea para corregir la acidosis metabólica`,'C':`La respiración de Kussmaul representa un mecanismo compensador frente a la acidosis metabólica producida por la acumulación de cuerpos cetónicos.`,'D':`Este cuadro clínico es más compatible con un síndrome hiperosmolar hiperglucémico, caracterizado por ausencia de acidosis y de cuerpos cetónicos.`}},
{n:115,texto:`En relación con las intervenciones de enfermería en el síndrome hiperosmolar hiperglucémico, ¿cuál de las siguientes intervenciones NO es correcta?`,opts:{'A':`Vigilar de forma estrecha el estado hídrico y el gasto urinario debido al alto riesgo de deshidratación grave.`,'B':`Administrar líquidos intravenosos y ajustar su composición según las cifras de sodio y la gravedad de la pérdida de volumen.`,'C':`Priorizar la corrección rápida de la hiperglucemia mediante insulina intravenosa para revertir la acidosis metabólica.`,'D':`Monitorizar con frecuencia los electrolitos séricos y el estado cardiovascular durante el tratamiento.`}},
{n:116,texto:`En la valoración y prevención del pie diabético en personas con diabetes, ¿cuál de las siguientes intervenciones es CORRECTA?`,opts:{'A':`Realizar una exploración completa de los pies al menos una vez al año, incluyendo la valoración de la sensibilidad protectora.`,'B':`Limitar la exploración del pie a los pacientes que refieren dolor o molestias.`,'C':`Utilizar el monofilamento de Semmes-Weinstein únicamente en presencia de úlceras visibles.`,'D':`Recomendar el corte curvo de las uñas para evitar la presión sobre el lecho ungueal.`}},
{n:117,texto:`Paciente de 68 años con diabetes mellitus tipo 2 desde hace 12 años acude a consulta de enfermería. No presenta lesiones visibles en los pies. En la exploración, no percibe el estímulo del monofilamento en zonas plantares de apoyo y se observan callosidades. Pulsos periféricos palpables. En relación con este caso, ¿cuál de las siguientes actuaciones es la más adecuada?`,opts:{'A':`Clasificar al paciente como de bajo riesgo al no presentar úlceras ni signos de infección activa.`,'B':`Mantener una revisión anual del pie, sin aumentar la frecuencia, al conservar la integridad cutánea.`,'C':`Derivar al podólogo para el abordaje de las zonas de presión y prevenir la aparición de úlceras.`,'D':`Iniciar tratamiento antibiótico profiláctico para evitar la infección de las callosidades.`}},
{n:118,texto:`En relación con la regulación del flujo sanguíneo cerebral, ¿cuál de las siguientes afirmaciones es FALSA?`,opts:{'A':`La autorregulación cerebral permite mantener un flujo sanguíneo cerebral relativamente constante pese a variaciones de la presión arterial sistémica.`,'B':`El flujo sanguíneo cerebral regional puede variar de forma importante en respuesta a cambios metabólicos locales.`,'C':`El aumento de la presión parcial de dióxido de carbono en sangre produce vasodilatación cerebral y aumento del flujo sanguíneo cerebral.`,'D':`Cuando la presión arterial media desciende por debajo del límite inferior de autorregulación, el flujo sanguíneo cerebral pasa a depender principalmente de los mecanismos metabólicos locales.`}},
{n:119,texto:`Paciente de 70 años es trasladado a urgencias tras un inicio brusco de síntomas neurológicos. La tomografía computarizada craneal confirma un ictus hemorrágico. En relación con este diagnóstico, ¿cuál de los siguientes signos o síntomas NO se corresponde habitualmente con un ictus hemorrágico?`,opts:{'A':`Deterioro progresivo del nivel de conciencia.`,'B':`Vómitos secundarios al aumento de la presión intracraneal`,'C':`Cefalea intensa de inicio súbito.`,'D':`Hipotensión arterial mantenida.`}},
{n:120,texto:`En relación con la cascada isquémica que se produce en el ictus cerebrovascular isquémico, ¿cuál de las siguientes afirmaciones es FALSA?`,opts:{'A':`La disminución del flujo sanguíneo cerebral obliga a las neuronas a recurrir a la respiración anaerobia, con producción de ácido láctico y descenso del pH.`,'B':`El fallo en la producción de ATP provoca alteraciones en las bombas de membrana y desequilibrio iónico celular.`,'C':`La penumbra isquémica corresponde a una zona de tejido cerebral irrecuperable que evoluciona inevitablemente a necrosis.`,'D':`El aumento del calcio intracelular y la liberación de glutamato activan vías que conducen a la lesión y muerte celular.`}},
{n:121,texto:`En el contexto de un ictus, pueden verse afectadas diversas funciones cerebrales. ¿Cuál de las siguientes definiciones es CORRECTA?`,opts:{'A':`Hemiparesia: Parálisis completa de la cara, el brazo y la pierna en un mismo lado del cuerpo (por una lesión en el hemisferio contrario)`,'B':`Disartria: alteración del lenguaje que impide comprender o expresar palabras.`,'C':`Apraxia: pérdida de la coordinación y del equilibrio que se manifiesta como marcha inestable y movimientos imprecisos.`,'D':`Hemianopsia homónima: pérdida de la misma mitad del campo visual (derecha/izquierda) en ambos ojos.`}},
{n:122,texto:`En relación con el envejecimiento cognitivo normal, ¿cuál de las siguientes afirmaciones es CORRECTA?`,opts:{'A':`Con la edad, la memoria a corto plazo se deteriora de forma marcada incluso cuando no se exige una alta demanda de procesamiento.`,'B':`Las personas mayores muestran un deterioro similar en tareas de recuerdo libre y en tareas de reconocimiento.`,'C':`El envejecimiento cognitivo normal se asocia a una mayor afectación de los procesos de recuperación de la información que de los procesos de codificación.`,'D':`El envejecimiento cognitivo normal implica una pérdida generalizada de la capacidad intelectual y del funcionamiento cognitivo global.`}},
{n:123,texto:`En relación con los principales síndromes de demencia progresiva, ¿cuál de las siguientes afirmaciones es CORRECTA?`,opts:{'A':`La enfermedad de Alzheimer se caracteriza por una atrofia cortical predominante en los lóbulos parietal y temporal.`,'B':`La demencia frontotemporal se manifiesta inicialmente por un deterioro predominante de la memoria episódica, similar al observado en la enfermedad de Alzheimer.`,'C':`La demencia vascular cursa de forma uniforme y progresiva, sin relación con eventos cerebrovasculares focales.`,'D':`La demencia con cuerpos de Lewy se asocia a la acumulación predominante de amiloide β como principal mecanismo fisiopatológico.`}},
{n:124,texto:`En la valoración neurológica de un paciente con sospecha de ictus, se emplean distintas escalas clínicas. ¿Cuál de los siguientes ítems forma parte de la Escala NIHSS?`,opts:{'A':`Respuesta motora a estímulos dolorosos.`,'B':`Nivel de independencia funcional para las actividades básicas de la vida diaria.`,'C':`Evaluación de la desviación de la mirada conjugada.`,'D':`Valoración de la orientación temporal y espacial mediante preguntas estructuradas.`}},
{n:125,texto:`En relación con las crisis convulsivas, la epilepsia y el estado epiléptico, ¿cuál de las siguientes afirmaciones es CORRECTA?`,opts:{'A':`El estado epiléptico puede incluir convulsiones clínicas o eléctricas continuas que persisten durante al menos 30 minutos, incluso sin recuperación completa del estado de conciencia entre episodios.`,'B':`La epilepsia se diagnostica cuando una convulsión generalizada se acompaña de alteración del estado de conciencia y actividad motora bilateral.`,'C':`Las convulsiones generalizadas se originan de forma característica en un hemisferio cerebral y posteriormente se propagan al resto del encéfalo.`,'D':`Las convulsiones secundarias a causas metabólicas agudas se clasifican como epilepsia cuando se repiten durante un mismo episodio clínico.`}},
{n:126,texto:`Durante la exploración neurológica, una enfermera solicita al paciente que cierre los ojos con fuerza, muestre los dientes y eleve las cejas para valorar la simetría facial. ¿Qué nervio craneal se está explorando?`,opts:{'A':`V par craneal.`,'B':`VII par craneal.`,'C':`III par craneal.`,'D':`XI par craneal.`}},
{n:127,texto:`Una mujer de 32 años, diagnosticada de esclerosis múltiple hace 8 años, presentó inicialmente episodios de visión borrosa y debilidad en extremidades con recuperación casi completa tras cada brote. Desde hace aproximadamente 2 años, refiere un empeoramiento neurológico progresivo y continuo, con aumento de la dificultad para la marcha y la fatiga, independientemente de la aparición de nuevos brotes. Según esta evolución clínica, ¿cuál es el tipo de esclerosis múltiple más probable?`,opts:{'A':`Esclerosis múltiple progresiva primaria.`,'B':`Esclerosis múltiple remitente-recurrente.`,'C':`Esclerosis múltiple progresiva secundaria.`,'D':`Esclerosis múltiple progresiva recurrente.`}},

{n:130,texto:`Durante la valoración neurológica de un paciente ingresado por traumatismo craneoencefálico, la enfermera aplica la escala de coma de Glasgow. Respecto a esta escala, ¿cuál de las siguientes afirmaciones es CORRECTA?`,opts:{'A':`La escala de coma de Glasgow evalúa exclusivamente el nivel de conciencia mediante la valoración de las pupilas, la respuesta verbal y motora.`,'B':`La mejor respuesta motora tiene un rango de puntuación de "1" a "6", siendo “obedece órdenes” la puntuación más alta.`,'C':`Una puntuación total de "0" indica un estado de coma profundo con ausencia de respuesta a estímulos.`,'D':`La escala de coma de Glasgow incluye la valoración de reflejos del tronco encefálico como parte de su puntuación total.`}},
{n:131,texto:`En relación con los cuidados de enfermería y las recomendaciones al paciente tras la colocación de una escayola de yeso húmeda, señale la opción INCORRECTA:`,opts:{'A':`Debe evitarse la carga de peso sobre la escayola hasta que esté completamente seca, lo cual suele ocurrir en un período aproximado de 48–72 horas.`,'B':`Se debe informar al paciente de que, durante el proceso de fraguado y secado del yeso, puede experimentar sensación de calor local.`,'C':`Se recomienda el empleo de medios artificiales (por ejemplo, secador de pelo o aire caliente) para acelerar el secado del yeso y prevenir deformidades.`,'D':`Tras su colocación, la extremidad debe mantenerse elevada por encima del nivel del corazón, apoyando la escayola sobre almohadas para favorecer el retorno venoso.`}},

{n:133,texto:`En el contexto de un paciente adulto con fractura abierta de tibia tratada mediante fijación externa, durante la valoración de enfermería se observa secreción en la zona de inserción de las agujas del fijador. En relación con los cuidados de enfermería y el mantenimiento del aparato de fijación externa, especialmente en los puntos de entrada de las agujas, señale la afirmación correcta:`,opts:{'A':`La presencia de drenaje graso en el trayecto de la aguja debe interpretarse siempre como un signo de infección activa y requiere antibioterapia inmediata.`,'B':`El drenaje graso que puede observarse en la superficie de contacto entre el fijador y el tejido adiposo, especialmente con el movimiento del tejido alrededor de la aguja, no debe confundirse con exudado purulento.`,'C':`La aparición de cualquier tipo de exudado en la zona de inserción de las agujas es indicación absoluta de retirada inmediata del aparato de fijación externa.`,'D':`La presencia de exudado en la zona de inserción de las agujas indica siempre una complicación infecciosa, por lo que está indicado realizar curas con antisépticos varias veces al día.`}},
{n:134,texto:`En relación con la movilización y posicionamiento del paciente en el postoperatorio inmediato tras una artroplastia total de rodilla, señale la afirmación correcta:`,opts:{'A':`Se debe ayudar al paciente a adoptar una posición cómoda, pudiendo realizar cambios posturales y ajustar la cabecera de la cama, ya que el riesgo de desplazamiento de la prótesis es bajo.`,'B':`El dispositivo de movimiento pasivo continuo (CPM) debe iniciarse de forma estándar a 60º y aumentar rápidamente hasta alcanzar 120º de flexión en las primeras 48 horas.`,'C':`Para facilitar la adaptación al CPM, se recomienda mantener la rodilla en flexión mantenida con una almohada bajo la articulación entre sesiones.`,'D':`El CPM debe iniciarse únicamente cuando se retire el drenaje y el paciente presente control completo del dolor sin analgesia pautada.`}},
{n:135,texto:`En relación con la clasificación de los esguinces según el grado de lesión ligamentosa, señale la afirmación correcta:`,opts:{'A':`El esguince de primer grado se caracteriza por el desgarro de algunas fibras del ligamento y la posible aparición de un hematoma leve y localizado, acompañado de dolor leve y edema.`,'B':`El esguince de primer grado implica un desgarro parcial del ligamento y se asocia típicamente a inestabilidad articular y pérdida parcial de la función.`,'C':`El esguince de segundo grado se produce cuando existe rotura completa del ligamento, con dolor intenso, edema máximo y movimiento articular anómalo.`,'D':`El esguince de tercer grado se caracteriza por la distensión leve del ligamento, con edema mínimo y ausencia de limitación funcional significativa.`}},
{n:136,texto:`En relación con el acrónimo PRICE, utilizado en el abordaje inicial de lesiones musculoesqueléticas agudas (p. ej., esguinces), ¿cuál de las siguientes opciones indica correctamente el significado de sus letras?`,opts:{'A':`Protección – Reposicionamiento – Inmovilización – Compresión – Ejercicio.`,'B':`Protección – Reposo – Ice (hielo) – Compresión – Elevación.`,'C':`Prevención – Rehabilitación – Inmovilización – Control del dolor – Elevación.`,'D':`Protección – Reducción de la inflamación – Inmovilización – Compresión – Estiramientos.`}},
{n:137,texto:`En relación con la osteoporosis y sus manifestaciones clínicas, señale la afirmación INCORRECTA:`,opts:{'A':`La osteoporosis se caracteriza por la disminución de la masa ósea, deterioro de la matriz y reducción de la fortaleza arquitectónica del hueso.`,'B':`En la osteoporosis el recambio óseo se altera, de modo que la resorción ósea mantenida por los osteoblastos es mayor que la formación ósea llevada a cabo por los osteoclastos, produciendo una menor masa ósea total.`,'C':`Como consecuencia, los huesos se tornan progresivamente más porosos, quebradizos y frágiles, pudiendo fracturarse ante esfuerzos que no afectarían a un hueso normal.`,'D':`Las fracturas por fragilidad asociadas a osteoporosis afectan con frecuencia a la columna torácica y lumbar, cadera y muñeca, pudiendo constituir la primera manifestación clínica.`}},
{n:138,texto:`En relación con los factores de riesgo para el desarrollo de osteoporosis, señale la afirmación INCORRECTA:`,opts:{'A':`Índice de masa corporal alto.`,'B':`Alteraciones de malabsorción (p. ej., enfermedad celíaca o cirugía bariátrica).`,'C':`Tratamiento con corticoesteroides sistémicos durante más de 3 meses.`,'D':`Hombres mayores de 60 años.`}},
{n:139,texto:`Respecto al vendaje compresivo para reducción y modelado del muñón tras una amputación de extremidad inferior, señale la afirmación INCORRECTA:`,opts:{'A':`Tras el lavado con agua y jabón, conviene asegurar un secado completo antes de vendar.`,'B':`El objetivo es favorecer un muñón cónico, especialmente en amputación por encima de la rodilla.`,'C':`El vendaje debe generar un gradiente de presión, siendo mayor en el extremo distal.`,'D':`La venda debe aplicarse con vueltas circulares horizontales, evitando los recorridos diagonales, para asegurar una presión uniforme.`}},
{n:140,texto:`En relación con la clasificación de las fracturas abiertas, señale la afirmación correcta:`,opts:{'A':`El tipo II se caracteriza por una herida grande con avulsión extensa y riesgo elevado de amputación traumática.`,'B':`El tipo I corresponde a una herida contaminada de más de 1 cm y con daño extenso de tejidos blandos.`,'C':`El tipo III se asocia a herida muy contaminada y extenso daño de tejidos blandos.`,'D':`El tipo I se define por una herida limpia de más de 2 cm y sin afectación de tejidos blandos.`}},

let estado={},orden=PREGUNTAS.map(p=>p.n),modoFallos=false;
function cargarEstado(){try{const r=localStorage.getItem(STORAGE_KEY);if(r)estado=JSON.parse(r);}catch(e){estado={};}}
function guardarEstado(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(estado));}catch(e){}}
function calcularStats(){let ok=0,fail=0;PREGUNTAS.forEach(p=>{if(estado[p.n]){if(estado[p.n].correcto)ok++;else fail++;}});return{ok,fail,total:PREGUNTAS.length};}
function actualizarHeader(){const s=calcularStats();const r=s.ok+s.fail;document.getElementById('barraFill').style.width=(r/s.total*100)+'%';document.getElementById('progresoTexto').textContent=r+' / '+s.total;document.getElementById('statOk').textContent=s.ok+' correctas';document.getElementById('statFail').textContent=s.fail+' incorrectas';}
function renderizar(){
  const c=document.getElementById('contenedor');c.innerHTML='';
  const s=calcularStats();
  if(s.ok+s.fail===s.total&&!modoFallos){const pct=Math.round(s.ok/s.total*100);const b=document.createElement('div');b.className='banner-completado';b.innerHTML=`<h2>🎉 ¡Lote completado!</h2><div class="puntuacion">${s.ok}/${s.total}</div><p>${pct}% de acierto · Preguntas 101–150 · Enfermería</p>`;c.appendChild(b);}
  const pm=modoFallos?PREGUNTAS.filter(p=>estado[p.n]&&!estado[p.n].correcto):orden.map(n=>PREGUNTAS.find(p=>p.n===n));
  if(modoFallos&&pm.length===0){c.innerHTML+='<div style="text-align:center;padding:40px;color:var(--gris);font-family:Syne,sans-serif;">¡No hay preguntas falladas! 🎯</div>';return;}
  pm.forEach(pregunta=>{
    if(!pregunta)return;
    const resp=RESPUESTAS[pregunta.n];const est=estado[pregunta.n];const resuelta=!!est;
    const card=document.createElement('div');card.className='pregunta-card'+(resuelta?(' resuelta'+(est.correcto?'':' fallo')):'');card.id='p'+pregunta.n;
    let html=`<div class="pregunta-num">Pregunta ${pregunta.n}</div><div class="pregunta-texto">${pregunta.n}.- ${pregunta.texto}</div><div class="opciones">`;
    Object.entries(pregunta.opts).forEach(([letra,texto])=>{
      let cls='opcion-btn';let disabled=resuelta?'disabled':'';
      if(resuelta){if(letra===resp){cls+=est.elegida===letra?' correcta':' correcta-marcada';}else if(letra===est.elegida&&!est.correcto){cls+=' incorrecta';}}
      html+=`<button class="${cls}" ${disabled} onclick="responder(${pregunta.n},'${letra}')"><span class="letra">${letra})</span>${texto}</button>`;
    });
    html+=`</div>`;
    if(resuelta){html+=est.correcto?`<div class="resultado-badge badge-ok">✓ Correcto</div>`:`<div class="resultado-badge badge-error">✗ Incorrecto — Respuesta: ${resp}</div>`;}
    card.innerHTML=html;c.appendChild(card);
  });
}
function responder(num,letra){if(estado[num])return;const resp=RESPUESTAS[num];estado[num]={elegida:letra,correcto:letra===resp};guardarEstado();actualizarHeader();renderizar();setTimeout(()=>{const el=document.getElementById('p'+num);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});},100);}
function resetearTodo(){if(!confirm('¿Seguro que quieres reiniciar todo el progreso de este lote?'))return;estado={};guardarEstado();modoFallos=false;orden=PREGUNTAS.map(p=>p.n);actualizarHeader();renderizar();}
function mostrarSoloFallos(){modoFallos=!modoFallos;renderizar();}
function ordenAleatorio(){modoFallos=false;orden=[...PREGUNTAS.map(p=>p.n)].sort(()=>Math.random()-0.5);renderizar();window.scrollTo({top:0,behavior:'smooth'});}
cargarEstado();actualizarHeader();renderizar();
</script>
