const PREGUNTAS=[{n:301,texto:`En relación con el marco normativo estatal vinculado a la prevención, tratamiento y mitigación de las adicciones en el Estado español, indique cuál de las siguientes normas NO está directamente relacionada con este ámbito.`,opts:{'A':`Ley 14/1995, de 25 de abril, General de Sanidad.`,'B':`Ley 28/2005, de 26 de diciembre, de medidas sanitarias frente al tabaquismo.`,'C':`Ley 33/2011, de 4 de octubre, General de Salud Pública.`,'D':`Real Decreto 579/2017, de 9 de junio, por el que se regulan determinados aspectos relativos a la fabricación, presentación y comercialización de los productos del tabaco y los productos relacionados.`}},
{n:302,texto:`Según el VIII Plan sobre Adicciones de Euskadi, el plan se alinea de manera explícita con varios Objetivos de Desarrollo Sostenible (ODS). Indique cuál de los siguientes ODS NO se encuentra alineado de forma directa con dicho plan:`,opts:{'A':`Objetivo 5: Igualdad de género.`,'B':`Objetivo 8: Trabajo decente y crecimiento económico.`,'C':`Objetivo 10: Reducción de las desigualdades.`,'D':`Objetivo 17: Alianzas para lograr los objetivos.`}},
{n:303,texto:`Según los datos recogidos en el VIII Plan sobre Adicciones de Euskadi 2023- 2027, en relación con la evolución y características del consumo de tabaco y cigarrillos electrónicos, ¿cuál de las siguientes afirmaciones es INCORRECTA?`,opts:{'A':`Cerca de dos tercios de la población fumadora habitual consume más de medio paquete diario, lo que refleja una intensidad de consumo elevada pese a la tendencia general al descenso.`,'B':`Aproximadamente un 5 % de las personas fumadoras declara consumir más de un paquete de tabaco al día, concentrándose este patrón en los consumos más intensivos.`,'C':`En la población joven se observa una tendencia ascendente en el uso de cigarrillos electrónicos, con alrededor del 15 % del alumnado que ha fumado o utilizado alguno al menos una vez.`,'D':`La edad de inicio en el consumo de tabaco, se mantiene más o menos estable alrededor de los 15 años.`}},
{n:304,texto:`Según los datos del VIII Plan sobre Adicciones de Euskadi 2023-2027, en relación con el consumo de alcohol, señale la opción que describe de forma MÁS AJUSTADA la situación epidemiológica actual en Euskadi:`,opts:{'A':`La mayor prevalencia de consumo habitual se concentra en la población adolescente (15-19 años), con diferencias marcadas entre sexos.`,'B':`Más del 20 % de la población reconoce haberse emborrachado entre 1 y 12 veces en el último año, siendo este patrón más frecuente en mujeres jóvenes de 15-24 años.`,'C':`La edad media de inicio del consumo de alcohol ha descendido progresivamente desde 2004 hasta 2018, situándose entre los 16 y 17 años.`,'D':`El consumo habitual de alcohol es significativamente mayor en mujeres que en hombres en todos los grupos de edad adulta.`}},
{n:305,texto:`Respecto al consumo experimental de cocaína, anfetaminas y otras drogas estimulantes asociadas a contextos de ocio en Euskadi, señale la opción CORRECTA:`,opts:{'A':`El inicio del consumo se asocia principalmente a una alta percepción de riesgo y a contextos de exclusión social.`,'B':`El perfil de las personas consumidoras recientes es mayoritariamente femenino, menor de 25 años y con bajo nivel socioeconómico.`,'C':`El consumo reciente se relaciona con el consumo de cannabis, la cercanía a personas consumidoras y el consumo diario de tabaco, junto con una baja percepción de riesgo.`,'D':`La edad de inicio ha descendido de forma significativa en la última década y es más temprana en los hombres.`}},
{n:306,texto:`En relación con el juego con dinero y el juego problemático en Euskadi, según los datos disponibles, ¿cuál de las siguientes afirmaciones es CORRECTA?`,opts:{'A':`Más del 70% de la población jugó con dinero en el último año, con porcentajes similares entre hombres y mujeres.`,'B':`El juego problemático afecta a porcentajes similares de hombres y mujeres, con una prevalencia patológica cercana al 5%.`,'C':`El juego con dinero es más frecuente en mujeres que en hombres y se asocia a menor gasto medio.`,'D':`La mayoría de las personas jóvenes se inicia en el juego de forma individual y en edad adulta.`}},
{n:307,texto:`En relación con el uso de videojuegos y tecnologías digitales entre adolescentes en Euskadi, según los datos más recientes disponibles, ¿cuál de las siguientes afirmaciones es CORRECTA?`,opts:{'A':`El 10% de los adolescentes refiere haber recibido un mensaje de contenido sexual.`,'B':`Desde la aparición del Smartphone el uso de videojuegos es marginal, ya que más de la mitad de los adolescentes declara no jugar nunca.`,'C':`El riesgo principal asociado al uso de tecnologías digitales es el ciberacoso, con una prevalencia superior al 30%.`}},
{n:308,texto:`Según la evidencia recogida en el VIII Plan sobre Adicciones de Euskadi, ¿cuál de las siguientes intervenciones en el ámbito comunitario presenta el MAYOR nivel de eficacia?`,opts:{'A':`Campañas de comunicación en medios tradicionales.`,'B':`Intervenciones breves o entrevistas motivacionales.`,'C':`Mentoría o intervención de pares.`,'D':`Intervenciones con mujeres embarazadas en la comunidad.`}},
{n:309,texto:`La Organización Mundial de la salud, cuenta con un marco de trabajo de categorías clínicas de clasificación y fases de afección por VIH para adultos y mayores de 15 años. Corresponde a la fase clínica 4:`,opts:{'A':`Recuento de linfocitos CD4 (>500 células/μl).`,'B':`Individuos con herpes zóster, pérdida ponderal moderada inexplicable (<10%del peso corporal asumido) o queilitis angular.`,'C':`Individuos con síndrome de desgaste por VIH, neumonía por Pneumocystis jiroveci, neumonía bacteriana recurrente, el herpes simple, la tuberculosis extrapulmonar o la candidiasis esofágica.`,'D':`Individuos con diarrea crónica inexplicable con duración superior a un mes, la pérdida ponderal intensa inexplicable (>10% del peso corporal asumido) o la fiebre persistente inexplicable con duración mayor de un mes (>37,6 °C).`}},
{n:310,texto:`Desde el punto de vista enfermero, el sida es evidente cuando una persona presenta:`,opts:{'A':`Conteo de células CD4+ inferior a 200 células/μl.`,'B':`Padece alguna enfermedad definitoria de sida.`,'C':`a) y b) son incorrectas.`,'D':`a) y b) son correctas.`}},
{n:311,texto:`¿Cuál de las siguientes infecciones oportunistas es la causa más frecuente de muerte en personas con VIH?`,opts:{'A':`Mycobacterium tuberculosis.`,'B':`Neumonía por Pneumocystis jirovecii.`,'C':`Mycobacterium avium-intracellulare.`,'D':`Bartonelosis.`}},
{n:312,texto:`Una mujer de 29 años acude a su primera consulta con 10 semanas de embarazo. Se la ha realizado un aprueba con resultado de VIH positivo. ¿Qué debe hacer para disminuir el riesgo de transmisión de VIH a su hijo/a?`,opts:{'A':`Prepararse para la lactancia materna, ya que es un factor de protección.`,'B':`Iniciar inmediatamente el tratamiento antirretroviral con efavirenz.`,'C':`Iniciar inmediatamente el tratamiento antirretroviral con zidovudina.`,'D':`Esperar al momento de trabajo del parto para iniciar el tratamiento antirretroviral.`}},
{n:313,texto:`Entre las causas de resultado negativo falso en el test de ELISA para VIH, esta:`,opts:{'A':`Trastornos hematológicos malignos.`,'B':`Tratamiento inmunosupresor.`,'C':`Trastornos autoinmunitarios.`,'D':`Transferencia pasiva de anticuerpos contra el VIH (madre a hijo).`}},
{n:314,texto:`La mejor alternativa para evitar infecciones por VIH y otras enfermedades de transmisión sexual es:`,opts:{'A':`Profilaxis preexposición (PrEP) para el VIH.`,'B':`La abstinencia y las relaciones monógamas entre personas sin infección.`,'C':`Uso sistemático y correcto de preservativos (masculinos o femeninos).`,'D':`Realización periódica de pruebas de VIH y otras ETS.`}},
{n:315,texto:`¿Qué intervención enfermera es fundamental para prevenir infecciones oportunistas en personas con VIH?`,opts:{'A':`Vacunación antineumocócica una vez, tan pronto como sea posible, después del diagnóstico de la infección por VIH, y luego cada 5 años.`,'B':`Vacunación contra la influenza debe aplicarse cada 2 años.`,'C':`Vacunación con virus vivos anualmente.`,'D':`Vacunación contra sarampión, parotiditis y rubeola en personas asintomáticas y conteos de células CD4+ superiores a 200 células/μl.`}},
{n:316,texto:`¿Qué son los factores de virulencia?`,opts:{'A':`Son los mecanismos de defensa del huésped que se activan frente a la infección para limitar la proliferación del microorganismo.`,'B':`Son sustancias o productos generados por los agentes infecciosos que potencian su capacidad para producir enfermedad.`,'C':`Son sustancias producidas por el organismo humano para neutralizar toxinas bacterianas.`,'D':`Son los factores ambientales que favorecen la transmisión de los microorganismos entre individuos.`}},
{n:317,texto:`Es una inmunoglobulina secretora y su función principal es la inmunidad local en las superficies mucosas:`,opts:{'A':`IgG.`,'B':`IgM.`,'C':`IgD.`,'D':`IgA.`}},
{n:318,texto:`El microorganismo aerobio que coloniza el intestino grueso con mayor frecuencia provocando enfermedades diarreicas es:`,opts:{'A':`Escherichia coli.`,'B':`Shigella.`,'C':`Salmonella.`,'D':`Campylobacter`}},
{n:319,texto:`Usted es parte del personal de enfermería que atiende a un varón de 75 años con múltiples afecciones en su domicilio. ¿Qué información debe proporcionar para prevenir el riesgo de infección al paciente, su familia y su cuidador?`,opts:{'A':`Asegurar de que los platos y vasos se laven con agua fria para que sean seguros de utilizar.`,'B':`Las sábanas y ropa del paciente, deben lavarse con ciclos programados en 30º.`,'C':`Establecer barreras razonables para evitar la transmisión de infecciones.`,'D':`Cocinar todos los alimentos por completo y almacenar lo a fruta y verdura separados de los otros grupos de alimentos.`}},
{n:320,texto:`¿Cuál es el periodo de incubación del virus del Ébola?`,opts:{'A':`2-7 días.`,'B':`2-12 días.`,'C':`2-21 días`,'D':`24-72h`}},
{n:321,texto:`En el contexto de las precauciones de aislamiento, según el Manual INOZ, ¿en cuál de las siguientes situaciones está más indicada la habitación individual como medida prioritaria para prevenir la transmisión por contacto directo o indirecto?`,opts:{'A':`En pacientes infectados por el mismo microorganismo.`,'B':`En pacientes con microorganismos epidemiológicamente importantes o de alta transmisibilidad, la habitación individual es prescindible si el paciente colabora correctamente con las medidas.`,'C':`En pacientes fuente con hábitos higiénicos pobres, que contaminan el medio ambiente o en quienes no puede esperarse colaboración en el mantenimiento de las medidas.`,'D':`En pacientes con transmisión por gotas, dado que se requieren medidas estructurales específicas.`}},
{n:322,texto:`Durante una aspiración de secreciones orofaríngeas, ¿qué equipo de protección está indicado si se prevé la posibilidad de generar salpicaduras o sprays?`,opts:{'A':`Doble mascarilla y protección ocular.`,'B':`Guantes y mascarilla.`,'C':`Bata y mascarilla.`,'D':`Mascarilla y gafas o protector facial.`}},
{n:323,texto:`Según el Manual INOZ, respecto al manejo de lencería, utensilios de comida y limpieza ambiental en pacientes con Precauciones Basadas en la Transmisión, ¿cuál de las siguientes afirmaciones es correcta?`,opts:{'A':`Aunque la lencería pueda estar contaminada, el riesgo de transmisión se evita si se maneja, transporta y lava adecuadamente; el lavado de los utensilios con agua caliente y detergentes usados en los lavaplatos de los hospitales es suficiente.`,'B':`En habitaciones con Precauciones Basadas en la Transmisión debe realizarse siempre una limpieza distinta a la de pacientes con Precauciones Estándar, usando productos desinfectantes específicos para todos los microorganismos.`,'C':`La lencería usada debe esterilizarse antes de su transporte y los utensilios del paciente en aislamiento deben ser exclusivamente desechables.`,'D':`La lencería utilizada requiere un manejo cuidadoso para evitar contaminación y los platos/utensilios del paciente deben eliminarse como residuos biosanitarios.`}},
{n:324,texto:`La habitación de todo paciente con infección respiratoria de transmisión aérea, como tuberculosis o sarampión, deberá reunir las siguientes características:`,opts:{'A':`Habitación individual con vestíbulo, presión positiva respecto a áreas adyacentes y un mínimo de 8 renovaciones de aire a la hora.`,'B':`Habitación individual sin vestíbulo con extracciones de aire, filtros de alta eficacia (HEPA) y presión positiva respecto a áreas adyacentes.`,'C':`Habitación individual con vestíbulo, extracciones de aire, filtros de alta eficacia (HEPA) y un mínimo de 8 renovaciones de aire a la hora.`,'D':`Habitación individual con extracciones de aire, filtros de alta eficacia (HEPA) y un mínimo de 6 renovaciones de aire a la hora.`}},
{n:325,texto:`Según la Guía-Manual de Uso Adecuado de los Guantes Sanitarios de Osakidetza, ¿en cuál de las siguientes situaciones NO es obligatorio el uso de guantes, siendo suficiente la higiene de manos?`,opts:{'A':`Realización de curas de heridas abiertas.`,'B':`Obtención de muestras sanguíneas por venopunción.`,'C':`Ajuste de la fluidoterapia intravenosa.`,'D':`Manipulación de material contaminado con fluidos biológicos.`}},
{n:326,texto:`En relación con el agente infeccioso dentro de la cadena epidemiológica, ¿qué característica se define como la capacidad del microorganismo para producir enfermedad clínica una vez que el huésped ha sido infectado?`,opts:{'A':`Infectividad.`,'B':`Transmisibilidad.`,'C':`Patogenicidad.`,'D':`Virulencia.`}},
{n:327,texto:`En relación con el concepto de inmunidad de grupo o inmunidad de rebaño, señale la afirmación correcta:`,opts:{'A':`Se alcanza únicamente cuando el 100% de la población está inmunizada frente a una enfermedad infecciosa.`,'B':`Impide la propagación epidémica gracias a un nivel elevado, aunque incompleto, de inmunización poblacional.`,'C':`Consiste en la protección individual exclusiva de las personas vacunadas.`,'D':`Solo es efectiva en enfermedades de transmisión no respiratoria.`}},
{n:328,texto:`En relación con las medidas no farmacológicas para reducir el riesgo de transmisión del SARS-CoV-2 en la comunidad, señale la opción INCORRECTA:`,opts:{'A':`Mantener una distancia mínima aproximada de 2 metros contribuye a disminuir el riesgo de contagio.`,'B':`Evitar espacios cerrados y concurridos reduce la probabilidad de transmisión aérea.`,'C':`Los entornos ruidosos, donde es necesario elevar la voz, favorecen la emisión de aerosoles infecciosos.`,'D':`En espacios cerrados, el uso adecuado de mascarilla permite flexibilizar el mantenimiento estricto de la distancia interpersonal cuando existe una ventilación adecuada.`}},
{n:329,texto:`Los factores de virulencia son sustancias o productos generados por los agentes infecciosos que potencian su capacidad para producir enfermedad. En relación con los factores de virulencia, señale cuál de las siguientes opciones NO constituye uno de sus principios fundamentales:`,opts:{'A':`Factores de resistencia antimicrobiana.`,'B':`Factores de invasión.`,'C':`Factores de adhesión.`,'D':`Factores de evasión.`}},

{n:332,texto:`Durante la actuación de la enfermera en el área quirúrgica, el mantenimiento del campo estéril es fundamental para prevenir infecciones del sitio quirúrgico. En relación con los principios de asepsia quirúrgica, señale la opción INCORRECTA:`,opts:{'A':`Utilizar únicamente material esterilizado en contacto con la herida quirúrgica.`,'B':`Considerar estériles las mangas de la bata quirúrgica desde aproximadamente 5 cm por encima del codo hasta el puño.`,'C':`Mantener el campo estéril permanentemente dentro del campo visual.`,'D':`Mantener una distancia de al menos 15 cm respecto al campo estéril.`}},

{n:338,texto:`Señale la respuesta correcta en relación con el shock y su fisiopatología inicial.`,opts:{'A':`El shock se caracteriza por una perfusión tisular adecuada, con aumento del aporte de oxígeno a los tejidos para compensar la agresión inicial.`,'B':`En la fase inicial del shock se produce una disminución del metabolismo celular que protege a los órganos frente al daño tisular.`,'C':`La alteración principal en el shock es exclusivamente la disminución de la presión arterial, sin repercusión celular significativa en fases precoces.`,'D':`El shock es un estado de hipoperfusión tisular generalizada que conduce a hipoxia celular, metabolismo anaerobio y acidosis metabólica.`}},
{n:339,texto:`Señale la respuesta correcta en relación con la persona en situación de hipotermia.`,opts:{'A':`En la hipotermia moderada y grave pueden aparecer bradicardia, hipotensión, hipoxemia y disminución del nivel de conciencia.`,'B':`La hipotermia se define como una temperatura corporal central inferior a 36ºC y cursa inicialmente con vasodilatación periférica y disminución de la sudoración.`,'C':`Los métodos de recalentamiento activo interno se usan para la hipotermia leve a moderada e incluyen derivación cardiopulmonar, administración de líquidos intravenosos calientes y oxígeno caliente humectado, entre otros.`,'D':`La hipotermia se asocia habitualmente a alteraciones en el ritmo cardíaco, en especial a la Actividad Eléctrica Sin Pulso.`}},

{n:341,texto:`¿Cuáles son signos y síntomas específicos que pueden indicar riesgo de suicidio potencial en una persona atendida en el ámbito sanitario?`,opts:{'A':`Expresión de ansiedad leve y preocupación situacional transitoria.`,'B':`Presencia de insomnio y llanto reactivo ante acontecimientos vitales estresantes recientes.`,'C':`Conducta retraída acompañada de tristeza persistente, sin verbalización de ideas relacionadas con la muerte.`,'D':`Pérdida de un padre a temprana edad y antecedentes familiares de suicidio.`}},
{n:342,texto:`¿Cuál de las siguientes afirmaciones es correcta en relación con el infarto agudo de miocardio (IAM) y su manejo inicial?`,opts:{'A':`Desde el punto de vista fisiopatológico, el IAM se produce fundamentalmente por un espasmo coronario reversible sin necrosis miocárdica asociada.`,'B':`El tratamiento inicial del IAM se basa en la administración de líquidos intravenosos de forma sistemática para mejorar la perfusión coronaria.`,'C':`El paciente con sospecha de IAM debe recibir inmediatamente oxígeno suplementario, ácido acetilsalicílico, nitroglicerina y morfina.`,'D':`El tratamiento trombolítico presenta contraindicaciones absolutas, como el antecedente de ictus isquémico, anomalía de la coagulación conocida o la hipertensión no controlada.`}},

{n:350,texto:`Entre las potencialidades del trabajo grupal en la promoción de la salud, encontramos:`,opts:{'A':`Aprovechamiento del recurso humano y material.`,'B':`Apoyo que las personas participantes se dan entre sí.`,'C':`Descubrimiento de que lo que viven es único.`,'D':`Ausencia de lazos afectivos entre participantes.`}}];
let estado={},orden=PREGUNTAS.map(p=>p.n),modoFallos=false;
function cargarEstado(){try{const r=localStorage.getItem(STORAGE_KEY);if(r)estado=JSON.parse(r);}catch(e){estado={};}}
function guardarEstado(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(estado));}catch(e){}}
function calcularStats(){let ok=0,fail=0;PREGUNTAS.forEach(p=>{if(estado[p.n]){if(estado[p.n].correcto)ok++;else fail++;}});return{ok,fail,total:PREGUNTAS.length};}
function actualizarHeader(){const s=calcularStats();const r=s.ok+s.fail;document.getElementById('barraFill').style.width=(r/s.total*100)+'%';document.getElementById('progresoTexto').textContent=r+' / '+s.total;document.getElementById('statOk').textContent=s.ok+' correctas';document.getElementById('statFail').textContent=s.fail+' incorrectas';}
function renderizar(){
  const c=document.getElementById('contenedor');c.innerHTML='';
  const s=calcularStats();
  if(s.ok+s.fail===s.total&&!modoFallos){const pct=Math.round(s.ok/s.total*100);const b=document.createElement('div');b.className='banner-completado';b.innerHTML=`<h2>🎉 ¡Lote completado!</h2><div class="puntuacion">${s.ok}/${s.total}</div><p>${pct}% de acierto · Preguntas 301–350 · Enfermería</p>`;c.appendChild(b);}
  const pm=modoFallos?PREGUNTAS.filter(p=>estado[p.n]&&!estado[p.n].correcto):orden.map(n=>PREGUNTAS.find(p=>p.n===n));
  if(modoFallos&&pm.length===0){c.innerHTML+='<div style="text-align:center;padding:40px;color:var(--gris);font-family:Syne,sans-serif;">¡No hay preguntas falladas! 🎯</div>';return;}
  pm.forEach(pregunta=>{
    if(!pregunta)return;
    const resp=RESPUESTAS[pregunta.n];const est=estado[pregunta.n];const resuelta=!!est;
    const card=document.createElement('div');card.className='pregunta-card'+(resuelta?(' resuelta'+(est.correcto?'':' fallo')):'');card.id='p'+pregunta.n;
    let html=`<div class="pregunta-num">Pregunta ${pregunta.n}</div><div class="pregunta-texto">${pregunta.n}.- ${pregunta.texto}</div><div class="opciones">`;
    Object.entries(pregunta.opts).forEach(([letra,texto])=>{
      let cls='opcion-btn';let disabled=resuelta?'disabled':'';
      if(resuelta){if(letra===resp){cls+=est.elegida===letra?' correcta':' correcta-marcada';}else if(letra===est.elegida&&!est.correcto){cls+=' incorrecta';}}
      html+=`<button class="${cls}" ${disabled} onclick="responder(${pregunta.n},'${letra}')"><span class="letra">${letra})</span>${texto}</button>`;
    });
    html+=`</div>`;
    if(resuelta){html+=est.correcto?`<div class="resultado-badge badge-ok">✓ Correcto</div>`:`<div class="resultado-badge badge-error">✗ Incorrecto — Respuesta: ${resp}</div>`;}
    card.innerHTML=html;c.appendChild(card);
  });
}
function responder(num,letra){if(estado[num])return;const resp=RESPUESTAS[num];estado[num]={elegida:letra,correcto:letra===resp};guardarEstado();actualizarHeader();renderizar();setTimeout(()=>{const el=document.getElementById('p'+num);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});},100);}
function resetearTodo(){if(!confirm('¿Seguro que quieres reiniciar todo el progreso de este lote?'))return;estado={};guardarEstado();modoFallos=false;orden=PREGUNTAS.map(p=>p.n);actualizarHeader();renderizar();}
function mostrarSoloFallos(){modoFallos=!modoFallos;renderizar();}
function ordenAleatorio(){modoFallos=false;orden=[...PREGUNTAS.map(p=>p.n)].sort(()=>Math.random()-0.5);renderizar();window.scrollTo({top:0,behavior:'smooth'});}
cargarEstado();actualizarHeader();renderizar();
</script>
