<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');
  :root{--verde:#006b5e;--verde-claro:#00a88f;--morado:#5c3d7a;--morado-claro:#8b6aaa;--fondo:#f5f4f8;--blanco:#ffffff;--gris:#6b7b8d;--borde:#ddd8e8;--correcto:#1a7a5e;--incorrecto:#b83232;--correcto-bg:#e6f7f1;--incorrecto-bg:#fdecea;--sombra:0 4px 24px rgba(92,61,122,0.10);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--fondo);color:#1a1a2e;min-height:100vh;padding-bottom:60px;}
  header{background:var(--morado);color:white;padding:28px 24px 20px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,0.15);}
  header h1{font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;letter-spacing:-0.02em;line-height:1.2;}
  header .subtitulo{font-size:0.8rem;opacity:0.8;margin-top:2px;font-weight:300;}
  .barra-progreso-wrap{margin-top:12px;display:flex;align-items:center;gap:10px;}
  .barra-progreso{flex:1;height:6px;background:rgba(255,255,255,0.25);border-radius:10px;overflow:hidden;}
  .barra-progreso-fill{height:100%;background:#c9a8f0;border-radius:10px;transition:width 0.4s ease;}
  .progreso-texto{font-size:0.75rem;opacity:0.85;white-space:nowrap;}
  .stats-header{display:flex;gap:16px;margin-top:10px;font-size:0.75rem;}
  .stat-item{display:flex;align-items:center;gap:5px;opacity:0.9;}
  .stat-dot{width:8px;height:8px;border-radius:50%;}
  .dot-correcto{background:#c9a8f0;}.dot-incorrecto{background:#ff8a80;}
  .contenedor{max-width:780px;margin:0 auto;padding:24px 16px;}
  .pregunta-card{background:var(--blanco);border-radius:16px;padding:24px;margin-bottom:20px;box-shadow:var(--sombra);border:1px solid var(--borde);}
  .pregunta-card.resuelta{border-left:4px solid var(--morado-claro);}
  .pregunta-card.resuelta.fallo{border-left:4px solid var(--incorrecto);}
  .pregunta-num{font-family:'Syne',sans-serif;font-size:0.7rem;font-weight:700;color:var(--morado);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px;}
  .pregunta-texto{font-size:0.95rem;font-weight:500;line-height:1.55;margin-bottom:18px;color:#1a1a2e;}
  .opciones{display:flex;flex-direction:column;gap:8px;}
  .opcion-btn{text-align:left;background:var(--fondo);border:1.5px solid var(--borde);border-radius:10px;padding:11px 14px;font-size:0.88rem;font-family:'DM Sans',sans-serif;color:#1a1a2e;cursor:pointer;transition:all 0.18s;line-height:1.45;}
  .opcion-btn:hover:not(:disabled){border-color:var(--morado);background:rgba(92,61,122,0.06);transform:translateX(2px);}
  .opcion-btn:disabled{cursor:default;}
  .opcion-btn .letra{font-weight:700;color:var(--gris);margin-right:6px;font-family:'Syne',sans-serif;font-size:0.82rem;}
  .opcion-btn.correcta{background:var(--correcto-bg);border-color:var(--correcto);color:var(--correcto);font-weight:500;}
  .opcion-btn.correcta .letra{color:var(--correcto);}
  .opcion-btn.incorrecta{background:var(--incorrecto-bg);border-color:var(--incorrecto);color:var(--incorrecto);font-weight:500;}
  .opcion-btn.incorrecta .letra{color:var(--incorrecto);}
  .opcion-btn.correcta-marcada{background:var(--correcto-bg);border-color:var(--correcto);color:var(--correcto);font-weight:600;}
  .resultado-badge{display:inline-flex;align-items:center;gap:5px;margin-top:12px;padding:5px 11px;border-radius:20px;font-size:0.78rem;font-weight:600;font-family:'Syne',sans-serif;}
  .badge-ok{background:var(--correcto-bg);color:var(--correcto);}
  .badge-error{background:var(--incorrecto-bg);color:var(--incorrecto);}
  .pregunta-nula{background:#fff8e1;border:1px dashed #f0c040;border-radius:10px;padding:10px 14px;font-size:0.82rem;color:#7a5c00;margin-top:10px;}
  .botones-footer{position:fixed;bottom:0;left:0;right:0;background:var(--blanco);border-top:1px solid var(--borde);padding:12px 16px;display:flex;gap:10px;justify-content:center;box-shadow:0 -4px 20px rgba(0,0,0,0.07);z-index:99;}
  .btn-accion{font-family:'Syne',sans-serif;font-size:0.8rem;font-weight:700;padding:10px 20px;border:none;border-radius:8px;cursor:pointer;transition:all 0.18s;}
  .btn-resetear{background:var(--fondo);color:var(--gris);border:1.5px solid var(--borde);}
  .btn-resetear:hover{background:var(--incorrecto-bg);border-color:var(--incorrecto);color:var(--incorrecto);}
  .btn-fallos{background:var(--fondo);color:var(--morado);border:1.5px solid #c4aee0;}
  .btn-fallos:hover{background:#f0ebf8;}
  .btn-aleatorio{background:var(--morado);color:white;}
  .btn-aleatorio:hover{background:var(--morado-claro);}
  .banner-completado{background:linear-gradient(135deg,var(--morado) 0%,#8b6aaa 100%);color:white;border-radius:16px;padding:28px 24px;text-align:center;margin-bottom:24px;box-shadow:var(--sombra);}
  .banner-completado h2{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;margin-bottom:6px;}
  .banner-completado .puntuacion{font-size:2.5rem;font-weight:800;font-family:'Syne',sans-serif;margin:8px 0;}
  .banner-completado p{opacity:0.9;font-size:0.88rem;}
  @media(max-width:500px){.pregunta-texto{font-size:0.88rem;}.opcion-btn{font-size:0.82rem;padding:10px 12px;}header h1{font-size:1.1rem;}}
</style>

<script>
const STORAGE_KEY='osakidetza_q101_150';
const RESPUESTAS={101:'B',102:'D',103:'B',104:'A',105:'C',106:'B',107:'D',108:'D',109:'B',110:'B',111:'C',112:'A',113:'C',114:'C',115:'B',116:'C',117:'B',118:'B',119:'B',120:'B',121:'C',122:'B',123:'C',124:'B',125:'B',126:'D',127:'C',128:'B',129:'B',130:'B',131:'B',132:'B',133:'B',134:'B',135:'B',136:'B',137:'B',138:'C',139:'B',140:'D',141:'C',142:'A',143:'B',144:'A',145:'C',146:'D',147:'B',148:'B',149:'A',150:'C'};
const PREGUNTAS=[
  {n:101,texto:"Según dispone la Ley 7/2002, de 12 de diciembre, de las voluntades anticipadas en el ámbito de la sanidad, el documento de voluntades anticipadas:",opts:{A:"Se formaliza por escrito y mediante uno de los siguientes procedimientos a elección de la persona que lo otorga: ante una notaría; ante la persona funcionaria o empleada pública encargada del Registro Vasco de Voluntades Anticipadas; o ante dos testigos.",B:"Se formaliza por escrito y mediante uno de los siguientes procedimientos a elección de la persona que lo otorga: ante una notaría; ante la persona funcionaria o empleada pública encargada del Registro Vasco de Voluntades Anticipadas; o ante tres testigos.",C:"Se formaliza por escrito y mediante uno de los siguientes procedimientos a elección de la persona que lo otorga: ante una notaría; ante la persona funcionaria o empleada pública encargada del Registro Vasco de Voluntades Anticipadas o del servicio de documentación de un centro sanitario de la Comunidad Autónoma del País Vasco; o ante dos testigos.",D:"Se formaliza por escrito y mediante uno de los siguientes procedimientos a elección de la persona que lo otorga: ante una notaría; ante la persona funcionaria o empleada pública encargada del Registro Vasco de Voluntades Anticipadas o del servicio de documentación de un centro sanitario de la Comunidad Autónoma del País Vasco; o ante tres testigos."}},
  {n:102,texto:"Según dispone la Ley 7/2002, de 12 de diciembre, de las voluntades anticipadas en el ámbito de la sanidad, el documento de voluntades anticipadas puede ser modificado, sustituido por otro o revocado en cualquier momento por la persona otorgante:",opts:{A:"Siempre que conserve la capacidad o actúe con la asistencia de su representante legal y actúe libremente.",B:"Siempre que conserve la capacidad o exista autorización judicial.",C:"Siempre que actúe libremente.",D:"Siempre que conserve la capacidad y actúe libremente."}},
  {n:103,texto:"Según dispone la Ley 7/2002, de 12 de diciembre, de las voluntades anticipadas en el ámbito de la sanidad, la voluntad de la persona prevalece sobre las instrucciones contenidas en el documento de voluntades anticipadas ante cualquier intervención clínica siempre que:",opts:{A:"La persona otorgante conserve su capacidad y su libertad de actuación.",B:"La persona otorgante conserve su capacidad, su libertad de actuación y la posibilidad de expresarse.",C:"La persona otorgante conserve su capacidad, su libertad de actuación y la posibilidad de expresarse de manera inequívoca.",D:"La persona otorgante conserve su capacidad, su libertad de actuación y la posibilidad de expresarse de manera inequívoca o a través de la persona interlocutora designada al efecto."}},
  {n:104,texto:"Según dispone la Ley 7/2002, de 12 de diciembre, de las voluntades anticipadas en el ámbito de la sanidad, en el documento de voluntades anticipadas se tendrán por no puestas:",opts:{A:"Las instrucciones que en el momento de ser aplicadas resulten contrarias al ordenamiento jurídico.",B:"Las instrucciones que en el momento de ser otorgadas resulten contrarias al ordenamiento jurídico.",C:"Las respuestas a) y b) son correctas.",D:"Las instrucciones que en el momento de ser aplicadas no se aprueben por el comité de ética del centro."}},
  {n:105,texto:"Según dispone la Ley Orgánica 3/2018, de 5 de diciembre, de Protección de Datos Personales y garantía de los derechos digitales, podrán tener acceso a los datos personales de las personas fallecidas:",opts:{A:"Las personas vinculadas a la persona fallecida por razones familiares o de hecho así como quienes ostenten la condición de herederas, en todo caso.",B:"Solo las personas vinculadas a la persona fallecida por razones familiares siempre que lo hubiera autorizado expresamente la persona fallecida.",C:"Las personas vinculadas a la persona fallecida por razones familiares o de hecho así como quienes ostenten la condición de herederas, salvo que la persona fallecida lo hubiese prohibido expresamente.",D:"En caso de que la persona fallecida fuera menor de edad, el acceso podrá ejercerse también por sus representantes legales o por el Ministerio Fiscal que siempre actuará de oficio."}},
  {n:106,texto:"Señale la respuesta que no es correcta. Según la Ley Orgánica 3/2018, de 5 de diciembre, de Protección de Datos Personales y garantía de los derechos digitales a efectos del tratamiento de los datos, el consentimiento de la persona afectada tiene que ser una manifestación de voluntad que cumpla las siguientes características:",opts:{A:"Libre.",B:"Verbal.",C:"Específica.",D:"Informada."}},
  {n:107,texto:"Con relación al tratamiento de los datos personales de una persona menor de edad, señale la respuesta correcta:",opts:{A:"Únicamente podrá fundarse en su consentimiento cuando sea mayor de dieciséis años.",B:"La Ley Orgánica 3/2018, de 5 de diciembre, de Protección de Datos Personales y garantía de los derechos digitales no prevé que las personas menores de edad puedan dar su consentimiento válidamente a estos efectos.",C:"Únicamente podrá fundarse en su consentimiento cuando sea mayor de catorce años.",D:"El tratamiento de los datos de las personas menores de dieciséis años, fundado en el consentimiento, solo será lícito si consta el consentimiento de quienes ejercen la patria potestad o tutela, con el alcance que dichas personas determinen."}},
  {n:108,texto:"La Ley Orgánica 3/2018, de 5 de diciembre, de Protección de Datos Personales y garantía de los derechos digitales, en su artículo 9 considera categorías especiales de datos aquellos que permitan, respecto a la persona afectada, identificar:",opts:{A:"Su ideología y afiliación sindical.",B:"Su religión y orientación sexual.",C:"Sus creencias u origen racial o étnico.",D:"Todas las respuestas son correctas."}},
  {n:109,texto:"La Ley Orgánica 3/2018, de 5 de diciembre, de Protección de Datos Personales y garantía de los derechos digitales establece que el tratamiento de datos de naturaleza penal podrá llevarse a cabo:",opts:{A:"Solo por profesionales de la abogacía y cuando tengan por objeto recoger la información facilitada por quienes les contraten para el ejercicio de sus funciones.",B:"Por profesionales de la abogacía y de la procura, cuando tengan por objeto recoger la información facilitada por quienes les contraten para el ejercicio de sus funciones.",C:"En los casos previstos por la propia Ley Orgánica 3/2018 y en otras normas de rango reglamentario.",D:"Exclusivamente en los supuestos amparados en una norma de Derecho de la Unión y en la propia Ley Orgánica 2/2018."}},
  {n:110,texto:"Respecto al derecho de rectificación que regula la Ley Orgánica 3/2018, de 5 de diciembre, de Protección de Datos Personales y garantía de los derechos digitales, señale la respuesta correcta:",opts:{A:"La persona afectada deberá indicar en su solicitud a qué datos se refiere y deberá acompañar, en todo caso, la documentación justificativa de la inexactitud de los datos.",B:"La persona afectada deberá indicar en su solicitud a qué datos se refiere y la corrección que haya de realizarse, y cuando sea preciso, deberá acompañar la documentación justificativa de la inexactitud o carácter incompleto de los datos objeto de tratamiento.",C:"La persona afectada deberá indicar en su solicitud solo la corrección que haya de realizarse y debe siempre acompañar la documentación justificativa de la inexactitud de los datos.",D:"No es necesario que la persona afectada indique expresamente en su solicitud qué datos deben rectificarse."}},
  {n:111,texto:"Con relación al tratamiento de datos con fines de videovigilancia, señale la respuesta correcta:",opts:{A:"Solo las personas físicas podrán llevar a cabo el tratamiento de imágenes a través de sistemas de cámaras o videocámaras con la finalidad de preservar la seguridad de las personas y bienes, así como sus instalaciones.",B:"Los datos serán suprimidos, en todo caso, en el plazo máximo de un mes desde su captación.",C:"Los datos serán suprimidos en el plazo máximo de un mes desde su captación, salvo cuando hubieran de ser conservados para acreditar la comisión de actos que atenten contra la integridad de personas, bienes o instalaciones.",D:"En el caso de que los datos hubieran de ser conservados más allá del plazo de un mes desde su captación para acreditar la comisión de actos que atenten contra la integridad de personas, bienes o instalaciones, deberán ser puestas a disposición de la autoridad competente en un plazo máximo de cuarenta y ocho horas desde que se tuviera conocimiento de la existencia de la grabación."}},
  {n:112,texto:"Respecto a los sistemas de información de denuncias internas que contempla la Ley Orgánica 3/2018, de 5 de diciembre, de Protección de Datos Personales y garantía de los derechos digitales, es correcta la siguiente afirmación:",opts:{A:"En todo caso, transcurridos tres meses desde la introducción de los datos, deberá procederse a su supresión del sistema de denuncias, salvo que la finalidad de la conservación sea dejar evidencia del funcionamiento del modelo de prevención de la comisión de delitos.",B:"En todo caso, transcurridos seis meses desde la introducción de los datos, deberá procederse a su supresión del sistema de denuncias, salvo que la finalidad de la conservación sea dejar evidencia del funcionamiento del modelo de prevención de la comisión de delitos.",C:"En todo caso, y sin excepción, transcurridos seis meses desde la introducción de los datos, deberá procederse a su supresión del sistema de denuncias.",D:"La Ley no prevé plazo temporal alguno para la supresión de los datos del sistema de denuncias."}},
  {n:113,texto:"El artículo 1 del Decreto Legislativo 1/2023, de 16 de marzo, por el que se aprueba el texto refundido de la Ley para la Igualdad de Mujeres y Hombres y Vidas Libres de Violencia Machista contra las Mujeres, añade un concepto específico al objeto de la ley que refuerza el fin último de la norma, ¿cuál es?",opts:{A:"La igualdad de oportunidades.",B:"El empoderamiento de las mujeres.",C:"Lograr una sociedad libre de violencia machista.",D:"La eliminación de roles tradicionales."}},
  {n:114,texto:"Según el artículo 2 del Decreto Legislativo 1/2023, de 16 de marzo, por el que se aprueba el texto refundido de la Ley para la Igualdad de Mujeres y Hombres y Vidas Libres de Violencia Machista contra las Mujeres, ¿a qué entidades privadas les es exigible el cumplimiento de los principios generales de esta ley durante su relación con la administración?",opts:{A:"Solo a las que tengan una plantilla superior a 250 personas.",B:"A todas las empresas con sede en Euskadi.",C:"A las que suscriban contratos o convenios, estén participadas por poderes públicos o sean beneficiarias de ayudas.",D:"Ninguna entidad privada está sujeta a los principios de la ley."}},
  {n:115,texto:"Según el Decreto Legislativo 1/2023, de 16 de marzo, por el que se aprueba el texto refundido de la Ley para la Igualdad de Mujeres y Hombres y Vidas Libres de Violencia Machista contra las Mujeres, ¿cuál de estos es un principio general de actuación de los poderes públicos vascos incorporado en la nueva redacción del artículo 3?",opts:{A:"El principio de jerarquía administrativa.",B:"La integración de la perspectiva interseccional.",C:"El principio de celeridad procesal.",D:"La centralización de recursos de acogida."}},
  {n:116,texto:"Según el Decreto Legislativo 1/2023, de 16 de marzo, por el que se aprueba el texto refundido de la Ley para la Igualdad de Mujeres y Hombres y Vidas Libres de Violencia Machista contra las Mujeres, respecto al principio de representación equilibrada, ¿en qué caso se permite excepcionalmente una presencia de mujeres superior al 60%?",opts:{A:"En ningún caso.",B:"Solo si no hay hombres capacitados en el sector.",C:"Cuando sea acorde al objetivo de corregir la histórica situación de infrarrepresentación de las mujeres.",D:"Si el órgano tiene menos de cuatro integrantes."}},
  {n:117,texto:"Según el Decreto Legislativo 1/2023, de 16 de marzo, por el que se aprueba el texto refundido de la Ley para la Igualdad de Mujeres y Hombres y Vidas Libres de Violencia Machista contra las Mujeres, ¿qué planes específicos deben someterse ahora, obligatoriamente, a una evaluación previa de impacto en función del género?",opts:{A:"Solo los planes de formación interna.",B:"Los planes territoriales y urbanísticos.",C:"Los planes de marketing de empresas públicas.",D:"Ningún plan, solo los proyectos de ley."}},
  {n:118,texto:"Según el Decreto Legislativo 1/2023, de 16 de marzo, por el que se aprueba el texto refundido de la Ley para la Igualdad de Mujeres y Hombres y Vidas Libres de Violencia Machista contra las Mujeres, ¿qué requisito nuevo deben cumplir las empresas de más de 50 personas trabajadoras para poder recibir subvenciones públicas?",opts:{A:"Tener paridad total en su directiva.",B:"Acreditar haber establecido medidas para prevenir y combatir el acoso sexual y las violencias sexuales.",C:"Tener un departamento exclusivo de igualdad.",D:"Estar inscritas en un registro internacional de igualdad."}},
  {n:119,texto:"De acuerdo con lo establecido en el artículo 54 del texto refundido de la Ley para la Igualdad de Mujeres y Hombres y Vidas Libres de Violencia Machista contra las Mujeres, aprobado por el Decreto Legislativo 1/2023, de 16 de marzo, ¿cómo se define la 'violencia machista contra las mujeres'?",opts:{A:"Solo la violencia física en el hogar.",B:"Una violación de los derechos humanos y un problema de salud pública de primer orden.",C:"Únicamente los delitos contra la libertad sexual.",D:"Un conflicto de convivencia familiar."}},
  {n:120,texto:"De acuerdo con lo establecido en el artículo 54.3 del texto refundido de la Ley para la Igualdad de Mujeres y Hombres y Vidas Libres de Violencia Machista contra las Mujeres, aprobado por el Decreto Legislativo 1/2023, de 16 de marzo, ¿qué formas de violencia se incorporan como casos constitutivos de violencia machista por estar específicamente recogidos en dicho apartado?",opts:{A:"Solo la violencia física y psicológica.",B:"La violencia obstétrica, la política de género y la violencia digital.",C:"Únicamente el acoso laboral.",D:"No se detallan formas, se remite al Código Penal."}},
  {n:121,texto:"¿Cuántos Objetivos Generales, clasificados como finalistas e instrumentales, se definen en la estructura del Plan de Salud Euskadi 2030?",opts:{A:"Cinco Objetivos Generales.",B:"Seis Objetivos Generales.",C:"Siete Objetivos Generales.",D:"Ocho Objetivos Generales."}},
  {n:122,texto:"Según el Plan de Salud Euskadi 2030, la VISIÓN que se aspira a lograr como país es:",opts:{A:"Convertirnos en el sistema de salud pública más sólido y resiliente de Europa.",B:"Liderar una Euskadi más saludable.",C:"Reducir la morbimortalidad evitable y disminuir las desigualdades en salud antes de 2030.",D:"Lograr la sostenibilidad y excelencia en los sistemas asistenciales sanitarios y sociosanitarios."}},
  {n:123,texto:"¿Cuál de los siguientes NO es un principio rector en los que se apoya el Plan de Salud Euskadi 2030?",opts:{A:"La necesaria coordinación y colaboración interinstitucional, entre agentes y en todos los niveles.",B:"Enfoque de Salud en Todas las Políticas y 'Una Sola Salud' ('One Health').",C:"La autosuficiencia presupuestaria del Sistema Sanitario Público.",D:"Contribución al Desarrollo Sostenible."}},
  {n:124,texto:"El Objetivo General 1 (OG1) del Plan de Salud Euskadi 2030 se enfoca en:",opts:{A:"Promover la salud de las mujeres y la salud reproductiva en la edad adulta.",B:"Lograr que niñas, niños y adolescentes nazcan, crezcan y se desarrollen con todo su potencial de salud.",C:"Mejorar la salud mental y reducir la morbimortalidad asociada a trastornos mentales.",D:"La prevención y el control de las enfermedades no transmisibles (ENT)."}},
  {n:125,texto:"El Objetivo General 4 (OG4) del Plan de Salud Euskadi 2030 se define como 'lograr la sostenibilidad y excelencia en los sistemas asistenciales sanitarios y sociosanitarios de Euskadi', ¿en términos de qué tres conceptos clave?",opts:{A:"Eficiencia, accesibilidad e innovación.",B:"Calidad, humanización y seguridad.",C:"Equidad, intersectorialidad y coordinación.",D:"Investigación, formación y evaluación."}},
  {n:126,texto:"¿A qué hace referencia el acrónimo AVAD en el Plan de Salud Euskadi 2030?",opts:{A:"Áreas de Valoración de la Atención al Dependiente.",B:"Años de Vida Activa Desaprovechados.",C:"Atención Vasca a la Adicción a Drogas.",D:"Años de Vida sana perdidos Ajustados por Discapacidad."}},
  {n:127,texto:"¿Cuál es uno de los objetivos clave del Plan de Salud Euskadi 2030, reiterado en varias secciones, respecto a la equidad y la gestión de la enfermedad?",opts:{A:"Garantizar la participación de la empresa privada en la gestión de servicios hospitalarios.",B:"Aumentar la esperanza de vida en 5 años en todos los colectivos sociales.",C:"Reducir la morbimortalidad evitable y disminuir las desigualdades en salud.",D:"Implementar un programa de cribado universal para todos los tipos de cáncer."}},

  {n:145,texto:"¿En qué grandes ámbitos se estructuran las Líneas Estratégicas del Pacto Vasco de Salud?",opts:{A:"Cinco Líneas Estratégicas: prevención y promoción de la salud; atención a la enfermedad; calidad, innovación y sostenibilidad; desarrollo de las y los profesionales; y Gobernanza.",B:"Seis Líneas Estratégicas: prevención y promoción de la salud; atención a la enfermedad; áreas prioritarias de salud; calidad, innovación y sostenibilidad; desarrollo de las y los profesionales; y transparencia y participación ciudadana.",C:"Seis Líneas Estratégicas: prevención y promoción de la salud; atención a la enfermedad; áreas prioritarias de salud; calidad, innovación y sostenibilidad; desarrollo de las y los profesionales; y gobernanza.",D:"Seis Líneas Estratégicas: prevención y promoción de la salud; atención sociosanitaria; áreas prioritarias de salud; calidad, innovación y sostenibilidad; desarrollo de las y los profesionales; y gobernanza."}},

let estado={},orden=PREGUNTAS.map(p=>p.n),modoFallos=false;
function cargarEstado(){try{const r=localStorage.getItem(STORAGE_KEY);if(r)estado=JSON.parse(r);}catch(e){estado={};}}
function guardarEstado(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(estado));}catch(e){}}
function calcularStats(){let ok=0,fail=0;PREGUNTAS.forEach(p=>{if(estado[p.n]){if(estado[p.n].correcto)ok++;else fail++;}});return{ok,fail,total:PREGUNTAS.length};}
function actualizarHeader(){const s=calcularStats();const r=s.ok+s.fail;document.getElementById('barraFill').style.width=(r/s.total*100)+'%';document.getElementById('progresoTexto').textContent=r+' / '+s.total;document.getElementById('statOk').textContent=s.ok+' correctas';document.getElementById('statFail').textContent=s.fail+' incorrectas';}
function renderizar(){
  const c=document.getElementById('contenedor');c.innerHTML='';
  const s=calcularStats();
  if(s.ok+s.fail===s.total&&!modoFallos){const pct=Math.round(s.ok/s.total*100);const b=document.createElement('div');b.className='banner-completado';b.innerHTML=`<h2>🎉 ¡Lote completado!</h2><div class="puntuacion">${s.ok}/${s.total}</div><p>${pct}% de acierto · Preguntas 101–150</p>`;c.appendChild(b);}
  const pm=modoFallos?PREGUNTAS.filter(p=>estado[p.n]&&!estado[p.n].correcto):orden.map(n=>PREGUNTAS.find(p=>p.n===n));
  if(modoFallos&&pm.length===0){c.innerHTML+='<div style="text-align:center;padding:40px;color:var(--gris);font-family:Syne,sans-serif;">¡No hay preguntas falladas! 🎯</div>';return;}
  pm.forEach(pregunta=>{
    if(!pregunta)return;
    const resp=RESPUESTAS[pregunta.n];const est=estado[pregunta.n];const resuelta=!!est;
    const card=document.createElement('div');card.className='pregunta-card'+(resuelta?(' resuelta'+(est.correcto?'':' fallo')):'');card.id='p'+pregunta.n;
    let html=`<div class="pregunta-num">Pregunta ${pregunta.n}</div><div class="pregunta-texto">${pregunta.n}.- ${pregunta.texto}</div><div class="opciones">`;
    Object.entries(pregunta.opts).forEach(([letra,texto])=>{
      let cls='opcion-btn';let disabled=resuelta?'disabled':'';
      if(resuelta){if(letra===resp){cls+=est.elegida===letra?' correcta':' correcta-marcada';}else if(letra===est.elegida&&!est.correcto){cls+=' incorrecta';}}
      html+=`<button class="${cls}" ${disabled} onclick="responder(${pregunta.n},'${letra}')"><span class="letra">${letra})</span>${texto}</button>`;
    });
    html+=`</div>`;
    if(resuelta){html+=est.correcto?`<div class="resultado-badge badge-ok">✓ Correcto</div>`:`<div class="resultado-badge badge-error">✗ Incorrecto — Respuesta: ${resp}</div>`;}
    card.innerHTML=html;c.appendChild(card);
  });
}
function responder(num,letra){if(estado[num])return;const resp=RESPUESTAS[num];estado[num]={elegida:letra,correcto:letra===resp};guardarEstado();actualizarHeader();renderizar();setTimeout(()=>{const el=document.getElementById('p'+num);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});},100);}
function resetearTodo(){if(!confirm('¿Seguro que quieres reiniciar todo el progreso de este lote?'))return;estado={};guardarEstado();modoFallos=false;orden=PREGUNTAS.map(p=>p.n);actualizarHeader();renderizar();}
function mostrarSoloFallos(){modoFallos=!modoFallos;renderizar();}
function ordenAleatorio(){modoFallos=false;orden=[...PREGUNTAS.map(p=>p.n)].sort(()=>Math.random()-0.5);renderizar();window.scrollTo({top:0,behavior:'smooth'});}
cargarEstado();actualizarHeader();renderizar();
</script>
