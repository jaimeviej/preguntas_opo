const PREGUNTAS=[{n:451,texto:`Un equipo de enfermería quiere investigar el cuidado de personas con demencia y el impacto en sus familiares cuidadores, con el objetivo de mejorar la atención y el apoyo desde los servicios sociosanitarios. Las investigadoras se integran durante un año en centros de día, domicilios y asociaciones de familiares, observando rituales, normas implícitas, roles, lenguaje y prácticas compartidas en torno al cuidado de personas con demencia, con el fin de comprender la cultura del cuidado en distintos contextos comunitarios. ¿A qué método cualitativo corresponde principalmente este enfoque?`,opts:{'A':`Teoría fundamentada.`,'B':`Etnografía.`,'C':`Fenomenología.`,'D':`Investigación-acción participativa.`}},
{n:452,texto:`Un equipo de enfermería quiere investigar el cuidado de personas con demencia y el impacto en sus familiares cuidadores, con el objetivo de mejorar la atención y el apoyo desde los servicios sociosanitarios. El estudio se focaliza en cómo los familiares viven y significan el cuidado cotidiano de una persona con demencia, explorando en profundidad emociones, percepciones y sentido del cuidado. ¿A qué método cualitativo corresponde principalmente este enfoque?`,opts:{'A':`Teoría fundamentada.`,'B':`Etnografía.`,'C':`Fenomenología.`,'D':`Investigación-acción participativa.`}},
{n:453,texto:`En relación con el modelo de práctica basada en la evidencia (PBE) en enfermería, ¿cuál de los siguientes NO forma parte de los factores que influyen en dicho modelo?`,opts:{'A':`La mejor evidencia disponible procedente de la investigación científica.`,'B':`La experiencia clínica del profesional de enfermería.`,'C':`Las circunstancias, valores y preferencias de la persona paciente.`,'D':`La disponibilidad presupuestaria y la eficiencia económica del sistema sanitario.`}},
{n:454,texto:`Una unidad de enfermería detecta una elevada tasa de úlceras por presión en pacientes inmovilizados. El equipo enfermero diseña un estudio para analizar la incidencia, identificar factores asociados y valorar la efectividad de diferentes intervenciones preventivas, con el objetivo de mejorar los cuidados y la seguridad del paciente. Desde el punto de vista conceptual, esta actuación se corresponde principalmente con:`,opts:{'A':`Una auditoría asistencial orientada al control interno de la calidad.`,'B':`La aplicación directa de la Guía BPSO de prevención de úlceras por presión.`,'C':`Un proceso de investigación en enfermería destinado a generar y validar conocimiento aplicable a la práctica clínica.`,'D':`Un programa de formación continuada sin relación con la producción de conocimiento científico.`}},
{n:455,texto:`En relación con las formas de adquisición del conocimiento en enfermería, señale la opción CORRECTA:`,opts:{'A':`El modelado de roles permite la adquisición de conocimientos mediante la observación e imitación de profesionales expertos, siendo una estrategia clave en la formación práctica en enfermería.`,'B':`La experiencia personal constituye una fuente suficiente de conocimiento para la práctica enfermera, incluso en ausencia de evidencia científica.`,'C':`El conocimiento adquirido por tradición garantiza prácticas eficaces, ya que ha demostrado su validez al mantenerse estable a lo largo del tiempo.`,'D':`La intuición es una forma de conocimiento espontáneo sin base cognitiva ni relación con la experiencia clínica acumulada.`}},
{n:456,texto:`En relación con la asociación entre la formación académica de los y las profesionales de enfermería y las expectativas y competencias en investigación, señale la opción INCORRECTA:`,opts:{'A':`En las enfermeras y enfermeros con formación de grado, no se espera ninguna implicación en actividades de investigación, lectura o valoración crítica de los estudios de investigación, limitándose su papel a la aplicación directa de cuidados asistenciales.`,'B':`En profesionales con formación de máster, se incluyen competencias relacionadas con la valoración crítica y síntesis de la evidencia, así como la elaboración y revisión de protocolos y guías clínicas.`,'C':`En profesionales con formación doctoral, se espera la generación de conocimiento científico mediante la realización de investigaciones originales y la colaboración en proyectos de investigación.`,'D':`En profesionales con formación postdoctoral, se asume un papel de liderazgo en investigación, incluyendo la dirección de proyectos, la obtención de financiación y la tutorización de investigadores con grado doctoral.`}},
{n:457,texto:`Un equipo de enfermería quiere comprender en profundidad la experiencia vivida por personas cuidadoras informales de pacientes con demencia avanzada en domicilio, con el objetivo de identificar significados, percepciones y necesidades comunes que orienten futuras intervenciones de apoyo. Para responder a esta pregunta de investigación, ¿cuál es el proceso de síntesis de la evidencia más adecuado?`,opts:{'A':`Metaanálisis, utilizando métodos estadísticos para estimar el efecto global del cuidado informal sobre la carga del cuidador.`,'B':`Metasíntesis, integrando de forma sistemática estudios cualitativos originales para desarrollar una interpretación comprensiva de los hallazgos.`,'C':`Revisión sistemática, combinando estudios cuantitativos y cualitativos mediante análisis estadístico.`,'D':`Revisión sistemática de métodos mixtos, centrada en estudios experimentales y cuasiexperimentales con análisis estadístico.`}},
{n:458,texto:`Un grupo de enfermeras quiere actualizar un protocolo clínico sobre prevención de caídas y decide basar sus recomendaciones en el nivel más alto de evidencia científica disponible, según la pirámide de niveles de evidencia en investigación en enfermería. ¿En cuál de los siguientes niveles de evidencia se situaría la fuente más adecuada para este objetivo?`,opts:{'A':`Nivel I: Revisión sistemática y metaanálisis.`,'B':`Nivel II: Ensayo controlado aleatorizado (ECA) o estudio experimental.`,'C':`Nivel III: Estudios cuasiexperimentales`,'D':`Nivel IV: Revisión sistemática de métodos mixtos y metasíntesis.`}},
{n:459,texto:`Una enfermera participa en un estudio experimental con modelos animales cuyo objetivo es comprender los mecanismos celulares implicados en la pérdida de masa muscular asociada al envejecimiento, sin aplicación directa e inmediata en la práctica asistencial. ¿A qué tipo de investigación corresponde este estudio?`,opts:{'A':`Investigación aplicada.`,'B':`Investigación básica.`,'C':`Investigación traslacional.`,'D':`Investigación evaluativa clínica.`}},
{n:460,texto:`Durante la valoración crítica de un estudio de investigación en enfermería, tanto cuantitativo como cualitativo, la enfermera revisora debe aplicar una serie de principios clave para determinar la calidad y utilidad del estudio. ¿Cuál de los siguientes NO constituye un principio clave de la valoración crítica según las guías metodológicas en investigación en enfermería?`,opts:{'A':`Analizar la relevancia del problema estudiado para la práctica enfermera y su contribución a la práctica basada en la evidencia.`,'B':`Identificar los puntos fuertes y débiles del estudio, siendo objetivo y realista en su valoración.`,'C':`Evaluar la calidad del estudio y la coherencia de sus hallazgos con la literatura existente.`,'D':`Determinar si los resultados del estudio confirman la hipótesis del autor y descartar el estudio si no lo hacen.`}},
{n:461,texto:`En el contexto de la práctica basada en la evidencia en enfermería, se utilizan diferentes bases de datos y recursos bibliográficos para localizar estudios científicos. ¿Cuál de los siguientes recursos es el que cubre de forma más específica y amplia la literatura de revistas internacionales del ámbito de la enfermería?`,opts:{'A':`CINAHL.`,'B':`MEDLINE (PubMed).`,'C':`PsycINFO.`,'D':`Biblioteca Cochrane.`}},
{n:462,texto:`En una unidad de atención primaria se plantea revisar la evidencia disponible sobre la administración de inyecciones intramusculares en población adulta, con el objetivo de reducir complicaciones locales asociadas a la técnica. Para ello, el equipo formula una pregunta clínica utilizando el formato PICO. ¿Cuál de los siguientes elementos del PICO está incorrectamente formulado en relación con este escenario?`,opts:{'A':`P: Personas adultas que reciben inyecciones intramusculares en el ámbito asistencial.`,'B':`I: Administración de la inyección intramuscular sin aspiración, siguiendo la localización anatómica correcta.`,'C':`C: Administración de la inyección intramuscular con aspiración previa durante varios segundos, independientemente del lugar de punción.`,'D':`O: Grado de conocimiento del personal de enfermería sobre la técnica de inyección intramuscular.`}},
{n:463,texto:`Un equipo de enfermería de un hospital comarcal de Osakidetza decide implantar la práctica basada en la evidencia (PBE) de forma estructurada para mejorar la calidad y seguridad de los cuidados. Para ello, revisan distintos modelos teóricos que guían la implementación de la PBE en la práctica clínica. ¿Cuál de los siguientes NO corresponde a un modelo o programa reconocido de práctica basada en la evidencia en enfermería?`,opts:{'A':`Modelo de Stetler para la implementación de la práctica basada en la evidencia.`,'B':`Modelo de Iowa para la práctica basada en la evidencia.`,'C':`Modelo Integrado de Transferencia Clínica Basada en Resultados Asistenciales (MITC-BRA).`,'D':`Programa Best Practice Spotlight Organization (BPSO).`}},
{n:464,texto:`Un grupo de enfermeras participa en un proyecto de investigación que parte de hallazgos obtenidos en estudios básicos sobre la respuesta inflamatoria al dolor postoperatorio. A partir de estos resultados, se diseña una intervención de cuidados enfermeros, se prueba en una unidad hospitalaria concreta y posteriormente se ajusta para su implantación progresiva en la práctica clínica, evaluando resultados en pacientes reales. ¿A qué tipo de investigación corresponde principalmente este enfoque?`,opts:{'A':`Investigación básica.`,'B':`Investigación aplicada.`,'C':`Investigación translacional.`,'D':`Investigación clínica descriptiva.`}},
{n:465,texto:`Se realiza un estudio sobre la presión arterial sistólica en una muestra de 200 pacientes. Los datos siguen una distribución normal con media de 130 mmHg y desviación estándar de 15 mmHg. ¿Qué característica define a una distribución normal?`,opts:{'A':`Es asimétrica y presenta una cola derecha más prolongada.`,'B':`Es simétrica alrededor de la media y tiene forma de campana.`,'C':`Todos los valores tienen la misma frecuencia.`,'D':`La media es siempre mayor que la mediana.`}},
{n:466,texto:`En un estudio observacional sobre tiempos de espera en urgencias, se obtienen los siguientes datos (en minutos): 5, 7, 10, 12, 15, 20, 120. ¿Cuál de las siguientes afirmaciones sobre las medidas de tendencia central es CORRECTA?`,opts:{'A':`La media es la medida más representativa del tiempo típico de espera.`,'B':`La moda es 120 minutos, coincidiendo con el valor más alto.`,'C':`La mediana es 12 minutos y refleja mejor el tiempo central sin influencia de valores atípicos.`,'D':`La media y la mediana son idénticas, por lo que ambas son igualmente válidas.`}},
{n:467,texto:`¿Cuál de los siguientes parámetros indica la dispersión o variabilidad de los datos alrededor de la media en una distribución?`,opts:{'A':`La dispersión variable.`,'B':`El rango intercuartílico.`,'C':`La correlación de Pearson.`,'D':`La desviación estándar y la varianza.`}},
{n:468,texto:`¿Qué representa el intervalo de confianza al 95% en una investigación?`,opts:{'A':`Que existe un 95% de probabilidad de que la media muestral se encuentre en ese rango.`,'B':`Que si repitiéramos el estudio 100 veces, aproximadamente en 95 ocasiones el parámetro poblacional estaría dentro del intervalo calculado.`,'C':`Que el 95% de los datos se encuentran en ese intervalo.`,'D':`Que el 5% de los datos son erróneos.`}},
{n:469,texto:`En un ensayo clínico que contrasta la hipótesis de que una intervención educativa mejora la adherencia al tratamiento antihipertensivo (H₀: la intervención no mejora la adherencia; H₁: la intervención sí la mejora), ¿qué significa rechazar la hipótesis nula?`,opts:{'A':`Que la hipótesis nula es absolutamente cierta.`,'B':`Que se asume que la hipótesis alternativa es verdadera basándose en la evidencia obtenida.`,'C':`Que existe suficiente evidencia estadística para asumir que la hipótesis alternativa es verdadera.`,'D':`Que el estudio fue realizado incorrectamente.`}},
{n:470,texto:`En una investigación se obtiene un valor de p = 0,03 al comparar dos métodos de cuidado de heridas. Si se fija un nivel de significación α = 0,05, ¿qué conclusión es CORRECTA?`,opts:{'A':`No hay diferencias significativas entre los métodos.`,'B':`Hay diferencias estadísticamente significativas entre los métodos.`,'C':`El resultado no es clínicamente significativo.`,'D':`Necesariamente uno de los métodos es mejor que el otro en la práctica.`}},
{n:471,texto:`Un investigador desea comparar la media de glucosa en sangre entre dos grupos de pacientes diabéticos (grupo control y grupo intervención) en un estudio con muestras pequeñas (n = 15 en cada grupo). ¿Cuál es el test estadístico más apropiado?`,opts:{'A':`ANOVA.`,'B':`Chi cuadrado.`,'C':`Test t de Student para muestras independientes.`,'D':`Correlación de Pearson.`}},
{n:472,texto:`En un estudio sobre la incidencia de infecciones nosocomiales, se clasificó a 250 pacientes según el tipo de infección (respiratoria, urinaria, herida quirúrgica) y la unidad hospitalaria (UCI, planta, ambulatorio). ¿Cuál es el test más apropiado para determinar si existe asociación entre estas dos variables categóricas?`,opts:{'A':`Test de chi cuadrado (χ²).`,'B':`Test t de Student.`,'C':`ANOVA.`,'D':`Test de Mann-Whitney.`}},
{n:473,texto:`En una investigación sobre la satisfacción de pacientes con la atención de enfermería (escala Likert 1-5), los datos NO siguen una distribución normal. ¿Cuál de los siguientes tests sería el más apropiado para comparar la satisfacción entre dos grupos?`,opts:{'A':`Test de Mann-Whitney (prueba NO paramétrica).`,'B':`ANOVA.`,'C':`Test t de Student.`,'D':`Test de correlación de Pearson.`}},
{n:474,texto:`¿Cuál de las siguientes afirmaciones sobre el tamaño muestral es CORRECTA?`,opts:{'A':`Un tamaño muestral mayor siempre garantiza resultados estadísticamente significativos.`,'B':`El tamaño muestral no influye en la amplitud del intervalo de confianza.`,'C':`El tamaño muestral solo es importante en estudios cualitativos.`,'D':`Un tamaño muestral mayor reduce el error estándar y hace más precisa la estimación del parámetro poblacional.`}},
{n:475,texto:`En una muestra de 80 pacientes con insuficiencia cardíaca se registra la cantidad de ingresos hospitalarios en el último año (variable de recuento). La distribución es muy asimétrica a la derecha, con pocos pacientes que han tenido muchos ingresos. ¿Qué medida de dispersión es más adecuada para acompañar a la mediana al describir esta variable?`,opts:{'A':`Desviación estándar.`,'B':`Varianza.`,'C':`Coeficiente de variación.`,'D':`Rango intercuartílico.`}},
{n:476,texto:`En un estudio de enfermería sobre niveles de ansiedad (escala cuantitativa) se obtienen los siguientes resultados: media 30 puntos, desviación estándar 5 puntos. Asumiendo distribución aproximadamente normal, ¿qué porcentaje aproximado de pacientes se espera que tenga niveles de ansiedad entre 25 y 35 puntos?`,opts:{'A':`Alrededor del 50 %`,'B':`Alrededor del 68 %`,'C':`Alrededor del 95 %`,'D':`Alrededor del 99 %`}},
{n:477,texto:`Según la Guía-Manual: Uso adecuado de los guantes sanitarios, ¿qué tipo de guantes se deben utilizar para la aspiración de secreciones en la Unidad de Cuidados Intensivos?`,opts:{'A':`No estériles de látex.`,'B':`No estériles de polímero.`,'C':`Estériles de vinilo.`,'D':`Estériles de nitrilo.`}},
{n:478,texto:`NO es una recomendación en el uso de guantes:`,opts:{'A':`Los guantes deben ser utilizados cuando sea necesario y el tiempo imprescindible ya que el abuso de empleo de los mismos confiere falsa seguridad y aumenta la contaminación cruzada.`,'B':`Las manos deben lavarse o descontaminarse antes de usar guantes, después no es necesario y estos no deben ser lavados ni reutilizados.`,'C':`Se deben utilizar siempre que el profesional sanitario presente cortes, heridas o lesiones cutáneas.`,'D':`Tener las manos libres de objetos como anillos, relojes, etc. porque pueden romper el guante, sin cremas, con las uñas cortas y sin esmalte, para facilitar una buena limpieza de material potencialmente infeccioso.`}},
{n:479,texto:`¿Cuál es el objetivo general de la Estrategia de Seguridad del Paciente 2021– 2030?`,opts:{'A':`Eliminar completamente los errores sanitarios.`,'B':`Minimizar los riesgos y daños evitables asociados a la atención sanitaria.`,'C':`Aumentar la eficiencia económica del sistema sanitario.`,'D':`Incrementar la satisfacción profesional del personal sanitario.`}},

{n:486,texto:`En pacientes institucionalizados con alto riesgo de caídas se puede considerar:`,opts:{'A':`Administrar vitamina D.`,'B':`Uso de sujeciones.`,'C':`Reposo absoluto.`,'D':`Barandillas sistemáticas.`}},

{n:491,texto:`Actualmente, la edad del consentimiento sexual en España es de:`,opts:{'A':`15 años.`,'B':`16 años.`,'C':`17 años.`,'D':`18 años.`}},
{n:492,texto:`En la actuación ante las agresiones sexuales es necesaria la coordinación interinstitucional. Por ello, cuando una mujer acude al hospital declarando una agresión sexual,`,opts:{'A':`Desde el Hospital se pondrá en conocimiento del Juzgado de guardia y se avisará también a la Policía Local en caso de existir intención de interponer una denuncia por parte de la mujer.`,'B':`Desde el Hospital se pondrá en conocimiento del Juzgado de guardia y en caso de querer interponer una denuncia la mujer deberá en cualquier caso desplazarse al Juzgado o Comisaria.`,'C':`Desde el Hospital se pondrá en conocimiento del Juzgado de guardia independientemente de que la mujer haya interpuesto o no una denuncia.`,'D':`Desde el Hospital se pondrá en conocimiento del Juzgado de guardia la situación únicamente en caso de existir intención de interponer una denuncia por parte de la mujer.`}},

{n:494,texto:`¿Dónde debe realizarse la valoración de una paciente con sospecha de agresión sexual reciente cuya situación de gravedad no obligue a un tratamiento médico inmediato?`,opts:{'A':`En el Juzgado de guardia.`,'B':`En el domicilio de la víctima.`,'C':`En un centro de Atención Primaria.`,'D':`En un centro hospitalario.`}},

{n:497,texto:`¿Cuáles son los tres niveles de actuación del Sistema Sanitario frente a la violencia de género?`,opts:{'A':`Prevención primaria, secundaria y terciaria.`,'B':`Diagnóstico, tratamiento y seguimiento.`,'C':`Atención primaria, hospitalaria y urgente.`,'D':`Atención médica, jurídica y social.`}},

{n:499,texto:`En la fase de precontemplación de la violencia de género, según el modelo de Prochaska y DiClemente, el objetivo principal es:`,opts:{'A':`Acompañar a la mujer para ayudar a determinar el mejor plan a seguir para poder introducir algunos cambios.`,'B':`Fomentar la duda sobre la aceptabilidad del maltrato.`,'C':`Aumentar la toma de conciencia y solucionar la incertidumbre a favor de establecer cambios.`,'D':`Acompañar a la mujer en sus acciones de cambio para que no se sienta sola y ayudarle a reafirmar su proceso.`}},
{n:500,texto:`¿Cuál de las siguientes actuaciones NO debe realizar el personal de Enfermería en la atención a mujeres en situación de violencia de género?`,opts:{'A':`Hacer una clara valoración del riesgo y asegurar un clima de confianza.`,'B':`Registrar la situación de violencia en la historia clínica y valorar, de forma individualizada, la necesidad de comunicación judicial en función del riesgo y del momento vital de la mujer.`,'C':`Proponer a la mujer la realización de terapia de pareja o mediación familiar, interpretando la violencia como un conflicto relacional.`,'D':`Priorizar la intervención inicial básica y posponer derivaciones hasta consensuarlas con la mujer, garantizando confidencialidad y continuidad asistencial.`}}];
let estado={},orden=PREGUNTAS.map(p=>p.n),modoFallos=false;
function cargarEstado(){try{const r=localStorage.getItem(STORAGE_KEY);if(r)estado=JSON.parse(r);}catch(e){estado={};}}
function guardarEstado(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(estado));}catch(e){}}
function calcularStats(){let ok=0,fail=0;PREGUNTAS.forEach(p=>{if(estado[p.n]){if(estado[p.n].correcto)ok++;else fail++;}});return{ok,fail,total:PREGUNTAS.length};}
function actualizarHeader(){const s=calcularStats();const r=s.ok+s.fail;document.getElementById('barraFill').style.width=(r/s.total*100)+'%';document.getElementById('progresoTexto').textContent=r+' / '+s.total;document.getElementById('statOk').textContent=s.ok+' correctas';document.getElementById('statFail').textContent=s.fail+' incorrectas';}
function renderizar(){
  const c=document.getElementById('contenedor');c.innerHTML='';
  const s=calcularStats();
  if(s.ok+s.fail===s.total&&!modoFallos){const pct=Math.round(s.ok/s.total*100);const b=document.createElement('div');b.className='banner-completado';b.innerHTML=`<h2>🎉 ¡Batería completa! 500 preguntas</h2><div class="puntuacion">${s.ok}/${s.total}</div><p>${pct}% de acierto · Preguntas 451–500 · Enfermería</p>`;c.appendChild(b);}
  const pm=modoFallos?PREGUNTAS.filter(p=>estado[p.n]&&!estado[p.n].correcto):orden.map(n=>PREGUNTAS.find(p=>p.n===n));
  if(modoFallos&&pm.length===0){c.innerHTML+='<div style="text-align:center;padding:40px;color:var(--gris);font-family:Syne,sans-serif;">¡No hay preguntas falladas! 🎯</div>';return;}
  pm.forEach(pregunta=>{
    if(!pregunta)return;
    const resp=RESPUESTAS[pregunta.n];const est=estado[pregunta.n];const resuelta=!!est;
    const card=document.createElement('div');card.className='pregunta-card'+(resuelta?(' resuelta'+(est.correcto?'':' fallo')):'');card.id='p'+pregunta.n;
    let html=`<div class="pregunta-num">Pregunta ${pregunta.n}</div><div class="pregunta-texto">${pregunta.n}.- ${pregunta.texto}</div><div class="opciones">`;
    Object.entries(pregunta.opts).forEach(([letra,texto])=>{
      let cls='opcion-btn';let disabled=resuelta?'disabled':'';
      if(resuelta){if(letra===resp){cls+=est.elegida===letra?' correcta':' correcta-marcada';}else if(letra===est.elegida&&!est.correcto){cls+=' incorrecta';}}
      html+=`<button class="${cls}" ${disabled} onclick="responder(${pregunta.n},'${letra}')"><span class="letra">${letra})</span>${texto}</button>`;
    });
    html+=`</div>`;
    if(resuelta){html+=est.correcto?`<div class="resultado-badge badge-ok">✓ Correcto</div>`:`<div class="resultado-badge badge-error">✗ Incorrecto — Respuesta: ${resp}</div>`;}
    card.innerHTML=html;c.appendChild(card);
  });
}
function responder(num,letra){if(estado[num])return;const resp=RESPUESTAS[num];estado[num]={elegida:letra,correcto:letra===resp};guardarEstado();actualizarHeader();renderizar();setTimeout(()=>{const el=document.getElementById('p'+num);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});},100);}
function resetearTodo(){if(!confirm('¿Seguro que quieres reiniciar todo el progreso de este lote?'))return;estado={};guardarEstado();modoFallos=false;orden=PREGUNTAS.map(p=>p.n);actualizarHeader();renderizar();}
function mostrarSoloFallos(){modoFallos=!modoFallos;renderizar();}
function ordenAleatorio(){modoFallos=false;orden=[...PREGUNTAS.map(p=>p.n)].sort(()=>Math.random()-0.5);renderizar();window.scrollTo({top:0,behavior:'smooth'});}
cargarEstado();actualizarHeader();renderizar();
</script>
