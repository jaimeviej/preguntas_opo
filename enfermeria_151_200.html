<script>
const STORAGE_KEY='enfermeria_q151_200';
const RESPUESTAS={151:'C',152:'B',153:'C',154:'D',155:'A',156:'D',157:'B',158:'A',159:'D',160:'B',161:'C',162:'D',163:'C',164:'C',165:'D',166:'B',167:'B',168:'B',169:'D',170:'D',171:'B',172:'C',173:'A',174:'D',175:'C',176:'A',177:'D',178:'B',179:'A',180:'D',181:'A',182:'B',183:'A',184:'D',185:'A',186:'C',187:'D',188:'C',189:'A',190:'D',191:'B',192:'C',193:'B',194:'D',195:'C',196:'D',197:'D',198:'A',199:'C',200:'C'};
const PREGUNTAS=[{n:151,texto:`En el postparto, a todas las mujeres Rh negativas que cumplen unos requisitos específicos:`,opts:{'A':`Hay que administrarles globulina inmunitaria Rh (RhoROL) en las 24 horas posteriores al parto para prevenir la sensibilización por la transfusión materno-fetal de hematíes fetales Rh positivos.`,'B':`Hay que administrarles globulina inmunitaria Rh (RhoIGM) en las 72 horas posteriores al parto para prevenir la sensibilización por la transfusión materno- fetalde hematíes fetales Rh positivos.`,'C':`Hay que administrarles globulina inmunitariaRh (RhoGAM) en las 72 horas posteriores al parto para prevenir la sensibilización por la transfusión materno- fetalde hematíes fetales Rh positivos.`,'D':`Hay que administrarles globulina inmunitariaRh (RhoGAM) en las 24 horas posteriores al parto para prevenir la sensibilización por la transfusión materno- fetalde hematíes fetales Rh positivos.`}},
{n:152,texto:`En relación con la alimentación durante el embarazo, es correcto afirmar que:`,opts:{'A':`Se deben duplicar las calorías ingeridas.`,'B':`Se recomienda la suplementación con ácido fólico y hierro.`,'C':`Las mayores necesidades de vitaminas y minerales pueden cubrirse mediante. suplementación.`,'D':`Se recomienda una dieta equilibrada adaptada estacionalmente.`}},
{n:153,texto:`Las contracciones de Braxton Hicks se caracterizan por ser:`,opts:{'A':`Contracciones uterinas intermitentes no dolorosas que aparecen cada 10 ó 20 minutos. Se presentan con mayor frecuencia hacia el término de la gestación, y a veces se confunden con verdaderos signos de parto.`,'B':`Contracciones uterinas intermitentes dolorosas que aparecen cada 10 ó 20 minutos. Se presentan con mayor frecuencia hacia el inicio de la gestación, y a veces se confunden con verdaderos signos de parto.`,'C':`Contracciones uterinas intermitentes no dolorosas que aparecen cada 10 ó 20 minutos. Se presentan con mayor frecuencia hacia el término de la gestación, y no se confunden con verdaderos signos de parto.`,'D':`Contracciones uterinas intermitentes dolorosas que aparecen cada 10 ó 20 minutos. Se presentan con mayor frecuencia hacia la mitad de la gestación, y a veces se confunden con verdaderos signos de parto.`}},
{n:154,texto:`Señale la afirmación CORRECTA sobre la miocardiopatía perinatal.`,opts:{'A':`Su tratamiento incluye digoxina, adrenérgicos, los vasodilatadores necesarios, hemorreológicos, y un estricto reposo en cama.`,'B':`Los síntomas son semejantes a los de la insuficiencia respiratoria adquirida en la comunidad: disnea, ortopnea, cansancio, tos, dolor torácico y edema.`,'C':`No está desaconsejado un nuevo embarazo porque la enfermedad no tiende a recidivar durante la gestación.`,'D':`Consiste en una disfunción del ventrículo izquierdo que se produce en el último mes de la gestación o en los 5 primeros meses del puerperio.`}},
{n:155,texto:`Se consideran las principales causas de depresión posparto:`,opts:{'A':`Adaptaciones psicológicas y los factores hormonales.`,'B':`La fatiga, la incomodidad.`,'C':`La incomodidad y la sobreestimulación.`,'D':`Factores hormonales y la sobreestimulación.`}},
{n:156,texto:`Son cambios maternales correspondientes a las 24 semanas de gestación:`,opts:{'A':`El feto desciende a la pelvis materna (encajamiento). La placenta es casi cuatro veces más gruesa que hace 20 semanas y pesa casi 10 kg. La madre está deseando parir, puede tener accesos finales de energía. Aumentan las lumbalgias y la frecuencia urinaria. Las contracciones de Braxton Hicks se intensifican mientras el cérvix y el segmento uterino inferior se preparan para el parto. La pareja puede visitar las salas de dilatación y de parto.`,'B':`El fondo uterino llega a la altura del ombligo. Las mamas empiezan a secretar calostro. La bolsa amniótica contiene unos400 mL de líquido. La mujer puede marearse y desvanecerse, especialmente al cambiar bruscamente de postura. Pueden empezar a aparecer varices venosas. La mujer percibe los movimientos del feto y el embarazo puede parecerle “más real” de repente. Las aréolas se oscurecen. Puede aparecer congestión nasal. Pueden empezar a producirse calambres en las piernas. Puede producirse estreñimiento.`,'C':`El fondo uterino alcanza la apófisis xifoides; las mamas están hinchadas y sensibles. Puede reaparecer la polaquiuria. Pueden hincharse los tobillos y aparecer problemas para dormir. Puede producirse disnea.`,'D':`El fondo uterino se sitúa por encima del ombligo. Puede producirse lumbalgia y calambres en las piernas. La piel puede sufrir cambios, como estrías gravídicas, cloasma, línea negra, acné, eritema palmar y plantar. Pueden producirse hemorragias nasales. El crecimiento del útero puede provocar prurito abdominal; seguirá hasta el término de la gestación.`}},
{n:157,texto:`En relación a los principales mecanismos fisiológicos de regulación renal. ¿Cuál de las siguientes afirmaciones es CORRECTA?`,opts:{'A':`La regulación de la excreción de agua depende principalmente de la aldosterona, que ajusta el volumen urinario en función de la ingesta hídrica diaria.`,'B':`La regulación de la excreción de solutos implica que, en condiciones normales, la cantidad de electrolitos excretados diariamente es igual a la cantidad ingerida, estando el sodio bajo control hormonal de la aldosterona.`,'C':`La regulación del equilibrio ácido-base se basa fundamentalmente en la eliminación pulmonar del dióxido de carbono, siendo mínima la participación renal en la excreción de ácidos.`,'D':`La regulación de la presión arterial renal se produce por vasodilatación directa de los glomérulos en respuesta al aumento de la presión arterial sistémica, sin participación hormonal.`}},
{n:158,texto:`Durante la valoración de enfermería, se identifican antecedentes personales que pueden aumentar el riesgo de alteraciones renales o urológicas. ¿Cuál de las siguientes asociaciones entre enfermedad sistémica y complicación renal es CORRECTA?`,opts:{'A':`Lupus eritematoso sistémico → Nefritis y enfermedad renal crónica.`,'B':`Embarazo → Incontinencia urinaria permanente por daño neurológico.`,'C':`Esclerosis múltiple → Insuficiencia renal aguda por hipoperfusión renal.`,'D':`Radioterapia de la pelvis → Formación de cálculos renales de oxalato cálcico.`}},
{n:159,texto:`Un paciente con insuficiencia renal crónica avanzada presenta deterioro progresivo del estado mental, dificultades de concentración y alteraciones del nivel de conciencia compatibles con encefalopatía urémica crónica. Desde la perspectiva del tratamiento, ¿cuál de las siguientes afirmaciones es CORRECTA?`,opts:{'A':`La encefalopatía urémica crónica se trata fundamentalmente mediante la restricción hídrica y el ajuste dietético, sin necesidad de terapia de reemplazo renal.`,'B':`El tratamiento de elección consiste en la administración intravenosa de bicarbonato para corregir la acidosis metabólica y mejorar el estado neurológico.`,'C':`La hemodiálisis solo está indicada en casos de encefalopatía aguda, no siendo útil en alteraciones neurológicas crónicas asociadas a uremia.`,'D':`La diálisis actúa como tratamiento de soporte vital al eliminar productos de desecho y desequilibrios electrolíticos responsables de la encefalopatía urémica.`}},
{n:160,texto:`En pacientes con insuficiencia renal crónica en tratamiento con hemodiálisis, ¿cuál de las siguientes afirmaciones sobre el manejo de las proteínas en la dieta es CORRECTA?`,opts:{'A':`Debe restringirse de forma estricta, independientemente del tratamiento sustitutivo, para evitar la acumulación de productos nitrogenados.`,'B':`Debe aumentarse la ingesta proteica para prevenir la desnutrición proteico- energética asociada a la uremia y a las pérdidas durante la diálisis.`,'C':`Debe basarse preferentemente en proteínas vegetales, ya que aportan un mayor valor biológico que las proteínas animales.`,'D':`Puede reducirse la ingesta proteica siempre que el aporte calórico total de la dieta sea suficiente.`}},
{n:161,texto:`Un paciente de 68 años ingresa por vómitos y diarrea de varios días de evolución. En la analítica se observa aumento de urea y creatinina, con una relación urea/creatinina claramente elevada. La diuresis está disminuida. En el estudio de orina se objetivan sodio urinario < 20 mEq/L, osmolalidad urinaria elevada y sedimento urinario sin alteraciones significativas. Según estos datos, ¿qué tipo de lesión renal aguda es la más probable?`,opts:{'A':`Lesión renal aguda intrarrenal.`,'B':`Lesión renal aguda posrenal.`,'C':`Lesión renal aguda prerrenal.`,'D':`Lesión renal aguda por daño parenquimatoso tubular.`}},
{n:162,texto:`¿Cuál de las siguientes NO corresponde a una causa de insuficiencia renal prerrenal?`,opts:{'A':`Pérdidas gastrointestinales por vómitos y diarrea.`,'B':`Hemorragia aguda.`,'C':`Insuficiencia cardiaca con disminución del gasto cardíaco.`,'D':`Obstrucción de las vías urinarias por hiperplasia prostática benigna.`}},
{n:163,texto:`En relación con los ejercicios de los músculos pélvicos en el tratamiento de la incontinencia urinaria, ¿cuál de las siguientes afirmaciones es CORRECTA?`,opts:{'A':`Los ejercicios de Kegel fortalecen exclusivamente la musculatura del suelo pélvico en mujeres y no se recomiendan en hombres.`,'B':`Los ejercicios de Kegel deben realizarse únicamente durante fases activas de contracción, sin periodos de reposo, para ser eficaces.`,'C':`Los ejercicios de Kegel consisten en contracciones voluntarias de 5–10 segundos seguidas de fases de reposo, y deben realizarse varias veces al día durante al menos 6 semanas.`,'D':`La eficacia de los ejercicios de Kegel depende principalmente de la estimulación eléctrica asociada, siendo poco útiles cuando se realizan de forma aislada.`}},
{n:164,texto:`En relación con los tipos de incontinencia urinaria, señale la afirmación FALSA:`,opts:{'A':`Incontinencia urinaria de esfuerzo: pérdida involuntaria de orina a través de una uretra intacta asociada a aumentos de la presión abdominal, como al toser, estornudar o cambiar de posición, relacionada con un menor soporte del suelo pélvico.`,'B':`Incontinencia urinaria de urgencia: pérdida involuntaria de orina asociada a un deseo urgente de orinar que no puede ser suprimido, generalmente precipitada por una contracción no inhibida del detrusor, incluso en ausencia de disfunción neurológica evidente.`,'C':`Incontinencia urinaria funcional: pérdida involuntaria de orina causada por alteraciones estructurales de la vejiga o la uretra, con vías urinarias inferiores intactas pero incapacidad del esfínter para mantener la continencia.`,'D':`Incontinencia urinaria iatrogénica: pérdida involuntaria de orina secundaria a factores médicos externos, especialmente fármacos, que alteran los mecanismos de cierre uretral o aumentan la presión intravesical.`}},
{n:165,texto:`En relación con los factores de riesgo de la incontinencia urinaria, señale la opción FALSA:`,opts:{'A':`Demencia.`,'B':`Inmovilidad.`,'C':`Furosemida.`,'D':`Ejercicio aeróbico.`}},
{n:166,texto:`Durante el sondaje vesical permanente, la enfermera debe aplicar medidas para reducir el riesgo de infección urinaria asociada a la sonda. ¿Cuál de las siguientes actuaciones NO es correcta?`,opts:{'A':`Mantener la bolsa colectora por debajo del nivel de la vejiga.`,'B':`Irrigar la sonda de forma rutinaria para evitar obstrucciones.`,'C':`Realizar higiene de manos antes y después de manipular el sistema.`,'D':`Mantener el sistema de drenaje cerrado y sin desconexiones innecesarias.`}},
{n:167,texto:`En relación con la estimación clínica del llenado de la vejiga, ¿cuál de las siguientes afirmaciones NO es correcta?`,opts:{'A':`La vejiga normalmente no es palpable hasta que contiene más de 150 ml de orina.`,'B':`La percusión suprapúbica suele producir un sonido hueco en condiciones normales.`,'C':`Cuando la vejiga contiene aproximadamente 500 ml, puede apreciarse un abultamiento suprapúbico.`,'D':`El dolor aparece de forma precoz, antes de alcanzar la capacidad total vesical.`}},
{n:168,texto:`Durante la revisión del plan de cuidados enfermeros en un paciente con sonda urinaria permanente, te encuentras revisando las intervenciones dirigidas a prevenir la infección urinaria asociada a la sonda. ¿Cuál de las siguientes actuaciones NO es correcta según las recomendaciones actuales?`,opts:{'A':`Cambiar la sonda urinaria cuando exista obstrucción del flujo para corregir problemas de filtración.`,'B':`Sustituir la bolsa colectora cada 8 horas de forma sistemática para reducir la carga bacteriana.`,'C':`Mantener el tubo de drenaje sin acodamientos para asegurar un flujo continuo de orina.`,'D':`Evitar la irrigación rutinaria de la sonda salvo indicación clínica específica.`}},
{n:169,texto:`Durante la realización de un sondaje vesical, la enfermera debe adaptar la técnica según las diferencias anatómicas entre hombres y mujeres. ¿Cuál de las siguientes afirmaciones es CORRECTA?`,opts:{'A':`En la mujer, la menor longitud de la uretra permite un sondaje más rápido y con menor riesgo de lesión.`,'B':`En el varón, la menor longitud de la uretra permite un sondaje más rápido y con menor riesgo de lesión.`,'C':`En la mujer, se recomienda inflar el balón inmediatamente tras la aparición de orina.`,'D':`En el varón, es necesario avanzar la sonda varios centímetros después de la aparición de orina antes de inflar el balón.`}},
{n:170,texto:`El sitio más frecuente para la epistaxis es el tabique anterior. ¿Cuál de los siguientes vasos sanguíneos NO está implicado en este tipo de epistaxis?`,opts:{'A':`Arteria etmoidal anterior.`,'B':`Rama septal de la arteria labial superior.`,'C':`Arteria palatina mayor.`,'D':`Arteria esfenopalatina en la region postoinferior.`}},
{n:171,texto:`En relación con el manejo inicial de la epistaxis anterior, ¿cuál de las siguientes medidas NO es correcta?`,opts:{'A':`Colocar al paciente en posición sentada, con la cabeza inclinada hacia adelante.`,'B':`Aplicar presión directa comprimiendo la parte dura externa de la nariz contra el tabique nasal.`,'C':`Mantener la compresión nasal continua durante al menos 5–10 minutos.`,'D':`Utilizar un descongestionante nasal en aerosol, como la fenilefrina, para favorecer la vasoconstricción.`}},
{n:172,texto:`Tras un episodio de epistaxis, la enfermera realiza educación sanitaria orientada a prevenir nuevos sangrados. ¿Cuál de las siguientes recomendaciones SÍ debe incluirse en la capacitación del paciente sobre su autocuidado?`,opts:{'A':`Reanudar el ejercicio físico intenso a las 24 horas si no reaparece el sangrado.`,'B':`Aplicar calor local sobre el dorso nasal para favorecer la vasodilatación y la cicatrización.`,'C':`Evitar alimentos calientes y el consumo de tabaco durante varios días tras el episodio.`,'D':`Sonarse la nariz con fuerza para eliminar coágulos residuales y prevenir recurrencias.`}},
{n:173,texto:`Durante una valoración auditiva, una enfermera revisa el resultado de una audiometría tonal de un paciente adulto. El informe muestra una pérdida auditiva de 10 dB en el oído derecho. Según la clasificación por decibelios, ¿cómo debe interpretarse este hallazgo?`,opts:{'A':`Audición normal`,'B':`Pérdida auditiva leve.`,'C':`Pérdida auditiva moderada.`,'D':`Pérdida auditiva grave.`}},
{n:174,texto:`Durante la valoración de un paciente con sospecha de pérdida auditiva conductiva, la enfermera repasa posibles causas relacionadas con el oído externo y medio. ¿Cuál de las siguientes NO se asocia a una pérdida auditiva conductiva?`,opts:{'A':`Tapones de cerumen`,'B':`Otitis externa`,'C':`Otosclerosis del oído medio`,'D':`Daño del nervio vestíbulo-coclear`}},
{n:175,texto:`En relación con la otitis externa, señale la afirmación CORRECTA:`,opts:{'A':`Es una infección del oído medio caracterizada por dolor retroauricular y perforación timpánica.`,'B':`Se produce principalmente por infecciones bacterianas (Aspergillus).`,'C':`Se presenta con prurito, dolor al movilizar el pabellón auricular, exudado y posible disminución de la audición.`,'D':`Se recomienda limpiar el conducto auditivo externo con hisopos de algodón.`}},
{n:176,texto:`En la valoración de un paciente con dolor de oído, la enfermera debe diferenciar entre otitis externa y otitis media aguda. ¿Cuál de las siguientes afirmaciones es CORRECTA según las características clínicas de ambos cuadros clínicos?`,opts:{'A':`En la otitis media, aparece otalgia que se alivia cuando se rompe la membrana timpánica.`,'B':`En la otitis media aguda cursa con edema del conducto auditivo externo.`,'C':`En la otitis externa es habitual la presencia de fiebre y síntomas de infección respiratoria alta.`,'D':`La pérdida auditiva es de tipo neurosensorial en la otitis media aguda y conductiva en la otitis externa.`}},
{n:177,texto:`Tras una cirugía de oído medio o mastoides, la enfermera proporciona educación sanitaria al paciente sobre los cuidados postoperatorios. ¿Cuál de las siguientes intervenciones NO es correcta?`,opts:{'A':`Evitar sonarse la nariz durante las primeras 2–3 semanas tras la cirugía.`,'B':`Estornudar y toser con la boca abierta durante varias semanas después de la intervención.`,'C':`Considerar normales las sensaciones de chasquido o crepitación en el oído intervenido durante los primeros días.`,'D':`Irrigar el oído intervenido con suero fisiológico si aparece sensación de taponamiento.`}},
{n:178,texto:`En relación con la otitis media aguda (OMA) en lactantes, ¿cuál de las siguientes afirmaciones es CORRECTA?`,opts:{'A':`La principal causa de OMA en lactantes es la inmadurez del sistema inmunitario, independientemente de la anatomía de la trompa de Eustaquio.`,'B':`La trompa de Eustaquio más corta, horizontal y ancha en los lactantes facilita el reflujo de líquido y bacterias desde la nasofaringe al oído medio.`,'C':`La alimentación con biberón reduce el riesgo de OMA al favorecer una deglución más eficaz en posición supina.`,'D':`La posición horizontal del lactante durante el sueño disminuye la posibilidad de que la infección alcance el oído medio.`}},
{n:179,texto:`En relación con el colesteatoma como complicación de la otitis media, ¿cuál de las siguientes afirmaciones es CORRECTA?`,opts:{'A':`Se trata de una lesión del oído medio, generalmente asociada a otitis media crónica, que puede producir erosión ósea progresiva y pérdida auditiva.`,'B':`Es una complicación aguda de la otitis media que cursa típicamente con dolor intenso, fiebre elevada y otorrea purulenta de inicio brusco.`,'C':`Su desarrollo depende fundamentalmente de infecciones virales repetidas del oído medio y suele resolverse con tratamiento antibiótico sistémico prolongado.`,'D':`Es una lesión inflamatoria benigna que rara vez produce complicaciones locales o intracraneales y no requiere tratamiento quirúrgico.`}},
{n:180,texto:`En relación con los trastornos del equilibrio y del oído interno, señale la definición INCORRECTA:`,opts:{'A':`Laberintitis: inflamación del laberinto del oído interno, de origen viral o bacteriano, que puede afectar tanto a la audición como al equilibrio y, en ocasiones, aparecer como complicación de una otitis media.`,'B':`Enfermedad de Ménière: trastorno del oído interno caracterizado por un desequilibrio en los líquidos endolinfáticos, con aumento de la presión endolinfática, que provoca episodios de vértigo, alteraciones auditivas y acúfenos.`,'C':`Vértigo: percepción errónea o ilusión de movimiento de la persona o de su entorno, que suele describirse como una sensación de giro y se asocia a alteraciones del sistema vestibular.`,'D':`Mareo: alteración del equilibrio causada por una lesión inflamatoria del laberinto del oído interno, que provoca sensación rotatoria intensa.`}},
{n:181,texto:`En relación con la enfermedad de Ménière, ¿cuál de las siguientes combinaciones de síntomas es la CORRECTA?`,opts:{'A':`Vértigo episódico, hipoacusia fluctuante y acúfenos.`,'B':`Mareo continuo, otalgia intensa y fiebre.`,'C':`Inestabilidad postural, diplopía y cefalea persistente.`,'D':`Pérdida auditiva conductiva, vértigo y dolor auricular.`}},
{n:182,texto:`Una mujer de 52 años diagnosticada de enfermedad de Ménière acude a consulta de enfermería para reforzar las recomendaciones dietéticas. Refiere que ha reducido la sal “de mesa”, pero continúa con síntomas fluctuantes. ¿Cuál de las siguientes intervenciones NO es adecuada dentro del plan educativo enfermero?`,opts:{'A':`Recomendar la distribución regular de comidas y tentempiés a lo largo del día para evitar cambios bruscos en el volumen de líquidos del oído interno.`,'B':`Aconsejar limitar alimentos procesados y enlatados por su alto contenido en potasio.`,'C':`Evitar el consumo de cafeína y bebidas carbonatadas por su efecto diurético.`,'D':`Advertir sobre el consumo de alimentos ricos en glutamato monosódico, por su posible relación con el empeoramiento de los síntomas.`}},
{n:183,texto:`En relación con el mantenimiento de un catéter periférico corto, ¿cuál de las siguientes actuaciones es la más adecuada para disminuir el riesgo de infección y complicaciones asociadas al acceso venoso periférico?`,opts:{'A':`Cambiar el bioconector siempre que se cambie el catéter o, como máximo, cada 7 días.`,'B':`Limpiar siempre el bioconector con solución de Clorhexidina alcohólica >2% en alcohol isopropílico al 75% o alcohol isopropílico de 75%.`,'C':`Observar el punto de inserción al menos una vez al día y realizar cura inmediata si el apósito está sucio, mojado o despegado.`,'D':`Si se exterioriza parcialmente el catéter periférico corto, puede reintroducirse con técnica aséptica si la salida es inferior a 0,5 cm.`}},
{n:184,texto:`¿En cuál de estos casos NO está indicada la vía venosa periférica?`,opts:{'A':`Paciente con capital venoso preservado.`,'B':`Terapia intravenosa prevista inferior a 7 días.`,'C':`Administración de sustancias no vesicantes ni irritantes con pH entre 5 y 9.`,'D':`Administración de soluciones con osmolaridad inferior a 600 mOsm/L.`}},
{n:185,texto:`Según las características de los catéteres centrales de inserción periférica (PICC), ¿cuál de las siguientes afirmaciones es CORRECTA?`,opts:{'A':`El PICC de punta abierta con válvula proximal impide el reflujo sanguíneo hacia la punta del catéter y no puede utilizarse para monitorización de la presión venosa central.`,'B':`El PICC Groshong (punta cerrada con válvula distal) es apto para medición de PVC.`,'C':`El PICC de punta abierta no valvulado (con pinza) no permite monitorización de PVC.`,'D':`Los PICC de silicona tienen paredes más finas que los de poliuretano, por lo que aumentan la luz interna para el mismo French (Fr).`}},
{n:186,texto:`En relación con los cuidados extraluminales e intraluminales de los catéteres centrales de inserción periférica (PICC), ¿cuál de las siguientes afirmaciones es CORRECTA?`,opts:{'A':`En PICC en reposo, el lavado intraluminal debe realizarse diariamente con 5 ml de suero fisiológico para mantener la permeabilidad.`,'B':`En infusión continua, no se recomienda el lavado intraluminal hasta finalizar el tratamiento, dado que el flujo continuo evita obstrucciones.`,'C':`Se recomienda que todos los PICC dispongan de bioconector, incluso en perfusión continua.`,'D':`En infusión intermitente, el lavado intraluminal se realizará únicamente al final del día, independientemente del número de usos.`}},
{n:187,texto:`A la hora de realizar la cura de una herida con sutura (puntos), el/la profesional de enfermería deberá:`,opts:{'A':`Cortar el hilo de sutura por debajo del punto, alejado del nudo.`,'B':`Cortar el hilo de sutura por debajo del punto y lo más próximo posible al nudo.`,'C':`Cortar el hilo de sutura por encima del punto, alejado del nudo.`,'D':`Cortar el hilo de sutura por encima del punto y lo más próximo posible al nudo.`}},
{n:188,texto:`En la fase preoperatoria de un/a paciente quirúrgico/a, se realizan diversas intervenciones orientadas a la preparación y verificación clínica. ¿Cuál de las siguientes intervenciones NO se lleva a cabo en dicha fase?`,opts:{'A':`Anamnesis.`,'B':`Revisión de pruebas de laboratorio.`,'C':`Verbalización formal del protocolo “paciente correcto, procedimiento correcto, sitio correcto”.`,'D':`Evaluación física.`}},
{n:189,texto:`Según el sistema de puntuación de recuperación postanestesia de Aldrete, ¿en cuál de los siguientes escenarios el/la paciente cumple criterios para el alta de la Unidad de Recuperación Postanestésica (URPA), considerando que se requiere una puntuación total igual o mayor a 9?`,opts:{'A':`Paciente que mueve voluntariamente las cuatro extremidades, presenta tensión arterial dentro de ± 20 mmHg del valor preanestésico, está totalmente despierto, mantiene una spO2 >92% con aire ambiente y respira normalmente sin dificultad.`,'B':`Paciente que mueve voluntariamente dos extremidades, presenta tensión arterial dentro de ± 40 mmHg del valor preanestésico, se despierta al llamarlo, requiere de oxígeno suplementario para mantener spO2 >90% y presenta respiración superficial.`,'C':`Paciente que mueve voluntariamente las cuatro extremidades, presenta tensión arterial > 50 mmHg del valor preanestésico, se despierta al llamarlo, requiere de oxígeno suplementario para mantener spO2 >90% y presenta respiración superficial.`,'D':`Paciente que mueve voluntariamente dos extremidades, presenta tensión arterial dentro de ± 45 mmHg del valor preanestésico, se despierta al llamarlo, requiere de oxígeno suplementario y respira normalmente sin dificultad.`}},
{n:190,texto:`Durante el seguimiento clínico del paciente en la sala de recuperación postanestésica, ¿cuál es la secuencia correcta para el control de las constantes vitales y la valoración del dolor tras la cirugía?`,opts:{'A':`Control cada 30 minutos hasta la estabilización, posteriormente cada hora durante 6 horas y después cada 8 horas durante 48 horas.`,'B':`Valoración cada 10 minutos durante la primera hora, posteriormente cada 2 horas durante 12 horas y después cada 6 horas durante 72 horas.`,'C':`Monitorización continua durante las primeras 4 horas, seguida de controles cada 2 horas durante las siguientes 24 horas.`,'D':`Evaluación cada 15 minutos hasta la estabilización, posteriormente cada 30 minutos durante 2 horas, cada hora durante 4 horas y, finalmente, cada 4 horas durante 24– 48 horas.`}},
{n:191,texto:`Al realizar un balance hídrico de un paciente y considerando los aportes y pérdidas medias diarias de líquidos en un adulto sano, ¿cuál de las siguientes afirmaciones es correcta?`,opts:{'A':`Las pérdidas urinarias habituales representan aproximadamente 800 ml al día, siendo el principal mecanismo de eliminación hídrica.`,'B':`La producción endógena de agua derivada del catabolismo de proteínas, carbohidratos y grasas aporta aproximadamente 300 ml diarios.`,'C':`Las pérdidas a través de la piel son inferiores a 200 ml diarios en condiciones normales.`,'D':`La eliminación hídrica por vía fecal constituye la principal fuente de pérdida de líquidos, superando los 600 ml diarios.`}},
{n:192,texto:`El denominado “tercer espacio” se refiere al desplazamiento del líquido desde el espacio extracelular hacia compartimentos no funcionales, donde no contribuye al equilibrio hídrico entre el líquido intracelular y extracelular. En este contexto, ¿cuál de los siguientes conjuntos de signos y síntomas es más indicativo de la formación de tercer espacio?`,opts:{'A':`Aumento del volumen urinario, hipertensión arterial, elevación de la presión venosa central y pérdida de peso.`,'B':`Disminución de la frecuencia cardíaca, aumento de la presión arterial, edemas y balance hídrico positivo.`,'C':`Oliguria, hipotensión, disminución de la presión venosa central, edema y aumento ponderal.`,'D':`Poliuria, hipotensión, disminución de la presión venosa central, bradicardia y desequilibrio entre ingresos y egresos de líquidos.`}},
{n:193,texto:`Durante la administración de anestesia general en el contexto quirúrgico, el personal de enfermería debe conocer las características clínicas de cada una de sus etapas para garantizar la seguridad del paciente. ¿Cuál de las siguientes afirmaciones describe correctamente las manifestaciones y cuidados prioritarios en cada fase anestésica?`,opts:{'A':`En la etapa I predominan la inconsciencia profunda y la inmovilidad.`,'B':`La etapa II se caracteriza por agitación psicomotriz que incluye manifestaciones variables como gritos, risa o llanto.`,'C':`Durante la etapa III el paciente presenta midriasis fija, pulso débil y riesgo elevado de paro respiratorio.`,'D':`La etapa IV el paciente presenta sudoración profusa, sialorrea, hipertensión y taquipnea.`}},
{n:194,texto:`Durante la administración y el seguimiento de un paciente sometido a anestesia raquídea, ¿cuál de las siguientes afirmaciones describe correctamente sus características clínicas y los cuidados posteriores más relevantes?`,opts:{'A':`La anestesia raquídea se administra habitualmente en el espacio subaracnoideo a nivel de L2–L3 y produce un bloqueo progresivo descendente desde el abdomen hacia las extremidades inferiores.`,'B':`La cefalea posterior a la anestesia raquídea se previene fundamentalmente mediante la sedestación precoz y la estimulación de la deambulación temprana.`,'C':`La colocación del paciente en posición semisentada inmediatamente tras la punción favorece un mayor nivel de bloqueo y reduce las complicaciones neurológicas.`,'D':`Tras la punción subaracnoidea lumbar, el bloqueo suele iniciarse en los dedos y el perineo, progresa hacia las extremidades inferiores y el abdomen.`}},
{n:195,texto:`En el contexto de las técnicas de anestesia regional empleadas en el ámbito quirúrgico, ¿cuál de las siguientes afirmaciones describe correctamente una característica propia de la anestesia epidural?`,opts:{'A':`La anestesia epidural se administra en el espacio subaracnoideo tras atravesar la duramadre, utilizando dosis bajas de anestésico local.`,'B':`La anestesia epidural produce exclusivamente bloqueo sensitivo, sin afectar la función motora ni autonómica.`,'C':`La anestesia epidural requiere dosis más elevadas que la anestesia raquídea y presenta menor riesgo de cefalea postpunción.`,'D':`La anestesia epidural se caracteriza por un inicio inmediato del bloqueo debido al contacto directo del anestésico con la médula espinal.`}},
{n:196,texto:`¿Qué característica define mejor a la enfermedad neoplásica maligna?`,opts:{'A':`Crecimiento lento y encapsulado.`,'B':`Regresión espontánea.`,'C':`Dependencia hormonal exclusiva.`,'D':`Capacidad de invasión y metástasis.`}},
{n:197,texto:`En la administración de quimioterapia vesicante prolongada se recomienda:`,opts:{'A':`Vía intramuscular.`,'B':`Vía subcutánea.`,'C':`Vía oral.`,'D':`Catéter venoso central.`}},
{n:198,texto:`¿Cuál es un efecto secundario frecuente derivado de la mielosupresión?`,opts:{'A':`Trombocitopenia.`,'B':`Hipertensión.`,'C':`Hiperglucemia.`,'D':`Retención urinaria.`}},
{n:199,texto:`¿Qué equipo es obligatorio para preparar quimioterapia?`,opts:{'A':`Doble guante de nitrilo.`,'B':`Cabina de flujo laminar convencional.`,'C':`Gabinete de seguridad biológica clase II o III.`,'D':`Mascarilla quirúrgica simple.`}},
{n:200,texto:`Durante la primera hora de infusión de citostáticos, suelen aparecer:`,opts:{'A':`Daño renal.`,'B':`Necrosis tisular.`,'C':`Reacciones de hipersensibilidad.`,'D':`Náuseas, vómitos intensos, diarrea y mucositis.`}}];
let estado={},orden=PREGUNTAS.map(p=>p.n),modoFallos=false;
function cargarEstado(){try{const r=localStorage.getItem(STORAGE_KEY);if(r)estado=JSON.parse(r);}catch(e){estado={};}}
function guardarEstado(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(estado));}catch(e){}}
function calcularStats(){let ok=0,fail=0;PREGUNTAS.forEach(p=>{if(estado[p.n]){if(estado[p.n].correcto)ok++;else fail++;}});return{ok,fail,total:PREGUNTAS.length};}
function actualizarHeader(){const s=calcularStats();const r=s.ok+s.fail;document.getElementById('barraFill').style.width=(r/s.total*100)+'%';document.getElementById('progresoTexto').textContent=r+' / '+s.total;document.getElementById('statOk').textContent=s.ok+' correctas';document.getElementById('statFail').textContent=s.fail+' incorrectas';}
function renderizar(){
  const c=document.getElementById('contenedor');c.innerHTML='';
  const s=calcularStats();
  if(s.ok+s.fail===s.total&&!modoFallos){const pct=Math.round(s.ok/s.total*100);const b=document.createElement('div');b.className='banner-completado';b.innerHTML=`<h2>🎉 ¡Lote completado!</h2><div class="puntuacion">${s.ok}/${s.total}</div><p>${pct}% de acierto · Preguntas 151–200 · Enfermería</p>`;c.appendChild(b);}
  const pm=modoFallos?PREGUNTAS.filter(p=>estado[p.n]&&!estado[p.n].correcto):orden.map(n=>PREGUNTAS.find(p=>p.n===n));
  if(modoFallos&&pm.length===0){c.innerHTML+='<div style="text-align:center;padding:40px;color:var(--gris);font-family:Syne,sans-serif;">¡No hay preguntas falladas! 🎯</div>';return;}
  pm.forEach(pregunta=>{
    if(!pregunta)return;
    const resp=RESPUESTAS[pregunta.n];const est=estado[pregunta.n];const resuelta=!!est;
    const card=document.createElement('div');card.className='pregunta-card'+(resuelta?(' resuelta'+(est.correcto?'':' fallo')):'');card.id='p'+pregunta.n;
    let html=`<div class="pregunta-num">Pregunta ${pregunta.n}</div><div class="pregunta-texto">${pregunta.n}.- ${pregunta.texto}</div><div class="opciones">`;
    Object.entries(pregunta.opts).forEach(([letra,texto])=>{
      let cls='opcion-btn';let disabled=resuelta?'disabled':'';
      if(resuelta){if(letra===resp){cls+=est.elegida===letra?' correcta':' correcta-marcada';}else if(letra===est.elegida&&!est.correcto){cls+=' incorrecta';}}
      html+=`<button class="${cls}" ${disabled} onclick="responder(${pregunta.n},'${letra}')"><span class="letra">${letra})</span>${texto}</button>`;
    });
    html+=`</div>`;
    if(resuelta){html+=est.correcto?`<div class="resultado-badge badge-ok">✓ Correcto</div>`:`<div class="resultado-badge badge-error">✗ Incorrecto — Respuesta: ${resp}</div>`;}
    card.innerHTML=html;c.appendChild(card);
  });
}
function responder(num,letra){if(estado[num])return;const resp=RESPUESTAS[num];estado[num]={elegida:letra,correcto:letra===resp};guardarEstado();actualizarHeader();renderizar();setTimeout(()=>{const el=document.getElementById('p'+num);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});},100);}
function resetearTodo(){if(!confirm('¿Seguro que quieres reiniciar todo el progreso de este lote?'))return;estado={};guardarEstado();modoFallos=false;orden=PREGUNTAS.map(p=>p.n);actualizarHeader();renderizar();}
function mostrarSoloFallos(){modoFallos=!modoFallos;renderizar();}
function ordenAleatorio(){modoFallos=false;orden=[...PREGUNTAS.map(p=>p.n)].sort(()=>Math.random()-0.5);renderizar();window.scrollTo({top:0,behavior:'smooth'});}
cargarEstado();actualizarHeader();renderizar();
</script>
