const PREGUNTAS=[{n:401,texto:`En relación con la administración de medicamentos por vía intramuscular, determinadas condiciones clínicas pueden contraindicar su utilización debido al aumento del riesgo de complicaciones locales o sistémicas. ¿Cuál de las siguientes situaciones NO constituye una contraindicación habitual para la administración intramuscular?`,opts:{'A':`Trastornos de la coagulación.`,'B':`Edema importante en la zona de punción.`,'C':`Vasculopatía periférica.`,'D':`Panículo adiposo de gran espesor en la zona de inyección.`}},
{n:402,texto:`Según la clasificación de los medicamentos peligrosos, establecida en función de su potencial riesgo para la salud, estos se agrupan en tres categorías principales:`,opts:{'A':`Grupo 1: fármacos con bajo riesgo toxicológico; Grupo 2: medicamentos de uso hospitalario; Grupo 3: fármacos de dispensación ambulatoria.`,'B':`Grupo 1: fármacos antineoplásicos; Grupo 2: fármacos no antineoplásicos que cumplen criterios del NIOSH; Grupo 3: fármacos con riesgo reproductivo.`,'C':`Grupo 1: medicamentos biológicos; Grupo 2: psicofármacos; Grupo 3: fármacos teratógenos.`,'D':`Grupo 1: fármacos de alto riesgo toxicológico; Grupo 2: medicamentos genéricos; Grupo 3: fármacos de uso restringido.`}},
{n:403,texto:`En la administración de medicamentos por vía parenteral, el ángulo de inserción de la aguja varía en función de la vía utilizada, con el fin de garantizar una correcta deposición del fármaco y minimizar complicaciones. ¿Cuál de las siguientes asociaciones entre vía de administración y ángulo de inyección es correcta?`,opts:{'A':`Intradérmica: 10–15º / Subcutánea: 45–90º / Intramuscular: 90º.`,'B':`Intradérmica: 15-20º / Subcutánea: 35-45º / Intramuscular: 60-90º.`,'C':`Intradérmica: 10-15º / Subcutánea: 90º / Intramuscular: 45-90º.`,'D':`Intradérmica: 15-20º / Subcutánea: 45-60º / Intramuscular: 75-90º.`}},
{n:404,texto:`En relación con el procedimiento adecuado para la administración de pomadas oftálmicas, señale la afirmación que NO es correcta:`,opts:{'A':`El paciente debe colocarse en posición sentada o en decúbito, con la cabeza ligeramente hacia atrás.`,'B':`Se debe retraer el párpado inferior para exponer el saco conjuntival.`,'C':`Tras la aplicación, se debe indicar al paciente que parpadee una o dos veces y mantenga posteriormente los ojos cerrados.`,'D':`Debe aplicarse aproximadamente una tira de 0,5 cm de pomada, evitando el contacto directo con la córnea.`}},
{n:405,texto:`En relación con el Decreto 38/2012, de 13 de marzo, sobre historia clínica y derechos y obligaciones de pacientes y profesionales de la salud en materia de documentación clínica, señale qué normativa NO está relacionada ni resulta de aplicación directa en su desarrollo o marco jurídico:`,opts:{'A':`Ley 41/2002, de 14 de noviembre, básica reguladora de la autonomía del paciente.`,'B':`Ley Orgánica 15/1999, de 13 de diciembre, de Protección de Datos de Carácter Personal.`,'C':`Real Decreto 1093/2010, de 3 de septiembre, por el que se aprueba el conjunto mínimo de datos de los informes clínicos en el SNS.`,'D':`Ley 44/2003, de 21 de noviembre, de ordenación de las profesiones sanitarias.`}},
{n:406,texto:`Según el artículo 7 del Decreto 38/2012, sobre la cumplimentación de la historia clínica, ¿cuál de las siguientes afirmaciones sobre las anotaciones subjetivas es CORRECTA?`,opts:{'A':`Son datos objetivos verificables mediante pruebas complementarias y deben ser accesibles siempre al paciente.`,'B':`Incluyen impresiones o valoraciones personales del profesional no sustentadas directamente en datos objetivos y pueden quedar claramente identificadas para facilitar su disociación.`,'C':`No deben constar en la historia clínica por afectar a la intimidad del paciente.`,'D':`Pueden incorporar expresiones o comentarios sin relación directa con la asistencia sanitaria si aportan contexto clínico.`}},
{n:407,texto:`En relación con el acceso a la historia clínica según el Decreto 38/2012 y la normativa básica estatal, señale la opción CORRECTA:`,opts:{'A':`El acceso del paciente a su historia clínica es absoluto y no puede limitarse en ningún caso.`,'B':`Los profesionales sanitarios pueden acceder libremente a cualquier historia clínica del centro, con independencia de que intervengan o no en la asistencia del paciente.`,'C':`El acceso a la historia clínica debe limitarse a los fines específicos previstos legalmente, garantizando los derechos de la persona titular de los datos.`,'D':`La entrega de documentación clínica no requiere identificar a la persona solicitante ni justificar la finalidad del acceso, para facilitar la transparencia asistencial.`}},
{n:408,texto:`En relación con el acceso a la historia clínica por personal sanitario con finalidad distinta a la asistencial y por terceras personas, según el Decreto 38/2012, señale la opción CORRECTA.`,opts:{'A':`El personal sanitario con funciones de inspección o evaluación puede acceder libremente a toda la historia clínica sin limitación de datos ni necesidad de justificar el acceso.`,'B':`El acceso a la historia clínica con fines de investigación exige siempre el consentimiento expreso de la persona paciente, sin excepciones.`,'C':`Las compañías aseguradoras privadas pueden acceder a la historia clínica completa del paciente para fines de facturación sin necesidad de consentimiento.`,'D':`El acceso a la historia clínica con fines de gestión, inspección o investigación debe limitarse a los datos imprescindibles y, como norma general, garantizar la disociación o anonimización de los datos identificativos.`}},
{n:409,texto:`Según el Decreto 38/2012, ¿cuánto tiempo debe transcurrir desde el fallecimiento de la persona paciente para que pueda destruirse la totalidad de su documentación clínica?`,opts:{'A':`Cinco años desde el fallecimiento.`,'B':`Diez años desde el fallecimiento.`,'C':`Quince años desde el fallecimiento.`,'D':`La documentación clínica no puede destruirse tras el fallecimiento.`}},
{n:410,texto:`Según el Decreto 38/2012, antes de otorgar el consentimiento informado, ¿cuál de las siguientes NO forma parte de la información básica que debe recibir la persona paciente?`,opts:{'A':`La finalidad y los beneficios esperados de la intervención terapéutica.`,'B':`Las consecuencias relevantes o de importancia asociadas a la intervención.`,'C':`Los riesgos relacionados con las circunstancias personales o profesionales de la persona paciente.`,'D':`Los riesgos probables en condiciones normales, conforme a la experiencia del profesional que realizará el procedimiento.`}},
{n:411,texto:`Según el Decreto 147/2015, sobre derechos y deberes de las personas en el sistema sanitario de Euskadi, ¿cuál de las siguientes afirmaciones es CORRECTA en relación con la negativa al tratamiento?`,opts:{'A':`La persona paciente puede negarse a cualquier tratamiento en todo caso, incluso cuando exista riesgo grave e inmediato para su vida.`,'B':`La negativa al tratamiento solo es válida si se formaliza siempre por escrito mediante consentimiento informado negativo.`,'C':`La persona paciente puede negarse al tratamiento, salvo en los supuestos previstos legalmente, aunque dicha negativa pueda ocasionar un perjuicio grave para su salud.`,'D':`La negativa al tratamiento queda anulada automáticamente cuando el profesional considera que la decisión no es beneficiosa para la persona paciente.`}},
{n:412,texto:`Según el artículo 5 del Decreto 147/2015, relativo a los derechos de la persona paciente en la participación responsable en la gestión de su propia salud, ¿cuál de las siguientes afirmaciones es INCORRECTA?`,opts:{'A':`La persona paciente tiene derecho a decidir unilateralmente la organización y priorización de los recursos sanitarios públicos que se le asignen, en función de sus preferencias personales.`,'B':`La persona paciente puede acceder a la información contenida en su historia clínica y obtener copia de la misma, conforme a los límites y garantías previstos en la normativa vigente.`,'C':`La persona paciente tiene derecho a recibir información comprensible sobre los recursos sanitarios y sociosanitarios disponibles para poder gestionar su salud con el mayor nivel de autonomía posible.`,'D':`La persona paciente tiene derecho a conocer la identidad, titulación y especialidad del profesional sanitario responsable de su diagnóstico y tratamiento.`}},
{n:413,texto:`Según el artículo 6 del Decreto 147/2015, relativo a los derechos en relación con la organización y gestión del sistema sanitario de Euskadi, ¿cuál de las siguientes afirmaciones sobre los derechos lingüísticos de las personas usuarias es INCORRECTA?`,opts:{'A':`Las personas usuarias tienen derecho a que se garanticen sus derechos lingüísticos conforme a la normativa vigente sobre normalización del uso del euskera en el ámbito sanitario.`,'B':`El sistema sanitario debe posibilitar que la persona usuaria pueda relacionarse con los servicios sanitarios en cualquiera de las lenguas oficiales de la Comunidad Autónoma del País Vasco.`,'C':`El ejercicio de los derechos lingüísticos por parte de la persona usuaria queda condicionado a la disponibilidad inmediata de personal sanitario bilingüe en cada centro o servicio.`,'D':`Los derechos lingüísticos en el sistema sanitario se fundamentan en la legislación autonómica sobre normalización del euskera y en la normativa específica aplicable a las personas consumidoras y usuarias.`}},
{n:414,texto:`Según el artículo 7 del Decreto 147/2015, relativo a los derechos en relación con las políticas sanitarias específicas, ¿cuál de los siguientes NO se considera un colectivo vulnerable conforme a los criterios establecidos en dicho artículo?`,opts:{'A':`Personas con trastorno mental.`,'B':`Personas con enfermedades raras de origen genético.`,'C':`Personas inmigrantes en situación administrativa irregular.`,'D':`Personas con discapacidad o diversidad funcional.`}},
{n:415,texto:`De acuerdo con el artículo 12.2 del Decreto 147/2015, la posesión de la Tarjeta Individual Sanitaria en el Sistema Sanitario de Euskadi permite el ejercicio de determinadas facultades. ¿Cuál de las siguientes NO se corresponde con una facultad reconocida en dicho artículo?`,opts:{'A':`Obtención de una segunda opinión médica en procesos de enfermedad que conlleven riesgo para la vida o afecten gravemente a su calidad, en los términos previstos normativamente.`,'B':`Elección de profesional facultativo general y pediatra, así como de centro de atención primaria y, en su caso, del hospital correspondiente.`,'C':`Acceso a la asistencia sanitaria en un período de tiempo razonable, con garantía de plazo máximo de respuesta en los supuestos reglamentariamente establecidos.`,'D':`Elección del profesional de enfermería, fisioterapia o trabajo social en el marco de la organización asistencial del sistema sanitario de Euskadi.`}},
{n:416,texto:`En relación con las funciones de los Servicios de Atención a Pacientes y Personas Usuarias del sistema sanitario de Euskadi, según el Decreto 147/2015, señale la afirmación CORRECTA:`,opts:{'A':`Los Servicios de Atención a Pacientes y Personas Usuarias pueden formular propuestas de mediación, pero la resolución de la reclamación corresponde siempre al órgano competente.`,'B':`La mediación llevada a cabo por estos servicios tiene carácter vinculante y sustituye la resolución administrativa cuando hay conformidad de la persona usuaria.`,'C':`Estos servicios pueden resolver reclamaciones cuando, tras un proceso de mediación, exista acuerdo entre las partes implicadas.`,'D':`Cuando una reclamación es susceptible de mediación, queda excluida su posterior resolución por la Administración sanitaria.`}},
{n:417,texto:`En relación con la protección de datos de carácter personal en el ámbito sanitario y las consecuencias penales derivadas de su vulneración, señale la opción CORRECTA conforme a lo dispuesto en el artículo 199 del Código Penal:`,opts:{'A':`La revelación de datos de salud por parte de un profesional sanitario sin consentimiento únicamente conlleva responsabilidad administrativa, al tratarse de información obtenida en el ejercicio de una función pública.`,'B':`El profesional sanitario que divulga datos de salud incumpliendo su deber de secreto profesional puede ser castigado con pena de prisión y multa, además de inhabilitación especial para el ejercicio de su profesión.`,'C':`Solo existe responsabilidad penal cuando la revelación de datos se produce con ánimo de lucro o difusión pública masiva de la información.`,'D':`La divulgación de datos clínicos sin consentimiento constituye delito únicamente si el paciente demuestra un perjuicio económico directo derivado de dicha revelación.`}},
{n:418,texto:`Según la Sociedad Española de Geriatría y Gerontología, ¿cuál de los siguientes términos describe cualquier procedimiento físico o mecánico dirigido a contener, sujetar o limitar el movimiento parcial o total del cuerpo y que no pueda ser manipulado por la persona?`,opts:{'A':`Restricción mecánica.`,'B':`Sujeción mecánica.`,'C':`Contención mecánica.`,'D':`Restricción física.`}},
{n:419,texto:`De acuerdo con el algoritmo de actuación de la Guía de recomendaciones para la prevención y reducción del uso de contenciones en personas adultas durante la atención sanitaria de Osakidetza (2024), ¿en qué momento puede valorarse la aplicación de contención mecánica?`,opts:{'A':`Ante la presencia inicial de agitación psicomotriz, como medida preventiva para evitar riesgos potenciales.`,'B':`Cuando exista riesgo de daños inminentes, de forma simultánea a la valoración inicial de la persona atendida.`,'C':`Siempre que la persona atendida rechace las intervenciones de acompañamiento o distracción verbal.`,'D':`Tras constatar que las medidas previas no coercitivas han fracasado y persiste un riesgo de daño, con prescripción facultativa y consentimiento informado si procede.`}},
{n:420,texto:`En el contexto de desescalada verbal para la prevención de la contención mecánica, ¿cuál de los siguientes dominios debería aplicarse antes de haber iniciado el contacto verbal con la persona atendida?`,opts:{'A':`Respetar espacio personal.`,'B':`Establecer límites claros.`,'C':`Escucha activa.`,'D':`Identificar deseos y sentimientos.`}},
{n:421,texto:`Durante un turno de noche en una unidad de hospitalización, una paciente de 88 años, orientada y con capacidad de decisión conservada, rechaza de forma reiterada la colocación de una sonda vesical, pese a que el equipo considera que facilitaría el control clínico. Ante la insistencia del personal, la paciente vuelve a manifestar su negativa de forma expresa y comprensible. ¿Cuál es el principio bioético que se vería vulnerado si se procediera a la colocación de la sonda sin su consentimiento?`,opts:{'A':`Beneficencia.`,'B':`No maleficencia.`,'C':`Justicia.`,'D':`Autonomía.`}},
{n:422,texto:`Una paciente de 83 años, ingresada en una unidad de agudos, presenta un episodio de agitación psicomotriz con riesgo inminente de caída. No consta documento de voluntades anticipadas y no es posible contactar con familiares en ese momento. El equipo decide aplicar una intervención inmediata para evitar daños graves. ¿Cuál es el fundamento ético que legitima esta actuación?`,opts:{'A':`El principio de autonomía.`,'B':`El principio de beneficencia.`,'C':`El principio de no maleficencia.`,'D':`El principio de justicia.`}},
{n:423,texto:`Según el Código Deontológico de la profesión enfermera, ¿en cuál de los siguientes supuestos NO resulta de aplicación dicho Código?`,opts:{'A':`Una enfermera colegiada que ejerce su actividad profesional en un centro socio- sanitario en Donostia-San Sebastian.`,'B':`Una enfermera colegiada que presta servicios en el Hospital de Txagorritxu en Vitoria-Gasteiz.`,'C':`Una enfermera extranjera que, en virtud de un convenio internacional, ejerce ocasionalmente la profesión enfermera en el Hospital de Urduliz, Bizkaia.`,'D':`Una enfermera que, tras finalizar su contrato en Osakidetza hace un año, se ha trasladado a trabajar de forma estable a Edimburgo, Escocia.`}},
{n:424,texto:`Una enfermera de atención primaria atiende a un paciente diagnosticado de una enfermedad transmisible de declaración obligatoria, que supone un riesgo grave para la salud pública. Durante la entrevista, el paciente manifiesta de forma explícita que no piensa seguir las recomendaciones sanitarias y que su intención es relacionarse con el mayor número posible de personas, siendo consciente del riesgo de contagio. Según el Código Deontológico de la profesión enfermera, ¿cuál debe ser la actuación correcta de la enfermera?`,opts:{'A':`Mantener el secreto profesional, ya que la confidencialidad solo puede romperse con el consentimiento expreso del paciente.`,'B':`Comunicar la situación a las autoridades competentes por motivos legales y de seguridad, limitando la información revelada al mínimo indispensable y al número estrictamente necesario de personas.`,'C':`Informar a todas las personas potencialmente expuestas para prevenir el contagio, aunque ello suponga revelar datos clínicos del paciente.`,'D':`Registrar la negativa del paciente en la historia clínica y respetar su decisión, al tratarse de un adulto competente.`}},
{n:425,texto:`Según el Código Deontológico de la profesión enfermera, en relación con el medio ambiente y la salud comunitaria, ¿cuál de las siguientes afirmaciones es INCORRECTA?`,opts:{'A':`La participación de la enfermera en programas dirigidos a reducir la acción nociva de factores químicos, biológicos o físicos queda supeditada a la existencia de una orden expresa de la autoridad sanitaria competente.`,'B':`La enfermera tiene el deber de conocer, analizar y comunicar las consecuencias ecológicas de los contaminantes y sus efectos nocivos sobre la salud humana.`,'C':`La enfermera debe impartir educación para la salud ambiental con el objetivo de fomentar una conciencia sana de la comunidad respecto a los problemas del medio ambiente.`,'D':`La enfermera debe colaborar con las autoridades sanitarias en la planificación de actividades orientadas al control del medio ambiente y a la mejora de la atención a la salud comunitaria.`}},
{n:426,texto:`En una unidad de hospitalización, una enfermera ante una elevada carga asistencial, decide pedir a un auxiliar de enfermería que administre una medicación intravenosa prescrita recientemente a un paciente, indicándole que ella estará disponible “por si surge algún problema”, ya que el auxiliar tiene experiencia en la unidad. De acuerdo con el Código Deontológico de la profesión enfermera, ¿cuál es la valoración CORRECTA de esta actuación?`,opts:{'A':`Es correcta, siempre que el auxiliar tenga experiencia previa y la enfermera permanezca localizable durante el procedimiento.`,'B':`Es incorrecta, ya que la enfermera no puede delegar funciones propias en otros profesionales que no estén debidamente capacitados, aunque exista supervisión.`,'C':`Es correcta si la enfermera ha informado previamente al auxiliar y ha comprobado que el paciente está estable.`,'D':`Es correcta si la decisión se justifica por una situación de sobrecarga asistencial y riesgo organizativo.`}},
{n:427,texto:`Una enfermera con varios años de experiencia comienza a trabajar en una unidad donde se han incorporado nuevos procedimientos y tecnologías asistenciales. Ante algunas dudas técnicas, comenta que no ha recibido formación específica por parte del centro y que, hasta que no se la proporcionen, continuará aplicando los procedimientos “como siempre se han hecho”. De acuerdo con el Código Deontológico de la profesión enfermera, ¿quién tiene la responsabilidad principal de garantizar la actualización de los conocimientos necesarios para un ejercicio profesional seguro?`,opts:{'A':`La institución sanitaria, que debe proporcionar siempre formación previa antes de exigir cambios en la práctica clínica.`,'B':`La dirección de enfermería, que debe detectar las carencias formativas individuales y resolverlas.`,'C':`La propia enfermera, que debe identificar sus necesidades de aprendizaje y actuar de forma proactiva en su formación continua.`,'D':`El equipo multidisciplinar, que debe compensar las carencias formativas de sus miembros mediante el trabajo en grupo.`}},
{n:428,texto:`En una unidad hospitalaria se incorporan estudiantes de Enfermería para realizar el prácticum. La supervisora asigna a cada estudiante una enfermera o enfermero de referencia. Una de las profesionales asignadas manifiesta su desacuerdo y afirma que no le corresponde supervisar ni enseñar, ya que en su salario no recibe compensación económica específica por ello. De acuerdo con el Código Deontológico de la profesión enfermera, ¿cuál de las siguientes actuaciones es la más adecuada?`,opts:{'A':`Recordar que la enfermera o el enfermero tiene la responsabilidad individual y colectiva de asumir la educación en Enfermería a todos sus niveles, incluida la supervisión del estudiantado en prácticas.`,'B':`Reasignar al estudiantado exclusivamente a la supervisora o a personal docente externo, evitando la implicación del personal asistencial.`,'C':`Aceptar la negativa de la profesional, ya que la actividad docente solo es exigible si existe reconocimiento económico expreso.`,'D':`Limitar la supervisión a la observación pasiva, evitando implicación formativa directa para no interferir en la carga asistencial.`}},
{n:429,texto:`¿Qué modelo guía la estructura y contenido de la segunda edición de la Herramienta de Implantación de guías de buenas prácticas de RNAO?`,opts:{'A':`Modelo de Mejora Continua.`,'B':`Marco de Conocimiento para la Acción.`,'C':`Ciclo de Deming.`,'D':`Modelo de Rogers.`}},
{n:430,texto:`¿Qué instrumento se recomienda utilizar para evaluar la calidad de una guía de buenas prácticas antes de su implantación?`,opts:{'A':`AGREE II.`,'B':`PRISMA.`,'C':`CONSORT.`,'D':`GRADE.`}},
{n:431,texto:`¿Qué se considera una parte interesada (stakeholder) según la “Herramienta de implantación de buenas prácticas”?`,opts:{'A':`Únicamente los pacientes.`,'B':`Únicamente los profesionales de salud.`,'C':`Individuos, grupos o instituciones con interés directo en la implantación de la guía.`,'D':`Únicamente los financiadores del proyecto`}},
{n:432,texto:`¿Qué fase del Marco de Conocimiento para la Acción se enfoca en la identificación de las partes interesadas?`,opts:{'A':`Identificación del problema.`,'B':`Evaluación de facilitadores y barrera.`,'C':`Monitorización del uso del conocimiento.`,'D':`Adaptación al contexto local.`}},
{n:433,texto:`Según la “Herramienta de implantación de buenas prácticas”, ¿qué se incluye en la definición de "auditoría y feedback"?`,opts:{'A':`Una revisión de la literatura científica.`,'B':`Una encuesta de satisfacción del paciente.`,'C':`Un resumen del desempeño clínico que puede incluir recomendaciones para la acción.`,'D':`La observación directa del paciente.`}},
{n:434,texto:`¿Cuál de los siguientes no es un criterio para seleccionar indicadores para monitorizar el progreso de la sostenibilidad en la institución?`,opts:{'A':`Validez interna.`,'B':`Viabilidad.`,'C':`Claridad y capacidad de ser entendido por los usuarios.`,'D':`Relevancia.`}},
{n:435,texto:`¿Qué iniciativa de RNAO permite la recogida de datos y medición de indicadores estructurales, de proceso y de resultado relacionados con cada Guía de Buena Practica?`,opts:{'A':`AGREE II.`,'B':`BPSO.`,'C':`ADAPTE.`,'D':`NQuIRE.`}},
{n:436,texto:`¿Qué se recomienda al involucrar a las partes interesadas con alta influencia, pero bajo apoyo?`,opts:{'A':`Darles mucha atención para intentar conseguir su apoyo.`,'B':`Ignorarlas, ya que no apoyan.`,'C':`Excluirlas del proceso.`,'D':`Solo informarles al final del proyecto.`}},
{n:437,texto:`La implantación efectiva de las Guías de Buenas Practicas, puede alcanzar como objetivo:`,opts:{'A':`Mantener la base de conocimientos en enfermería.`,'B':`Aportar el nivel de carencias financieras en la investigación.`,'C':`Trasladar a la investigación la evidencia fruto de la práctica.`,'D':`Reducir la variabilidad en los cuidados.`}},
{n:438,texto:`¿Qué tipo de recurso se define como "formas de apoyo no monetarias, como el acceso a bienes y servicios"?`,opts:{'A':`Recursos financieros.`,'B':`Recursos humanos.`,'C':`Recursos en especie.`,'D':`Recursos tecnológicos.`}},
{n:439,texto:`Los indicadores potenciales de la categoría de Proceso, se asocian a:`,opts:{'A':`Qué ocurre.`,'B':`Cómo lo va a hacer.`,'C':`Qué necesitas tener.`,'D':`Qué vamos a hacer.`}},
{n:440,texto:`¿Cuál es uno de los factores clave que influyen como facilitador en la implantación de una guía de buenas prácticas?`,opts:{'A':`Actitudes y creencias políticas del personal.`,'B':`Apoyo del liderazgo.`,'C':`Grupo de interrelación.`,'D':`Integración limitada de las recomendaciones de la guía en los procesos y estructuras institucionales.`}},
{n:441,texto:`En relación con las diferencias entre los enfoques cuantitativo y cualitativo en investigación en enfermería, señale la afirmación CORRECTA:`,opts:{'A':`El enfoque cuantitativo parte de la idea de que la realidad es construida socialmente y depende de la interpretación de los sujetos que participan en el estudio.`,'B':`El enfoque cualitativo se apoya fundamentalmente en marcos positivistas y busca medir variables objetivas mediante instrumentos estandarizados.`,'C':`El enfoque cuantitativo asume la existencia de una realidad objetiva, externa al investigador, que puede conocerse y medirse.`,'D':`El enfoque cualitativo pretende generalizar los resultados a grandes poblaciones mediante el análisis estadístico inferencial.`}},
{n:442,texto:`Una enfermera investigadora quiere explorar cómo viven las personas con insuficiencia cardíaca avanzada la educación terapéutica recibida durante el ingreso hospitalario, con el objetivo de comprender sus percepciones, significados y experiencias. Para ello diseña un estudio cualitativo basado en entrevistas en profundidad. ¿Cuál sería la estrategia de muestreo más adecuada para este tipo de estudio?`,opts:{'A':`Seleccionar a las personas participantes mediante un muestreo aleatorio estratificado según edad y sexo.`,'B':`Incluir de forma intencional a personas que aporten información relevante, incorporando nuevas entrevistas hasta alcanzar la saturación teórica.`,'C':`Elegir a las personas participantes mediante muestreo por conglomerados según unidades de hospitalización.`,'D':`Seleccionar sistemáticamente a cada quinto paciente ingresado en la unidad durante el periodo de estudio.`}},
{n:443,texto:`En un diseño de investigación descriptivo-correlacional, ¿qué se analiza principalmente?`,opts:{'A':`Efectos causales de una intervención.`,'B':`Asociaciones entre variables.`,'C':`Diferencias entre grupos experimentales.`,'D':`Evolución temporal de una cohorte.`}},
{n:444,texto:`En análisis cualitativo, ¿qué representa el proceso de triangulación?`,opts:{'A':`Uso exclusivo de tres investigadores.`,'B':`Muestreo en tres fases sucesivas.`,'C':`Análisis estadístico tridimensional.`,'D':`Convergencia de múltiples fuentes metodológicas.`}},
{n:445,texto:`En la fase empírica, ¿cuál es la técnica cuantitativa MÁS adecuada para medir satisfacción con cuidados?`,opts:{'A':`Análisis de contenido temático.`,'B':`Observación participante no estructurada.`,'C':`Cuestionario validado con escala Likert.`,'D':`Entrevista narrativa libre.`}},
{n:446,texto:`¿Qué validez es MÁS crítica en la fase de diseño de instrumentos de medida?`,opts:{'A':`Validez de constructo y contenido.`,'B':`Validez estadística post-hoc.`,'C':`Validez de difusión mediática.`,'D':`Validez temporal retrospectiva.`}},
{n:447,texto:`Una enfermera investigadora quiere explorar las experiencias y percepciones de pacientes hospitalizados sobre la calidad de los cuidados recibidos tras una cirugía mayor. Para ello, decide utilizar técnicas propias de la investigación cualitativa. ¿Cuál de las siguientes NO sería una técnica cualitativa de recogida de datos adecuada para este estudio?`,opts:{'A':`Entrevistas semiestructuradas a pacientes durante el ingreso.`,'B':`Grupos focales con personas dadas de alta recientemente.`,'C':`Encuestas estructuradas con preguntas cerradas.`,'D':`Observación participante sistemática del proceso de cuidados en la unidad.`}},
{n:448,texto:`Una enfermera investigadora realiza un estudio cualitativo basado en entrevistas en profundidad a personas cuidadoras informales, con el objetivo de analizar discursos, categorías y relaciones entre significados. Para el análisis cualitativo de los datos, revisa distintos programas informáticos. ¿Cuál de los siguientes NO es un programa adecuado para el análisis cualitativo de datos?`,opts:{'A':`SPSS.`,'B':`ATLAS.ti.`,'C':`Ethnograph.`,'D':`NVivo.`}},
{n:449,texto:`Un equipo de enfermería quiere investigar el cuidado de personas con demencia y el impacto en sus familiares cuidadores, con el objetivo de mejorar la atención y el apoyo desde los servicios sociosanitarios. El equipo analiza entrevistas y diarios de campo de familiares cuidadores y profesionales, aplicando codificación abierta, axial y selectiva, con comparación constante de datos, para desarrollar un modelo explicativo sobre cómo evolucionan las estrategias de cuidado familiar a lo largo del curso de la demencia. ¿A qué método cualitativo corresponde principalmente este enfoque?`,opts:{'A':`Teoría fundamentada.`,'B':`Etnografía.`,'C':`Fenomenología.`,'D':`Investigación-acción participativa.`}},
{n:450,texto:`Un equipo de enfermería quiere investigar el cuidado de personas con demencia y el impacto en sus familiares cuidadores, con el objetivo de mejorar la atención y el apoyo desde los servicios sociosanitarios. El equipo diseña el estudio junto con familiares y personas con demencia en fases iniciales, quienes codiseñan intervenciones, participan en la toma de decisiones y evalúan los cambios introducidos en los apoyos comunitarios, con el objetivo explícito de transformar la práctica. ¿A qué método cualitativo corresponde principalmente este enfoque?`,opts:{'A':`Teoría fundamentada.`,'B':`Etnografía.`,'C':`Fenomenología.`,'D':`Investigación-acción participativa.`}}];
let estado={},orden=PREGUNTAS.map(p=>p.n),modoFallos=false;
function cargarEstado(){try{const r=localStorage.getItem(STORAGE_KEY);if(r)estado=JSON.parse(r);}catch(e){estado={};}}
function guardarEstado(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(estado));}catch(e){}}
function calcularStats(){let ok=0,fail=0;PREGUNTAS.forEach(p=>{if(estado[p.n]){if(estado[p.n].correcto)ok++;else fail++;}});return{ok,fail,total:PREGUNTAS.length};}
function actualizarHeader(){const s=calcularStats();const r=s.ok+s.fail;document.getElementById('barraFill').style.width=(r/s.total*100)+'%';document.getElementById('progresoTexto').textContent=r+' / '+s.total;document.getElementById('statOk').textContent=s.ok+' correctas';document.getElementById('statFail').textContent=s.fail+' incorrectas';}
function renderizar(){
  const c=document.getElementById('contenedor');c.innerHTML='';
  const s=calcularStats();
  if(s.ok+s.fail===s.total&&!modoFallos){const pct=Math.round(s.ok/s.total*100);const b=document.createElement('div');b.className='banner-completado';b.innerHTML=`<h2>🎉 ¡Lote completado!</h2><div class="puntuacion">${s.ok}/${s.total}</div><p>${pct}% de acierto · Preguntas 401–450 · Enfermería</p>`;c.appendChild(b);}
  const pm=modoFallos?PREGUNTAS.filter(p=>estado[p.n]&&!estado[p.n].correcto):orden.map(n=>PREGUNTAS.find(p=>p.n===n));
  if(modoFallos&&pm.length===0){c.innerHTML+='<div style="text-align:center;padding:40px;color:var(--gris);font-family:Syne,sans-serif;">¡No hay preguntas falladas! 🎯</div>';return;}
  pm.forEach(pregunta=>{
    if(!pregunta)return;
    const resp=RESPUESTAS[pregunta.n];const est=estado[pregunta.n];const resuelta=!!est;
    const card=document.createElement('div');card.className='pregunta-card'+(resuelta?(' resuelta'+(est.correcto?'':' fallo')):'');card.id='p'+pregunta.n;
    let html=`<div class="pregunta-num">Pregunta ${pregunta.n}</div><div class="pregunta-texto">${pregunta.n}.- ${pregunta.texto}</div><div class="opciones">`;
    Object.entries(pregunta.opts).forEach(([letra,texto])=>{
      let cls='opcion-btn';let disabled=resuelta?'disabled':'';
      if(resuelta){if(letra===resp){cls+=est.elegida===letra?' correcta':' correcta-marcada';}else if(letra===est.elegida&&!est.correcto){cls+=' incorrecta';}}
      html+=`<button class="${cls}" ${disabled} onclick="responder(${pregunta.n},'${letra}')"><span class="letra">${letra})</span>${texto}</button>`;
    });
    html+=`</div>`;
    if(resuelta){html+=est.correcto?`<div class="resultado-badge badge-ok">✓ Correcto</div>`:`<div class="resultado-badge badge-error">✗ Incorrecto — Respuesta: ${resp}</div>`;}
    card.innerHTML=html;c.appendChild(card);
  });
}
function responder(num,letra){if(estado[num])return;const resp=RESPUESTAS[num];estado[num]={elegida:letra,correcto:letra===resp};guardarEstado();actualizarHeader();renderizar();setTimeout(()=>{const el=document.getElementById('p'+num);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});},100);}
function resetearTodo(){if(!confirm('¿Seguro que quieres reiniciar todo el progreso de este lote?'))return;estado={};guardarEstado();modoFallos=false;orden=PREGUNTAS.map(p=>p.n);actualizarHeader();renderizar();}
function mostrarSoloFallos(){modoFallos=!modoFallos;renderizar();}
function ordenAleatorio(){modoFallos=false;orden=[...PREGUNTAS.map(p=>p.n)].sort(()=>Math.random()-0.5);renderizar();window.scrollTo({top:0,behavior:'smooth'});}
cargarEstado();actualizarHeader();renderizar();
</script>
