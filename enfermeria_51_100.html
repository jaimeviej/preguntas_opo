const PREGUNTAS=[{n:51,texto:`Una puntuación de 7 en la escala de Braden, corresponde con:`,opts:{'A':`Percepción sensorial: Muy limitada. Exposición a la Humedad: Constantemente húmeda. Actividad: Encamado. Movilidad: Completamente inmóvil. Nutrición: Probablemente inadecuada. Roce y peligro de lesiones: No existe problema aparente.`,'B':`Percepción sensorial: Completamente limitada. Exposición a la Humedad: Constantemente húmeda. Actividad: Encamado. Movilidad: Completamente inmóvil. Nutrición: Probablemente inadecuada. Roce y peligro de lesiones: No existe problema aparente.`,'C':`Percepción sensorial: Completamente limitada. Exposición a la Humedad: Constantemente húmeda. Actividad: Encamado. Movilidad: Completamente inmóvil. Nutrición: Muy pobre. Roce y peligro de lesiones: Problema.`,'D':`Percepción sensorial: Completamente limitada. Exposición a la Humedad: Constantemente húmeda. Actividad: Encamado. Movilidad: Completamente inmóvil. Nutrición: Probablemente inadecuada. Roce y peligro de lesiones: Problema.`}},
{n:52,texto:`En la escala Resvech 2.0, ¿Cómo se define el exudado “mojado”?`,opts:{'A':`Hay pequeñas cantidades de líquido visibles cuando se retira el apósito; el apósito primario se encuentra muy manchado, pero no hay paso de exudado; la frecuencia de cambio del apósito resulta adecuada para el tipo de apósito.`,'B':`Los apósitos se encuentran saturados y hay fugas de exudado de los apósitos primario y secundario hacia las ropas o más allá; se requiere una frecuencia de cambio del apósito mucho mayor de la habitual para este tipo de apósito.`,'C':`El apósito primario se encuentra mojado y hay traspaso de exudado; se requiere una frecuencia de cambio del apósito mayor de la habitual para este tipo de apósito; la piel perilesional puede encontrarse macerada.`,'D':`Hay pequeñas cantidades de líquido visibles cuando se retira el apósito; el apósito primario puede estar ligeramente manchado; la frecuencia de cambio del apósito resulta adecuada para el tipo de apósito.`}},
{n:53,texto:`En el adulto, las necesidades energéticas totales se determinan principalmente por tres compartimentos del gasto energético. ¿Cuál de las siguientes opciones NO corresponde a uno de esos compartimentos principales?`,opts:{'A':`Termogénesis.`,'B':`Índice de masa corporal.`,'C':`Metabolismo basal.`,'D':`Ejercicio físico.`}},
{n:54,texto:`Durante la evaluación del estado nutricional de un paciente adulto, el profesional debe ajustar la recomendación dietética conforme a las Ingestas Nutricionales de Referencia (INR). Según la Agencia Española de Seguridad Alimentaria y Nutrición, ¿cuál de las siguientes recomendaciones se ajusta correctamente a dichas INR en población adulta?`,opts:{'A':`Hidratos de carbono: 45–60% del valor energético total.`,'B':`Proteínas: 1,2 g/kg de peso/día.`,'C':`Grasas: 15-20% del valor energético total.`,'D':`Fibra: 15 g/día.`}},
{n:55,texto:`En un paciente adulto en el que el cribado nutricional ha detectado riesgo nutricional, el profesional debe elaborar un plan de cuidados nutricionales individualizado. ¿Cuál de los siguientes aspectos NO debe incluirse obligatoriamente en dicho plan?`,opts:{'A':`Cálculo de requerimientos.`,'B':`Determinación sistemática de perfil lipídico.`,'C':`Función del tubo digestivo.`,'D':`Posibilidades de utilizar la vía oral.`}},
{n:56,texto:`¿Cuál de las siguientes situaciones NO constituye una indicación para la prescripción de una dieta de textura líquida?`,opts:{'A':`Transición entre nutrición parenteral/sueroterapia e inicio de vía oral.`,'B':`Preparación para exploración gastrointestinal o cirugía intestinal.`,'C':`Intervención dietética avanzada en paciente con estreñimiento funcional sin otra patología digestiva.`,'D':`Reintroducción dietética tras mejoría de procesos digestivos agudos.`}},
{n:57,texto:`¿Cuál de las siguientes definiciones corresponde correctamente a una dieta con bajo contenido en residuo?`,opts:{'A':`Dieta destinada a reducir exclusivamente el aporte de sustancias vegetales no digeribles con el fin de disminuir el débito fecal.`,'B':`Dieta destinada a reducir la ingesta de sustancias vegetales no digeribles y no absorbibles que contribuyen a incrementar el débito fecal.`,'C':`Dieta dirigida a disminuir la irritación mecánica intestinal mediante la supresión de alimentos integrales, semillas y vegetales crudos.`,'D':`Dieta orientada a reducir el contenido intestinal endoluminal no absorbido presente en heces tras la digestión.`}},
{n:58,texto:`En el diseño de una dieta hipercalórica, es fundamental ajustar el aporte energético al gasto energético total (GET) para evitar el riesgo de sobrealimentación. ¿Cuál de las siguientes afirmaciones es correcta respecto al cálculo del GET en un paciente candidato a dieta hipercalórica?`,opts:{'A':`Tras estimar o medir el gasto energético en reposo el GET se obtiene aplicando un factor de estrés y un factor de actividad física.`,'B':`Para medir el GET, la calorimetría indirecta se considera la técnica gold standard.`,'C':`El GET se calcula directamente a partir del peso corporal y la edad.`,'D':`Las ecuaciones predictivas permiten establecer directamente el aporte calórico total sin necesidad de realizar ajustes posteriores.`}},
{n:59,texto:`¿Cuál de las siguientes afirmaciones describe de forma más adecuada el concepto actual de obesidad?`,opts:{'A':`La obesidad se define exclusivamente como un aumento del peso corporal debido a un balance energético positivo mantenido.`,'B':`La obesidad es un proceso agudo y reversible cuyo origen depende principalmente de factores psicológicos.`,'C':`La obesidad se explica principalmente por la epigenética, siendo un fenómeno adquirido sin participación significativa de la genética.`,'D':`La obesidad es una enfermedad crónica caracterizada por acumulación excesiva/anormal de tejido adiposo y disfunción del mismo.`}},
{n:60,texto:`¿Cuál de las siguientes afirmaciones es correcta respecto a la interpretación de los pliegues cutáneos en la evaluación de obesidad?`,opts:{'A':`Se considera obesidad si al menos un pliegue cutáneo está por encima de 4 desviación típica (DT) según edad y sexo.`,'B':`Se considera obesidad si al menos un pliegue cutáneo está por encima de 1 desviación típica (DT) según edad y sexo.`,'C':`Se considera obesidad si al menos un pliegue cutáneo está por encima de 2 desviación típica (DT) según edad y sexo.`,'D':`Se considera obesidad si al menos un pliegue cutáneo está por encima de 5 desviación típica (DT) según edad y sexo.`}},
{n:61,texto:`¿Cuál de las siguientes afirmaciones es correcta respecto al tipo de fibra recomendada en distintas situaciones clínicas?`,opts:{'A':`Dislipemia: únicamente fibra insoluble.`,'B':`Diabetes: principalmente fibra insoluble.`,'C':`Enfermedad cardiovascular: únicamente fibra insoluble.`,'D':`Enfermedad inflamatoria intestinal: Principalmente fibra soluble.`}},
{n:62,texto:`¿Cuál de los siguientes hallazgos en el aspirado obtenido a través de una sonda nasogástrica es más compatible con una correcta colocación en el estómago?`,opts:{'A':`Aspirado con pH ≤ 5, color verdoso o claro, con presencia de fragmentos de mucosidad amarillenta.`,'B':`Aspirado con pH entre 6 y 7, color amarillo-dorado a verde amarronado, de consistencia espesa.`,'C':`Aspirado con pH ≥ 6, color amarillo pálido y consistencia acuosa.`,'D':`Aspirado con pH 7, color verdoso y de consistencia líquida.`}},
{n:63,texto:`En relación con las diferentes vías de acceso para la nutrición enteral, ¿cuál de las siguientes afirmaciones es correcta?`,opts:{'A':`La sonda nasogástrica puede utilizarse de forma segura durante periodos prolongados superiores a un mes.`,'B':`La sonda nasointestinal requiere infusión continua y no se recomienda la alimentación intermitente debido a la respuesta osmótica del intestino delgado.`,'C':`La yeyunostomía permite la administración de nutrición en bolos sin riesgo de intolerancia digestiva.`,'D':`La yeyunostomía se asocia a una menor incidencia de complicaciones gastrointestinales, como cólicos y vómitos.`}},
{n:64,texto:`En relación con la administración de la nutrición parenteral total (NPT), ¿cuál de las siguientes afirmaciones es correcta?`,opts:{'A':`Una velocidad de infusión elevada de la NPT mejora el aporte calórico y nitrogenado sin producir efectos adversos significativos.`,'B':`Una velocidad de infusión excesivamente rápida puede provocar diuresis hiperosmolar y, en casos graves, convulsiones, coma y muerte.`,'C':`Una velocidad de infusión lenta de la NPT incrementa el riesgo de sobrecarga metabólica y complicaciones neurológicas.`,'D':`La administración de la NPT a velocidad reducida garantiza una mejor tolerancia metabólica y un mayor aprovechamiento nutricional.`}},
{n:65,texto:`En la infusión de lípidos intravenosos en un adulto, ¿cuál de las siguientes pautas de administración debe tenerse en cuenta durante el primer día de tratamiento?`,opts:{'A':`Administración de lípidos al 10% hasta 250 ml en 2–3 horas, con un máximo de 4 g/kg/día.`,'B':`Infusión de lípidos al 20% hasta 750 ml en 8 horas, con un límite de 3 g/kg/día.`,'C':`Administración de lípidos al 10% hasta 500 ml en 4–6 horas, con un máximo de 2,5 g/kg de peso corporal al día.`,'D':`Infusión de lípidos al 10% hasta 1000 ml en 10–12 horas, sin restricción según el peso corporal.`}},
{n:66,texto:`Durante la exploración física respiratoria, al realizar la auscultación pulmonar, se identifican roncus. ¿Cuál de las siguientes opciones describe correctamente sus características?`,opts:{'A':`Sonidos continuos, de tono bajo, producidos por la obstrucción parcial de la vía aérea.`,'B':`Sonidos discontinuos, de tono bajo, asociados a broncoconstricción o estrechamiento de las vías respiratorias.`,'C':`Sonidos continuos, de tono alto, audibles tanto en inspiración como en espiración.`,'D':`Sonidos discontinuos, de tono alto, audibles principalmente durante la espiración.`}},
{n:67,texto:`En pacientes con afecciones respiratorias, la oxigenoterapia se indica principalmente para aumentar la presión parcial de oxígeno arterial (PaO₂) y alcanzar valores normales para el individuo. Según la curva de disociación de la oxihemoglobina, ¿qué combinación de PaO₂ y saturación de oxígeno arterial (SaO₂) corresponde a esos rangos considerados normales?`,opts:{'A':`PaO₂ 55–80 mmHg y SaO₂ 88–96%.`,'B':`PaO₂ 70–100 mmHg y SaO₂ 90–99%.`,'C':`PaO₂ 60–95 mmHg y SaO₂ 80–98%.`,'D':`PaO₂ 50–90 mmHg y SaO₂ 85–97%.`}},
{n:68,texto:`Un paciente con insuficiencia respiratoria recibe oxigenoterapia con FiO₂ >50% durante más de 24 horas. Posteriormente comienza con clínica respiratoria progresiva. ¿Cuál de los siguientes conjuntos de signos y síntomas es más compatible con toxicidad por oxígeno con daño pulmonar?`,opts:{'A':`Malestar subesternal, parestesias, disnea, inquietud, fatiga, hipoxemia persistente y atelectasia alveolar.`,'B':`Tos productiva purulenta, leucocitosis marcada, dolor pleurítico e hiperinsuflación pulmonar bilateral.`,'C':`Dolor torácico opresivo, diaforesis, disnea, hipoxemia, elevación del segmento ST y bradicardia.`,'D':`Disnea súbita con hemoptisis, taquicardia, hipotensión, hipocapnia y signos de sobrecarga ventricular derecha en ECG.`}},
{n:69,texto:`Respecto a la mascarilla Venturi utilizada en oxigenoterapia, ¿cuál de las siguientes afirmaciones es correcta?`,opts:{'A':`Proporciona una concentración variable de oxígeno, dependiente principalmente del patrón ventilatorio (profundidad y frecuencia) del paciente.`,'B':`Emplea el principio de Bernoulli, generando arrastre de aire ambiental, lo que permite administrar una FiO₂ precisa y constante.`,'C':`Utiliza un reservorio con reinhalación parcial de CO₂, aumentando progresivamente la FiO₂ conforme se incrementa el volumen corriente.`,'D':`Emplea el principio de Venturi-Laplace, que crea un efecto de vacío intramascarilla para aumentar automáticamente la FiO₂ según la demanda ventilatoria del paciente.`}},
{n:70,texto:`En relación con la espirometría de incentivo y las recomendaciones de enfermería para su correcta utilización, ¿cuál de las siguientes afirmaciones es INCORRECTA?`,opts:{'A':`Se recomienda que el paciente adopte una posición semi-Fowler o erecta antes de iniciar el procedimiento.`,'B':`El paciente debe colocar firmemente la boquilla en la boca, inspirar a través de la boca y mantener una apnea inspiratoria de al menos 5 segundos para mantener el indicador entre las líneas.`,'C':`La espirometría de incentivo debe realizarse 10 respiraciones consecutivas cada hora durante las horas de vigilia; entre intentos se aconsejan varias respiraciones normales para evitar la fatiga.`,'D':`En el espirómetro incentivo de flujo, la esfera o pesa se eleva en función de la intensidad del aire inspirado.`}},
{n:71,texto:`En relación con el drenaje postural y las recomendaciones de enfermería para su realización correcta y segura, ¿cuál de las siguientes afirmaciones es INCORRECTA?`,opts:{'A':`Antes del drenaje postural, se recomienda que el paciente inhale broncodilatadores y mucolíticos, si están prescritos, ya que facilitan el drenaje del árbol bronquial.`,'B':`Se indica al paciente permanecer en cada posición aproximadamente 10–15 minutos, realizando una respiración controlada.`,'C':`Durante cada posición el paciente debe inspirar lentamente por la nariz y espirar despacio con los labios fruncidos, con el fin de mantener las vías respiratorias abiertas y favorecer el drenaje de secreciones.`,'D':`En pacientes con tos ineficaz o incapacidad para toser, el drenaje postural debe evitarse, ya que la retención de secreciones aumenta el riesgo de atelectasia.`}},
{n:72,texto:`¿Cuál de las siguientes opciones incluye complicaciones reconocidas asociadas a la traqueostomía, tanto inmediatas como a largo plazo?`,opts:{'A':`Rotura del tronco arterial braquiocefálico, disfagia, dilatación e isquemia laríngea y hemorragia.`,'B':`Broncoaspiración, infección, estenosis traqueal y embolia grasa.`,'C':`Desplazamiento de la sonda, neumotórax, broncoaspiración y enfisema subcutáneo o mediastínico.`,'D':`Desintubación accidental, daño en el nervio traqueal y fístula traqueoesofágica.`}},
{n:73,texto:`Según la clasificación clínica habitual, la neumonía puede dividirse en cuatro tipos principales. ¿Cuál de las siguientes opciones incluye correctamente dichas categorías?`,opts:{'A':`Neumonía lobar, bronconeumonía, neumonía intersticial y neumonía necrotizante.`,'B':`Neumonía bacteriana, neumonía vírica, neumonía fúngica y neumonía por aspiración.`,'C':`Neumonía aguda, neumonía crónica, neumonía recurrente y neumonía idiopática.`,'D':`Neumonía extrahospitalaria, neumonía asociada a la atención sanitaria, neumonía intrahospitalaria y neumonía asociada a ventilación mecánica.`}},
{n:74,texto:`Respecto a la clasificación anatomopatológica de la neumonía según su patrón de afectación pulmonar, ¿cuál de las siguientes afirmaciones es correcta?`,opts:{'A':`Cuando una gran parte de uno o más lóbulos está afectada, se denomina neumonía lobular; la bronconeumonía corresponde a neumonía “en placas” y es más frecuente que la neumonía lobular.`,'B':`La neumonía lobular corresponde a lesiones parcheadas de origen bronquial y es más frecuente que la bronconeumonía.`,'C':`La bronconeumonía afecta típicamente un lóbulo completo y su origen se localiza en el parénquima alveolar.`,'D':`La neumonía lobular y la bronconeumonía presentan la misma frecuencia, diferenciándose únicamente por la etiología (vírica frente a bacteriana).`}},
{n:75,texto:`En relación con la tuberculosis (TB), señale la afirmación correcta:`,opts:{'A':`Mycobacterium tuberculosis es el principal agente causal de la TB; se trata de un bacilo acidorresistente, anaerobio y de crecimiento lento.`,'B':`Mycobacterium bovis y Mycobacterium avium casi nunca se relacionan con la aparición de una infección tuberculosa.`,'C':`La TB afecta principalmente al sistema nervioso central y raramente compromete el parénquima pulmonar.`,'D':`La TB no se relaciona con factores socioeconómicos.`}},
{n:76,texto:`Respecto a la interpretación de la prueba de la tuberculina (PPD/Mantoux) y a la vacunación con BCG, señale la afirmación correcta:`,opts:{'A':`Una induración de 0–4 mm se considera siempre significativa y compatible con infección tuberculosa previa.`,'B':`Una induración ≥10 mm se considera relevante únicamente en pacientes VIH positivos o contactos estrechos de TB activa.`,'C':`Una induración ≥5 mm se considera positiva en cualquier persona con inmunidad normal, aun sin factores de riesgo.`,'D':`Una induración ≥5 mm puede considerarse significativa en personas de riesgo, como pacientes positivos al VIH.`}},
{n:77,texto:`En relación con las manifestaciones clínicas de la insuficiencia respiratoria aguda, señale la opción que describe correctamente la progresión clínica asociada al deterioro de la oxigenación y al avance de la hipoxemia.`,opts:{'A':`Los signos tempranos pueden incluir inquietud, fatiga, cefalea, disnea y taquicardia; a medida que progresa la hipoxemia aparecen confusión, letargia, taquipnea, cianosis central y diaforesis.`,'B':`Los signos iniciales son tos productiva, fiebre y sibilancias; conforme progresa aparece edema agudo de pulmón y shock cardiogénico.`,'C':`Los signos iniciales incluyen cianosis central y confusión; posteriormente aparecen cefalea, inquietud, hipertensión y fatiga.`,'D':`Los signos tempranos se caracterizan por bradicardia e hipotensión; conforme progresa, aparecen taquicardia y diaforesis.`}},
{n:78,texto:`En relación con la enfermedad pulmonar obstructiva crónica (EPOC), señale la afirmación que es INCORRECTA:`,opts:{'A':`La limitación del flujo aéreo en la EPOC es progresiva y se asocia a una respuesta inflamatoria anómala de los pulmones frente a partículas o gases nocivos.`,'B':`La destrucción de la pared alveolar aumenta las uniones alveolares y reduce la elasticidad pulmonar.`,'C':`La respuesta inflamatoria afecta tanto a vías respiratorias proximales y periféricas como al parénquima pulmonar y la vasculatura pulmonar.`,'D':`En las vías respiratorias proximales puede producirse incremento de células caliciformes y crecimiento de glándulas submucosas, favoreciendo hipersecreción mucosa.`}},
{n:79,texto:`En relación con la realización de un electrocardiograma (ECG) estándar de 12 derivaciones y la correcta colocación de los electrodos, ¿cuál de las siguientes afirmaciones es correcta?`,opts:{'A':`El ECG estándar de 12 derivaciones requiere la colocación de 12 electrodos.`,'B':`Los electrodos de los miembros deben colocarse preferentemente sobre prominencias óseas, para asegurar una mejor conducción eléctrica y reducir el artefacto por movimiento.`,'C':`En un ECG de 12 derivaciones los electrodos de los miembros generan las derivaciones I, II, III, aVR, aVL y aVF.`,'D':`La colocación exacta de los electrodos torácicos no influye en la interpretación clínica del ECG, ya que el trazado puede corregirse automáticamente por el monitor.`}},
{n:80,texto:`Respecto a las extrasístoles auriculares, ¿cuál de las siguientes afirmaciones es correcta?`,opts:{'A':`Se caracterizan por alteración del ritmo con pausas compensatorias completas, sin cambios visibles en la morfología de la onda P, y con intervalos PP que suelen ser el doble del intervalo previo.`,'B':`Se observa una onda P prematura con morfología diferente, que acorta el intervalo PP y suele acompañarse de una pausa no compensatoria.`,'C':`Presentan ondas P negativas constantes en todas las derivaciones, con intervalo PR siempre mayor a 0,20 s y QRS ancho >0,12 s.`,'D':`Son exclusivas de cardiopatía estructural avanzada y no aparecen en corazones normales.`}},
{n:81,texto:`En la valoración vascular de las extremidades inferiores mediante Doppler manual de onda continua, ¿cuál de las siguientes afirmaciones es correcta?`,opts:{'A':`Cuanto mayor es la frecuencia (MHz), mayor es la penetración del tejido y mejor la detección en profundidad.`,'B':`El Doppler de onda continua permite localizar de forma precisa el sitio de una estenosis y diferenciar sin dificultad flujo arterial del venoso.`,'C':`Para la exploración de extremidades inferiores se coloca al paciente en sedestación con las piernas en declive para favorecer el llenado arterial y mejorar la señal.`,'D':`Se aplica gel acústico y se coloca el transductor sobre la arteria a 45–60°, inclinándolo lentamente hasta identificar el flujo arterial.`}},
{n:82,texto:`Respecto al Índice Tobillo-Brazo (ITB) como método de valoración de arteriopatía periférica, ¿cuál de las siguientes afirmaciones es correcta?`,opts:{'A':`El ITB es la relación entre la presión sistólica en el tobillo y la presión sistólica en el brazo; para su cálculo se divide la presión sistólica más alta del tobillo de cada pie por la presión sistólica braquial más alta.`,'B':`El ITB se calcula dividiendo la presión diastólica del tobillo entre la presión sistólica braquial, y se obtiene con Doppler en ambos valores.`,'C':`Para determinar el ITB el paciente debe estar sentado al menos 5 minutos, y el manguito se coloca a nivel del maléolo lateral.`,'D':`Las presiones sistólicas del tobillo se obtienen únicamente en la arteria femoral superficial, ya que las arterias tibial posterior y dorsal del pie no son accesibles con Doppler.`}},
{n:83,texto:`En relación con las úlceras venosas secundarias a insuficiencia venosa crónica, ¿cuál de las siguientes características es la más compatible con este tipo de lesión?`,opts:{'A':`Úlcera localizada en la región maleolar (interna o externa), generalmente grande, superficial y con exudado abundante.`,'B':`Úlcera pequeña, profunda y circular, localizada en la punta de los dedos o en espacios interdigitales.`,'C':`Lesión necrótica en la cara medial del primer dedo o lateral del quinto dedo, de bordes bien delimitados, secundaria a isquemia y presión.`,'D':`Úlcera distal con escaso exudado, dolor desencadenado por ejercicio y mejoría con reposo.`}},
{n:84,texto:`En el manejo de enfermería del paciente con úlceras en extremidades inferiores, ¿cuál de las siguientes afirmaciones es INCORRECTA?`,opts:{'A':`En fases iniciales puede ser necesario restringir la actividad física para favorecer la cicatrización.`,'B':`Se debe evitar uso de almohadillas térmicas o bolsas de agua caliente ya que aumentan la demanda tisular de oxígeno.`,'C':`Se recomienda una dieta rica en proteínas, vitaminas D y K, hierro y cinc, para promover la cicatrización.`,'D':`Si el dolor limita la actividad del paciente, pueden prescribirse analgésicos para mejorar la tolerancia funcional.`}},
{n:85,texto:`Según la tabla de clasificación de la presión arterial en adultos mayores de 18 años, ¿cuál de las siguientes opciones relaciona correctamente los valores de tensión normal, prehipertensión, hipertensión etapa 1 e hipertensión etapa 2?`,opts:{'A':`Normal: 120–139/80–89 mmHg; Prehipertensión: <120/<80 mmHg; HTA etapa 1: ≥160 o ≥100 mmHg; HTA etapa 2: 140–159 o 90–99 mmHg.`,'B':`Normal: <120/<80 mmHg; Prehipertensión: 120–139 o 80–89 mmHg; HTA etapa 1: 140–159 o 90–99 mmHg; HTA etapa 2: ≥160 o ≥100 mmHg.`,'C':`Normal: <120/<80 mmHg; Prehipertensión: 130–149 o 85–95 mmHg; HTA etapa 1: 150–169 o 95–104 mmHg; HTA etapa 2: ≥170 o ≥110 mmHg.`,'D':`Normal: <130/<85 mmHg; Prehipertensión: 130–139 o 85–89 mmHg; HTA etapa 1: 140–149 o 90–94 mmHg; HTA etapa 2: ≥150 o ≥95 mmHg.`}},
{n:86,texto:`En relación con los factores de riesgo asociados a hipertensión arterial (HTA), señale la opción correcta:`,opts:{'A':`La dislipidemia asociada a HTA se caracteriza por concentraciones elevadas de HDL y disminución de LDL.`,'B':`El tabaquismo es una causa directa de hipertensión arterial.`,'C':`La prevalencia de HTA depende fundamentalmente de factores hereditarios.`,'D':`La HTA se asocia frecuentemente a dislipidemia, obesidad y diabetes.`}},
{n:87,texto:`En relación con la insuficiencia cardiaca, señale la afirmación INCORRECTA.`,opts:{'A':`La clasificación funcional de la insuficiencia cardiaca según la New York Heart Association (NYHA) valora la limitación para la actividad física en clases I–IV.`,'B':`La fracción de eyección (FE) ventricular normal se sitúa habitualmente entre 45– 60% del volumen ventricular.`,'C':`La diabetes mellitus se asocia a un mayor riesgo de desarrollar insuficiencia cardiaca.`,'D':`La ateroesclerosis de las arterias coronarias constituye una causa primaria de insuficiencia cardiaca.`}},
{n:88,texto:`Un paciente refiere dolor torácico de aparición en reposo, acompañado de elevación reversible del segmento ST en el ECG. El cuadro se atribuye a vasoespasmo de una arteria coronaria. ¿Qué tipo de angina describe mejor esta presentación clínica?`,opts:{'A':`Angina estable.`,'B':`Angina inestable.`,'C':`Angina refractaria.`,'D':`Angina variable.`}},
{n:89,texto:`En relación con la trombosis venosa profunda y los factores precipitantes implicados en el desarrollo de tromboembolismo venoso, ¿cuál de las siguientes combinaciones corresponde a la tríada de Virchow?`,opts:{'A':`Hipertensión arterial, hiperlipidemia y disfunción endotelial.`,'B':`Daño endotelial, estasis venosa y alteración de la coagulación.`,'C':`Disminución del gasto cardiaco, vasoconstricción venosa y agregación plaquetaria.`,'D':`Alteración endotelial, hipoxemia tisular y aumento de la presión intratorácica.`}},
{n:90,texto:`Ante un paciente con sospecha de arritmia grave en una tira electrocardiográfica, ¿cuál es la secuencia de análisis prioritaria y correcta para identificar de forma sistemática el trastorno del ritmo?`,opts:{'A':`Eje eléctrico → onda T → intervalo QT.`,'B':`Ondas P → intervalo PR → segmento ST.`,'C':`Frecuencia y ritmo ventricular → QRS (duración/forma) → ondas P y relación P:QRS.`,'D':`Segmento ST → onda U → intervalo QT.`}},
{n:91,texto:`Un paciente presenta angina de pecho y se instaura tratamiento médico. ¿Cuál de las siguientes afirmaciones describe mejor el tratamiento y objetivos terapéuticos de la angina?`,opts:{'A':`Los nitratos constituyen el tratamiento estándar para el alivio del dolor; el abordaje busca disminuir la demanda de oxígeno del miocardio y aumentar su suministro.`,'B':`El tratamiento estándar se basa exclusivamente en β-bloqueantes.`,'C':`La nitroglicerina es un vasodilatador potente que dilata principalmente arterias coronarias.`,'D':`El tratamiento farmacológico de la angina se orienta principalmente a incrementar el aporte de oxígeno al miocardio mediante vasodilatación arterial.`}},
{n:92,texto:`¿Cuál es la principal acción de la colecistoquinina (CCK) en el sistema digestivo?`,opts:{'A':`Estimular la secreción de ácido clorhídrico y pepsinógeno.`,'B':`Incrementar la liberación de insulina tras comidas ricas en carbohidratos.`,'C':`Estimular la contracción de la vesícula biliar y la secreción de enzimas pancreáticas.`,'D':`Reducir la secreción de bilis y acelerar el vaciamiento gástrico.`}},
{n:93,texto:`¿Cuál es el principal mecanismo celular responsable de la secreción de ácido clorhídrico por las células parietales gástricas?`,opts:{'A':`La difusión pasiva de protones a través de la membrana luminal.`,'B':`El co-transporte sodio-hidrógeno dependiente de gradiente electroquímico.`,'C':`La acción del intercambiador H⁺/K⁺-ATPasa en la membrana luminal.`,'D':`La secreción directa de ácido carbónico hacia la luz gástrica.`}},
{n:94,texto:`¿Cuál de los siguientes cambios relacionados con el envejecimiento del estómago puede provocar intolerancias alimentarias y disminución en la absorción de vitamina B12?`,opts:{'A':`La disminución de la motilidad y del vaciamiento gástrico.`,'B':`La degeneración y atrofia de las superficies mucosas gástricas con disminución de la producción de ácido clorhídrico.`,'C':`La reducción del tono del esfínter esofágico inferior.`,'D':`La disminución de la secreción de moco y de la elasticidad de la pared rectal.`}},
{n:95,texto:`¿Cuál de las siguientes situaciones clínicas es más coherente con un cuadro de gastritis crónica?`,opts:{'A':`Dolor epigástrico intenso de inicio brusco acompañado de hematemesis.`,'B':`Náuseas y vómitos autolimitados tras la ingesta de alimentos irritantes.`,'C':`Saciedad temprana, intolerancia a alimentos grasos y fatiga mantenida en el tiempo.`,'D':`Melena y signos de inestabilidad hemodinámica secundarios a sangrado digestivo.`}},
{n:96,texto:`En un paciente con sospecha de hemorragia digestiva alta secundaria a una úlcera péptica, ¿cuál de las siguientes manifestaciones clínicas orienta con MAYOR probabilidad a una hemorragia de pequeña cuantía pero mantenida?`,opts:{'A':`Hematemesis con vómitos de sangre roja brillante.`,'B':`Melena o heces negras y alquitranadas sin vómitos de sangre.`,'C':`Hipotensión brusca con taquicardia y palidez cutánea.`,'D':`Vómitos en “posos de café” asociados a inestabilidad hemodinámica.`}},
{n:97,texto:`Según los criterios diagnósticos de Roma IV, ¿cuál es el requisito temporal mínimo para establecer el diagnóstico de estreñimiento funcional?`,opts:{'A':`Presencia de síntomas durante al menos 3 meses, con inicio al menos 6 meses antes del diagnóstico.`,'B':`Presencia de síntomas durante al menos 6 meses, con inicio en los últimos 3 meses.`,'C':`Presencia de síntomas continuos durante 12 meses consecutivos.`,'D':`Presencia de síntomas intermitentes durante al menos 6 meses.`}},
{n:98,texto:`¿Cuál de las siguientes complicaciones sistémicas se asocia con MAYOR frecuencia a la colitis ulcerosa que a la enfermedad de Crohn?`,opts:{'A':`Obstrucción del intestino delgado.`,'B':`Megacolon tóxico.`,'C':`Colelitiasis.`,'D':`Hidronefrosis derecha.`}},
{n:99,texto:`En pacientes con disfunción hepática crónica, ¿cuál es la causa MÁS directamente relacionada con la aparición de hipoprotrombinemia y tendencia hemorrágica?`,opts:{'A':`Deficiencia de vitamina C.`,'B':`Deficiencia de vitamina K.`,'C':`Deficiencia de vitamina B₁ (tiamina).`,'D':`Deficiencia de vitamina A.`}},
{n:100,texto:`En un paciente con cirrosis alcohólica y tendencia a la retención de líquidos, ¿cuál es el objetivo principal del asesoramiento enfermero para identificar y evitar el consumo habitual de alimentos en conserva?`,opts:{'A':`Reducir la ingesta de proteínas para prevenir la encefalopatía hepática.`,'B':`Disminuir el aporte de sodio y prevenir el empeoramiento del edema y la ascitis.`,'C':`Evitar la absorción de grasas saturadas y colesterol.`,'D':`Prevenir déficits de vitaminas hidrosolubles.`}}];
let estado={},orden=PREGUNTAS.map(p=>p.n),modoFallos=false;
function cargarEstado(){try{const r=localStorage.getItem(STORAGE_KEY);if(r)estado=JSON.parse(r);}catch(e){estado={};}}
function guardarEstado(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(estado));}catch(e){}}
function calcularStats(){let ok=0,fail=0;PREGUNTAS.forEach(p=>{if(estado[p.n]){if(estado[p.n].correcto)ok++;else fail++;}});return{ok,fail,total:PREGUNTAS.length};}
function actualizarHeader(){const s=calcularStats();const r=s.ok+s.fail;document.getElementById('barraFill').style.width=(r/s.total*100)+'%';document.getElementById('progresoTexto').textContent=r+' / '+s.total;document.getElementById('statOk').textContent=s.ok+' correctas';document.getElementById('statFail').textContent=s.fail+' incorrectas';}
function renderizar(){
  const c=document.getElementById('contenedor');c.innerHTML='';
  const s=calcularStats();
  if(s.ok+s.fail===s.total&&!modoFallos){const pct=Math.round(s.ok/s.total*100);const b=document.createElement('div');b.className='banner-completado';b.innerHTML=`<h2>🎉 ¡Lote completado!</h2><div class="puntuacion">${s.ok}/${s.total}</div><p>${pct}% de acierto · Preguntas 51–100 · Enfermería</p>`;c.appendChild(b);}
  const pm=modoFallos?PREGUNTAS.filter(p=>estado[p.n]&&!estado[p.n].correcto):orden.map(n=>PREGUNTAS.find(p=>p.n===n));
  if(modoFallos&&pm.length===0){c.innerHTML+='<div style="text-align:center;padding:40px;color:var(--gris);font-family:Syne,sans-serif;">¡No hay preguntas falladas! 🎯</div>';return;}
  pm.forEach(pregunta=>{
    if(!pregunta)return;
    const resp=RESPUESTAS[pregunta.n];const est=estado[pregunta.n];const resuelta=!!est;
    const card=document.createElement('div');card.className='pregunta-card'+(resuelta?(' resuelta'+(est.correcto?'':' fallo')):'');card.id='p'+pregunta.n;
    let html=`<div class="pregunta-num">Pregunta ${pregunta.n}</div><div class="pregunta-texto">${pregunta.n}.- ${pregunta.texto}</div><div class="opciones">`;
    Object.entries(pregunta.opts).forEach(([letra,texto])=>{
      let cls='opcion-btn';let disabled=resuelta?'disabled':'';
      if(resuelta){if(letra===resp){cls+=est.elegida===letra?' correcta':' correcta-marcada';}else if(letra===est.elegida&&!est.correcto){cls+=' incorrecta';}}
      html+=`<button class="${cls}" ${disabled} onclick="responder(${pregunta.n},'${letra}')"><span class="letra">${letra})</span>${texto}</button>`;
    });
    html+=`</div>`;
    if(resuelta){html+=est.correcto?`<div class="resultado-badge badge-ok">✓ Correcto</div>`:`<div class="resultado-badge badge-error">✗ Incorrecto — Respuesta: ${resp}</div>`;}
    card.innerHTML=html;c.appendChild(card);
  });
}
function responder(num,letra){if(estado[num])return;const resp=RESPUESTAS[num];estado[num]={elegida:letra,correcto:letra===resp};guardarEstado();actualizarHeader();renderizar();setTimeout(()=>{const el=document.getElementById('p'+num);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});},100);}
function resetearTodo(){if(!confirm('¿Seguro que quieres reiniciar todo el progreso de este lote?'))return;estado={};guardarEstado();modoFallos=false;orden=PREGUNTAS.map(p=>p.n);actualizarHeader();renderizar();}
function mostrarSoloFallos(){modoFallos=!modoFallos;renderizar();}
function ordenAleatorio(){modoFallos=false;orden=[...PREGUNTAS.map(p=>p.n)].sort(()=>Math.random()-0.5);renderizar();window.scrollTo({top:0,behavior:'smooth'});}
cargarEstado();actualizarHeader();renderizar();
</script>
