const STORAGE_KEY='osakidetza_q51_100';

const PREGUNTAS=[
  {n:51,texto:"Corresponderá la presidencia del ente público Osakidetza-Servicio Vasco de Salud a:",opts:{A:"Quien ostente la presidencia del Gobierno (Lehendakari) de la Comunidad Autónoma del País Vasco.",B:"La Diputación General del Territorio Histórico en que esté situado el Ente.",C:"La presidencia a quien ostente la titularidad del Departamento de Sanidad y la presidencia de honor a quien ostente la presidencia del Gobierno (Lehendakari) de la Comunidad Autónoma del País Vasco.",D:"Quien ostente la titularidad del Departamento de Sanidad."}},
  {n:52,texto:"La función de nombrar y separar a quienes ocupen las Direcciones de División de la organización central del ente público corresponde a:",opts:{A:"El Consejo de Administración del Ente.",B:"La Dirección General del Ente.",C:"La Presidencia del Ente.",D:"Ninguno de los anteriores."}},
  {n:53,texto:"La composición del Consejo del ente público Osakidetza-Servicio Vasco de Salud contará, además de la persona que ejerza la Presidencia:",opts:{A:"Con cinco integrantes en representación de la Administración de la Comunidad Autónoma, que nombrará el Gobierno: una persona a propuesta de la titularidad del Departamento de Hacienda y Administración Pública, otra a propuesta de quien ostente la titularidad de Bienestar Social y las tres restantes a propuesta de la persona titular de Sanidad.",B:"Con cinco integrantes en representación de la Administración de la Comunidad Autónoma, que nombrará el Gobierno: una persona a propuesta de la titularidad del Departamento de Hacienda y Administración Pública, otra a propuesta de la persona titular de la Consejería de Presidencia y las tres restantes a propuesta de la persona titular de Sanidad.",C:"Con cinco integrantes en representación de la Administración de la Comunidad Autónoma, que nombrará el Gobierno: dos a propuesta de la persona titular del Departamento de Hacienda y Administración Pública y las tres restantes a propuesta de la persona titular de Sanidad.",D:"Ninguna de los anteriores."}},
  {n:54,texto:"La propuesta de Plan Estratégico del ente público Osakidetza-Servicio Vasco de Salud:",opts:{A:"Será formulada por la Dirección General del Ente.",B:"Será aprobada por la Presidencia del Ente.",C:"Será sometida a informe del Consejo de Administración del Ente.",D:"Todas las anteriores son ciertas."}},
  {n:55,texto:"La función de convocar, presidir, suspender y levantar las sesiones, arbitrar las deliberaciones del Consejo de Administración del ente público Osakidetza-Servicio vasco de salud y decidir los empates con su voto de calidad corresponderá a:",opts:{A:"La Dirección General.",B:"La Presidencia.",C:"La persona de mayor antigüedad del Consejo de Administración.",D:"Ninguna de las anteriores."}},
  {n:56,texto:"La persona titular de la Dirección General del ente público Osakidetza-Servicio Vasco de Salud:",opts:{A:"No podrá asistir a las reuniones del Consejo de Administración del Ente.",B:"Presidirá las reuniones del Consejo de Administración del Ente.",C:"Asistirá a las reuniones del Consejo de Administración del Ente con voz y voto.",D:"Asistirá a las reuniones del Consejo de Administración del Ente con voz y sin voto."}},
  {n:57,texto:"Corresponde a la organización central de administración y gestión corporativa del ente público Osakidetza-Servicio Vasco de Salud, en materia de gestión asistencial (señálese la respuesta incorrecta):",opts:{A:"Supervisar el cumplimiento de las políticas generales de calidad y realizar auditorías.",B:"Definir criterios generales y proponer la política de precios correspondiente a la prestación de servicios sanitarios incluida en la cobertura pública.",C:"Coordinar los recursos y, en su caso, proponer medidas de intervención sobre las listas de espera.",D:"Promover protocolos de interés general."}},
  {n:58,texto:"Corresponde a la organización central de administración y gestión corporativa del ente público Osakidetza-Servicio Vasco de Salud, en materia de gestión de recursos humanos (señálese la respuesta incorrecta):",opts:{A:"Supervisar, controlar y evaluar las políticas de personal del Ente.",B:"Promover acuerdos de cooperación con centros correspondientes a la sanidad privada.",C:"Dirigir el funcionamiento del registro de personal.",D:"Gestionar los procesos de selección y de provisión que el Consejo de Administración determine."}},
  {n:59,texto:"Corresponde a cada organización de servicios sanitarios del ente público Osakidetza-Servicio Vasco de Salud el ejercicio de todas las facultades de gestión y administración que se requieran para el ejercicio de la actividad de provisión de servicios sanitarios que tengan encomendada, quedando excluidas únicamente:",opts:{A:"Aquellas facultades de gestión centralizada que los estatutos sociales del ente público Osakidetza-Servicio Vasco de Salud atribuyen expresamente a la organización central del Ente Público y las competencias propias de otras instancias de acuerdo con las Leyes y Reglamentos vigentes.",B:"Aquellas facultades de gestión centralizada que los estatutos sociales del ente público Osakidetza-Servicio Vasco de Salud atribuyen expresamente a la Presidencia del Ente Público y las competencias propias de otras instancias de acuerdo con las Leyes y Reglamentos vigentes.",C:"Aquellas facultades de gestión centralizada que los estatutos sociales del ente público Osakidetza-Servicio Vasco de Salud atribuyen expresamente al Consejo de Administración del Ente Público y las competencias propias de otras instancias de acuerdo con las Leyes y Reglamentos vigentes.",D:"Ninguna de las anteriores."}},
  {n:60,texto:"El número de integrantes del equipo directivo de las organizaciones de servicios sanitarios del ente público Osakidetza-Servicio Vasco de Salud:",opts:{A:"Oscilará entre dos y tres.",B:"Oscilará entre tres y cuatro.",C:"Oscilará entre cuatro y cinco.",D:"La normativa que rige su estatuto jurídico no establece un número determinado sino un máximo de cinco."}},
  {n:61,texto:"La función de Representar al ente público Osakidetza-Servicio Vasco de Salud en la negociación colectiva del Acuerdo Marco de Condiciones de Trabajo del Personal corresponde a:",opts:{A:"La organización central de administración y gestión corporativa del ente público Osakidetza-Servicio Vasco de Salud.",B:"La Presidencia del ente público Osakidetza-Servicio Vasco de Salud.",C:"El Consejo de Administración del ente público Osakidetza-Servicio Vasco de Salud.",D:"Ninguna de las anteriores."}},
  {n:62,texto:"Para el desarrollo de funciones de propuesta y asesoramiento, así como de participación en las organizaciones de servicios sanitarios, existirá un Consejo de Dirección en cada una de ellas, integrado por:",opts:{A:"El equipo directivo, las jefaturas de unidad que se determinen y una representación de personas vocales electas que formen parte de los Consejos Técnicos de participación profesional respectivos.",B:"El equipo directivo, las jefaturas de unidad que se determinen, representantes sindicales y una representación de personas vocales electas que formen parte de los Consejos Técnicos de participación profesional respectivos.",C:"El equipo directivo y las jefaturas de unidad que se determinen.",D:"Todas las anteriores son falsas."}},
  {n:63,texto:"Las organizaciones de servicios sanitarios del ente público Osakidetza-Servicio Vasco de Salud podrán:",opts:{A:"Descentralizar la organización y su funcionamiento operativo, delegando en quienes ostenten la responsabilidad clínica facultades de gestión, aunque solo en materia de personal y siempre de acuerdo con el marco estratégico, los planes de gestión y el compromiso del contrato-programa suscrito por la organización.",B:"Descentralizar la organización y su funcionamiento operativo, delegando en quienes ostenten la responsabilidad clínica facultades de gestión, pero solo en materia económica y siempre de acuerdo con el marco estratégico, los planes de gestión y el compromiso del contrato-programa suscrito por la organización.",C:"Descentralizar la organización y su funcionamiento operativo, delegando en quienes ostenten la responsabilidad clínica facultades de gestión tanto en materia económica como de personal, de acuerdo con el marco estratégico, los planes de gestión y el compromiso del contrato-programa suscrito por la organización.",D:"Todas las anteriores son falsas."}},
  {n:64,texto:"En materia específica de inversiones, la competencia para ejecutar las compras de suministros que se consideren centralizadas, así como definir y/o ejecutar, en su caso, las consideradas integradas corresponde a:",opts:{A:"El Consejo de Administración del ente público Osakidetza-Servicio Vasco de Salud.",B:"La organización central de administración y gestión corporativa del ente público Osakidetza-Servicio Vasco de Salud.",C:"La organización de servicios del ente público Osakidetza-Servicio Vasco de Salud.",D:"A quien ostente la titularidad de la Dirección-Gerencia de cada organización de servicios sanitarios del Osakidetza-Servicio Vasco de Salud."}},
  {n:65,texto:"En el ámbito de una organización de servicios sanitarios del ente público Osakidetza-Servicio Vasco de Salud, presidir los Consejos Técnicos de participación profesional y promover su eficaz funcionamiento es una tarea que corresponde a:",opts:{A:"La Dirección General del Ente.",B:"Quien ostente la titularidad de la Dirección-Gerencia del Ente.",C:"La Dirección Médica del Ente.",D:"Ninguna de las anteriores."}},
  {n:66,texto:"Según el Artículo 1 del Decreto 100/2018 de las organizaciones sanitarias integradas del ente público Osakidetza-Servicio Vasco de Salud, ¿qué dos niveles asistenciales se integran en las Organizaciones Sanitarias Integradas (OSI) de Osakidetza?",opts:{A:"Atención especializada y Atención de Urgencias.",B:"Salud Pública y Servicios Sociosanitarios.",C:"Atención hospitalaria y Atención de Emergencias.",D:"Atención primaria y Atención hospitalaria."}},
  {n:67,texto:"Según el Artículo 2.1 del Decreto 100/2018 de las organizaciones sanitarias integradas del ente público Osakidetza-Servicio Vasco de Salud, ¿qué objetivo último persigue la configuración de las OSI?",opts:{A:"Reducir el gasto farmacéutico mediante la unificación de compras.",B:"Favorecer la integración clínica de manera que la atención se articule en torno a la persona.",C:"Centralizar los servicios de atención primaria en las sedes hospitalarias.",D:"Eliminar las categorías profesionales de atención primaria para unificarlas con las hospitalarias."}},
  {n:68,texto:"Según el Artículo 1 del Decreto 100/2018 de las organizaciones sanitarias integradas del ente público Osakidetza-Servicio Vasco de Salud, ¿bajo qué principio fundamental actuarán las Organizaciones Sanitarias Integradas (OSI) del ente público Osakidetza-Servicio Vasco de Salud?",opts:{A:"Principio de coordinación territorial y sectorial.",B:"Principio de jerarquía funcional única.",C:"Principio de autonomía económico-financiera y de gestión.",D:"Principio de centralización de todos los recursos."}},
  {n:69,texto:"De acuerdo con el Artículo 3 del Decreto 100/2018 de las organizaciones sanitarias integradas del ente público Osakidetza-Servicio Vasco de Salud, ¿cómo se define una OSI de clase 'monográfica'?",opts:{A:"Es aquella donde solo se integran servicios de atención hospitalaria especializada.",B:"Es aquella cuya actividad asistencial gira en torno a un ámbito específico, integrando sus servicios y dispositivos.",C:"Es una organización que solo atiende a una patología crónica específica.",D:"Es la organización que carece de servicios de atención primaria."}},
  {n:70,texto:"Según el Decreto 100/2018 de las organizaciones sanitarias integradas del ente público Osakidetza-Servicio Vasco de Salud, las OSI de Tipo I se caracterizan, entre otros aspectos, por tener hospitales de carácter universitario y, además, por disponer de:",opts:{A:"Una base poblacional adscrita inferior a 300.000 habitantes.",B:"Una Dirección de Gestión que asume todas las funciones asistenciales.",C:"Unidades o servicios calificados de referencia para el conjunto del sistema sanitario vasco.",D:"Ser organizaciones de servicios de carácter monográfico y de pequeño tamaño."}},
  {n:71,texto:"Según el Decreto 100/2018 de las organizaciones sanitarias integradas del ente público Osakidetza-Servicio Vasco de Salud, para que una OSI sea clasificada como de Tipo III debe integrar, junto con servicios de atención primaria, un hospital de carácter general y tener una base poblacional atendida inferior a:",opts:{A:"500.000 habitantes.",B:"200.000 habitantes.",C:"300.000 habitantes.",D:"100.000 habitantes."}},
  {n:72,texto:"Según el Artículo 5 del Decreto 100/2018 de las organizaciones sanitarias integradas del ente público Osakidetza-Servicio Vasco de Salud, ¿cuáles son los tres órganos de participación que conforman la estructura organizativa de las OSI?",opts:{A:"El Consejo de Dirección, el Comité Ejecutivo y el Comité de Ética Asistencial.",B:"El Consejo Clínico Asistencial, el Consejo Social y la Comisión Sociosanitaria.",C:"La Comisión de Seguridad, la Comisión de Docencia y la Comisión de Investigación.",D:"El Consejo de Dirección, el Consejo Social y el Comité de Evaluación."}},
  {n:73,texto:"De acuerdo con el Decreto 100/2018 de las organizaciones sanitarias integradas del ente público Osakidetza-Servicio Vasco de Salud, ¿qué órganos componen el equipo directivo de una OSI, según la estructura general del artículo 5.2?",opts:{A:"Solo la Dirección Gerencia y la Dirección Médica.",B:"Las Direcciones Médica, de Atención Integrada, de Enfermería, de Personas, Económico-Financiera y de Gestión.",C:"El Consejo de Dirección y el Consejo Social exclusivamente.",D:"La Dirección Gerencia y las Jefaturas de Servicio de cada centro de salud."}},
  {n:74,texto:"De acuerdo con el Decreto 100/2018 de las organizaciones sanitarias integradas del ente público Osakidetza-Servicio Vasco de Salud, en las OSI de Tipo IV, la Dirección Gerencia asume, con el apoyo de puestos funcionales asistenciales, las funciones que corresponden a:",opts:{A:"La Dirección de Personas y la Dirección Económico-Financiera.",B:"La Dirección de Personas y la Dirección de Atención Integrada.",C:"La Dirección Médica y la Dirección de Enfermería.",D:"La Dirección de Gestión y el Consejo de Dirección."}},
  {n:75,texto:"De acuerdo con el Decreto 100/2018 de las organizaciones sanitarias integradas del ente público Osakidetza-Servicio Vasco de Salud, ¿cuál de los siguientes NO es un órgano de dirección encargado del gobierno y gestión de las OSI de Tipo I y II?",opts:{A:"La Dirección de Personas.",B:"El Consejo Clínico Asistencial.",C:"La Dirección de Atención Integrada.",D:"La Dirección Económico-Financiera."}},
  {n:76,texto:"Según el Artículo 7.3 del Decreto 100/2018 de las organizaciones sanitarias integradas del ente público Osakidetza-Servicio Vasco de Salud, ¿quién tiene la competencia para el nombramiento y cese de la persona titular de la Dirección Gerencia?",opts:{A:"El Consejero o la Consejera de Salud.",B:"La Dirección General del Ente Público Osakidetza.",C:"El Consejo de Administración a propuesta de Lehendakaritza.",D:"La Dirección de Personas de la propia OSI."}},
  {n:77,texto:"Según los Artículos 7 y 9 del Decreto 100/2018 de las organizaciones sanitarias integradas del ente público Osakidetza-Servicio Vasco de Salud, ¿cuál es un requisito obligatorio para el nombramiento de los cargos de dirección de una OSI?",opts:{A:"Haber pertenecido al Consejo Clínico Asistencial durante al menos dos años.",B:"Superar un examen de oposición específico para gerencia sanitaria.",C:"Previa convocatoria pública donde se acredite titulación, capacidad y experiencia profesional.",D:"Tener la condición de personal estatutario fijo en la categoría de técnico/a superior."}},
  {n:78,texto:"Según el Artículo 8.m del Decreto 100/2018 de las organizaciones sanitarias integradas del ente público Osakidetza-Servicio Vasco de Salud, ¿a qué dirección corresponde 'orientar la gestión desde una visión integradora empoderando la atención primaria'?",opts:{A:"Dirección de Atención Integrada.",B:"Dirección Gerencia.",C:"Dirección de Enfermería.",D:"Dirección Económico-Financiera."}},
  {n:79,texto:"De acuerdo con el Decreto 100/2018 de las organizaciones sanitarias integradas del ente público Osakidetza-Servicio Vasco de Salud, ¿con qué ámbito(s) adicional(es) debe coordinar su actividad la Dirección de Atención Integrada, además de con la atención primaria y hospitalaria?",opts:{A:"Con el ámbito de Recursos Humanos y con la Universidad.",B:"Con el ámbito comunitario y socio-sanitario.",C:"Únicamente con el sociosanitario.",D:"Con las entidades locales y las empresas privadas de gestión."}},
  {n:80,texto:"Según el Artículo 19.1 del Decreto 100/2018 de las organizaciones sanitarias integradas del ente público Osakidetza-Servicio Vasco de Salud, ¿quién ejerce la presidencia del Consejo Clínico Asistencial?",opts:{A:"La persona titular de la Dirección Gerencia.",B:"La persona titular de la Dirección Médica.",C:"La persona titular de la Dirección de Enfermería.",D:"La persona de mayor antigüedad en la vocalía de Atención Primaria."}},
  {n:81,texto:"Según el Decreto 147/2015, de 21 de julio, por el que se aprueba la Declaración sobre Derechos y Deberes de las personas en el sistema sanitario de Euskadi, son titulares de los derechos y deberes recogidos en esta Declaración:",opts:{A:"Todas las personas que accedan o utilicen las prestaciones y servicios sanitarios que se proporcionan por el sistema sanitario de Euskadi.",B:"Todas las personas nacidas en Euskadi.",C:"Todas las personas empadronadas en Euskadi.",D:"Todas las respuestas anteriores son correctas."}},
  {n:82,texto:"Según el Decreto 147/2015, de 21 de julio, por el que se aprueba la Declaración sobre Derechos y Deberes de las personas en el sistema sanitario de Euskadi, todos los derechos y obligaciones establecidos son exigibles:",opts:{A:"En relación a todas las acciones de carácter sanitario, incluyendo docencia, que se desarrollen en los centros, servicios o establecimientos sanitarios de titularidad pública o privada o concertados de Euskadi. Las acciones relativas a la investigación biomédica quedan fuera de esta Declaración y se rigen por su normativa específica.",B:"En relación a todas las acciones de carácter sanitario, incluyendo docencia, que se desarrollen en los centros, servicios o establecimientos sanitarios de titularidad pública o concertados que integran el sistema sanitario de Euskadi. Las acciones relativas a la investigación biomédica quedan fuera de esta Declaración y se rigen por su normativa específica.",C:"En relación a todas las acciones de carácter sanitario, incluyendo investigación y docencia, que se desarrollen en los centros, servicios o establecimientos sanitarios de titularidad pública o privada o concertados de Euskadi.",D:"En relación a todas las acciones de carácter sanitario, incluyendo investigación y docencia, que se desarrollen en los centros, servicios o establecimientos sanitarios de titularidad pública o concertados que integran el sistema sanitario de Euskadi."}},
  {n:83,texto:"Según el Decreto 147/2015, de 21 de julio, por el que se aprueba la Declaración sobre Derechos y Deberes de las personas en el sistema sanitario de Euskadi, los principios que informan e inspiran el conjunto de acciones de carácter sanitario que se desarrollen en el sistema sanitario de Euskadi son:",opts:{A:"El respeto a la libertad de la persona, a su dignidad y a la autonomía en las decisiones que afecten a su salud.",B:"El respeto a todo el personal profesional que integra el sistema sanitario de Euskadi.",C:"La promoción de la investigación científica en el marco del sistema sanitario de Euskadi.",D:"Todas las respuestas anteriores son correctas."}},
  {n:84,texto:"A los efectos de la Declaración sobre Derechos y Deberes de las personas en el sistema sanitario de Euskadi recogida en el Decreto 147/2015, de 21 de julio, se configuran las siguientes fases de la vida en las que se concretan necesidades específicas:",opts:{A:"1. Neonatología, infancia y adolescencia. 2. Salud sexual y reproductiva, embarazo y parto. 3. Salud laboral. 4. Personas mayores y final de la vida.",B:"1. Infancia y adolescencia. 2. Salud sexual y reproductiva. 3. Salud laboral. 4. Personas mayores.",C:"1. Infancia. 2. Adolescencia, salud sexual y reproductiva. 3. Personas mayores. 4. Final de la vida.",D:"1. Infancia y adolescencia. 2. Salud sexual y reproductiva. 3. Personas mayores. 4. Final de la vida."}},
  {n:85,texto:"Según el Decreto 147/2015, de 21 de julio, por el que se aprueba la Declaración sobre Derechos y Deberes de las personas en el sistema sanitario de Euskadi, las personas pacientes y usuarias del Sistema Sanitario de Euskadi, en relación con la asistencia sanitaria específica referida al final de la vida, tienen derecho a:",opts:{A:"Al acompañamiento de familiares y personas allegadas en los procesos con hospitalización.",B:"Al uso, con carácter general, de habitación individual.",C:"Al acompañamiento espiritual.",D:"Todas las respuestas anteriores son correctas."}},
  {n:86,texto:"Según el Decreto 147/2015, de 21 de julio, por el que se aprueba la Declaración sobre Derechos y Deberes de las personas en el sistema sanitario de Euskadi, la persona paciente o usuaria:",opts:{A:"Debe dejar por escrito las decisiones cuando sea legalmente exigible o recomendable.",B:"Debe dejar por escrito las decisiones cuando se lo solicite el personal profesional que le atienda.",C:"Debe dejar por escrito las decisiones cuando la política del centro sanitario así lo establezca.",D:"Debe dejar por escrito las decisiones cuando puedan tener relevancia a efectos de responsabilidad legal."}},
  {n:87,texto:"Según el Decreto 147/2015, de 21 de julio, por el que se aprueba la Declaración sobre Derechos y Deberes de las personas en el sistema sanitario de Euskadi, los Servicios de Atención a Pacientes y personas Usuarias:",opts:{A:"Estarán disponibles en las Organizaciones de Servicios Sanitarios de Osakidetza-Servicio Vasco de Salud, los centros sanitarios concertados, los centros privados y el departamento competente en materia de sanidad.",B:"Estarán disponibles en las Organizaciones de Servicios Sanitarios de Osakidetza-Servicio Vasco de Salud, los centros sanitarios concertados y el departamento competente en materia de sanidad, pero no existe previsión en relación con los centros privados.",C:"Estarán disponibles en las Organizaciones de Servicios Sanitarios de Osakidetza-Servicio Vasco de Salud, pero no existe previsión en relación con los centros concertados, ni con los privados ni con el departamento competente en materia de sanidad.",D:"Estarán disponibles en las Organizaciones de Servicios Sanitarios de Osakidetza-Servicio Vasco de Salud y en los centros sanitarios concertados y privados, pero no existe previsión en relación con el departamento competente en materia de sanidad."}},
  {n:88,texto:"Según el Decreto 147/2015, de 21 de julio, por el que se aprueba la Declaración sobre Derechos y Deberes de las personas en el sistema sanitario de Euskadi, las reclamaciones contra actuaciones del personal:",opts:{A:"Se resolverán atendiendo a las normas disciplinarias específicas previa apertura, en su caso, del expediente informativo correspondiente, sin perjuicio de las responsabilidades que de los hechos pudieran derivarse.",B:"Se resolverán atendiendo a las normas disciplinarias generales previa apertura, en su caso, del expediente informativo correspondiente, sin perjuicio de las responsabilidades que de los hechos pudieran derivarse.",C:"Se resolverán atendiendo a las normas disciplinarias específicas previa apertura, en su caso, del expediente informativo y de expediente de mediación, sin perjuicio de las responsabilidades que de los hechos pudieran derivarse.",D:"Se resolverán atendiendo a las normas disciplinarias generales previa apertura, en su caso, del expediente informativo y de expediente de mediación, sin perjuicio de las responsabilidades que de los hechos pudieran derivarse."}},
  {n:89,texto:"Según dispone la Ley 41/2002, de 14 de noviembre, básica reguladora de la autonomía del paciente y de derechos y obligaciones en materia de información y documentación clínica, la documentación clínica es:",opts:{A:"La información contenida en la historia clínica.",B:"El soporte de cualquier tipo o clase que contiene un conjunto de datos e informaciones de carácter asistencial y la documentación relativa a las voluntades anticipadas.",C:"El soporte de cualquier tipo o clase que contiene un conjunto de datos e informaciones de carácter asistencial y de investigación biomédica.",D:"El soporte de cualquier tipo o clase que contiene un conjunto de datos e informaciones de carácter asistencial."}},
  {n:90,texto:"Según dispone la Ley 41/2002, de 14 de noviembre, básica reguladora de la autonomía del paciente y de derechos y obligaciones en materia de información y documentación clínica, la información asistencial:",opts:{A:"Como regla general se proporcionará verbalmente.",B:"Como regla general se proporcionará por escrito.",C:"Como regla general se proporcionará verbalmente y por escrito.",D:"Como regla general se proporcionará por escrito cuando se trate de pacientes menores de edad."}},
  {n:91,texto:"Según dispone la Ley 41/2002, de 14 de noviembre, básica reguladora de la autonomía del paciente y de derechos y obligaciones en materia de información y documentación clínica, la información asistencial contiene, como mínimo:",opts:{A:"La finalidad y la naturaleza de cada intervención.",B:"La finalidad y la naturaleza de cada intervención y sus riesgos.",C:"La finalidad y la naturaleza de cada intervención, sus riesgos y sus consecuencias.",D:"La finalidad y la naturaleza de cada intervención, sus riesgos, sus consecuencias y los derechos de las personas pacientes."}},
  {n:92,texto:"Según dispone la Ley 41/2002, de 14 de noviembre, básica reguladora de la autonomía del paciente y de derechos y obligaciones en materia de información y documentación clínica, garantiza el cumplimiento del derecho a la información asistencial:",opts:{A:"La persona facultativa responsable de la persona paciente.",B:"La persona facultativa responsable de la persona paciente y el personal profesional que le atienda durante el proceso asistencial o le aplique una técnica o un procedimiento concreto.",C:"La persona facultativa responsable de la persona paciente y el personal de enfermería.",D:"El centro sanitario."}},
  {n:93,texto:"Según dispone la Ley 41/2002, de 14 de noviembre, básica reguladora de la autonomía del paciente y de derechos y obligaciones en materia de información y documentación clínica, la persona titular del derecho a la información asistencial es:",opts:{A:"La persona paciente. También serán informadas las personas vinculadas a ella, por razones familiares o de hecho, en la medida que la persona paciente lo permita de manera expresa o tácita.",B:"La persona paciente. También serán informadas las personas vinculadas a ella, por razones familiares o de hecho, en la medida que la persona paciente lo permita de manera expresa.",C:"La persona paciente. También serán informadas las personas vinculadas a ella, por razones familiares o de hecho, en la medida que la persona paciente lo permita por escrito.",D:"La persona paciente. También serán informadas las personas vinculadas a ella, por razones familiares o de hecho."}},
  {n:94,texto:"Según dispone la Ley 41/2002, de 14 de noviembre, básica reguladora de la autonomía del paciente y de derechos y obligaciones en materia de información y documentación clínica, cuando existe riesgo inmediato grave para la integridad física o psíquica de la persona enferma y no es posible conseguir su autorización:",opts:{A:"El personal facultativo podrá llevar a cabo las intervenciones clínicas indispensables en favor de la salud de la persona paciente, con el consentimiento de sus familiares.",B:"El personal facultativo podrá llevar a cabo las intervenciones clínicas indispensables en favor de la salud de la persona paciente, con el consentimiento de quien ostente la representación legal.",C:"El personal facultativo podrá llevar a cabo las intervenciones clínicas indispensables en favor de la salud de la persona paciente, con autorización judicial.",D:"El personal facultativo podrá llevar a cabo las intervenciones clínicas indispensables en favor de la salud de la persona paciente, sin necesidad de contar con su consentimiento."}},
  {n:95,texto:"Según dispone la Ley 41/2002, de 14 de noviembre, básica reguladora de la autonomía del paciente y de derechos y obligaciones en materia de información y documentación clínica, el personal facultativo proporcionará a la persona paciente, antes de recabar su consentimiento escrito, la información básica siguiente:",opts:{A:"Todos los riesgos en condiciones normales, conforme a la experiencia y al estado de la ciencia o directamente relacionados con el tipo de intervención.",B:"Todos los riesgos, siempre que sean graves, en condiciones normales, conforme a la experiencia y al estado de la ciencia o directamente relacionados con el tipo de intervención.",C:"Todos los riesgos probables en condiciones normales, conforme a la experiencia y al estado de la ciencia o directamente relacionados con el tipo de intervención.",D:"Todos los riesgos, siempre que sean probables y graves, en condiciones normales, conforme a la experiencia y al estado de la ciencia o directamente relacionados con el tipo de intervención."}},
  {n:96,texto:"Según dispone la Ley 41/2002, de 14 de noviembre, básica reguladora de la autonomía del paciente y de derechos y obligaciones en materia de información y documentación clínica, en caso de que la persona paciente no acepte el alta:",opts:{A:"El personal facultativo, previa comprobación del informe clínico correspondiente, oirá a la persona paciente y, si persiste en su negativa, lo pondrá en conocimiento de la dirección del centro para que confirme o revoque la decisión.",B:"El personal facultativo, previa comprobación del informe clínico correspondiente, oirá a la persona paciente y, si persiste en su negativa, lo pondrá en conocimiento de la autoridad judicial para que confirme o revoque la decisión.",C:"La dirección del centro, previa comprobación del informe clínico correspondiente, oirá a la persona paciente y, si persiste en su negativa, lo pondrá en conocimiento de la autoridad judicial para que confirme o revoque la decisión.",D:"La dirección del centro, previa comprobación del informe clínico correspondiente, oirá a la persona paciente y, si persiste en su negativa, lo pondrá en conocimiento de la autoridad administrativa competente para que confirme o revoque la decisión."}},
  {n:97,texto:"Según dispone la Ley 7/2002, de 12 de diciembre, de las voluntades anticipadas en el ámbito de la sanidad, la expresión de los objetivos vitales y valores personales tiene como fin:",opts:{A:"Conocer la voluntad de la persona paciente en relación con la administración de sedación.",B:"Conocer la voluntad de la persona paciente en relación con la finalización de tratamientos de soporte vital.",C:"Ayudar a interpretar las instrucciones y servir de orientación para la toma de decisiones clínicas.",D:"Documentar la actuación del personal profesional sanitario a efectos de responsabilidad legal en situaciones donde la persona paciente no puede expresar su voluntad por sí misma."}},
  {n:98,texto:"Según dispone la Ley 7/2002, de 12 de diciembre, de las voluntades anticipadas en el ámbito de la sanidad, en el documento de voluntades anticipadas:",opts:{A:"Se podrá designar una o varias personas representantes para que sean las interlocutoras válidas del personal facultativo o del equipo sanitario.",B:"Se podrá designar exclusivamente una persona representante para que sea la interlocutora válida del personal facultativo o del equipo sanitario.",C:"Se podrá designar una o varias personas representantes para que sean las interlocutoras válidas del personal facultativo o del equipo sanitario, si la persona paciente es menor de edad.",D:"Se podrá designar una o varias personas representantes para que sean las interlocutoras válidas del personal facultativo o del equipo sanitario y facultarles para interpretar sus valores e instrucciones, si la persona paciente está incapacitada judicialmente."}},
  {n:99,texto:"Según la Ley 7/2002, de 12 de diciembre, de las voluntades anticipadas en el ámbito de la sanidad, si el nombramiento de representante en el documento de instrucciones previas ha recaído en favor de la persona cónyuge o pareja de hecho de la persona otorgante:",opts:{A:"Se extingue a partir, bien de la interposición de la demanda de nulidad, separación matrimonial o divorcio, bien de la extinción formalizada de la pareja de hecho o unión libre. Para el mantenimiento de la designación será necesario, en caso de nulidad, separación matrimonial o divorcio, que conste expresamente en la resolución judicial dictada al efecto.",B:"Se extingue a partir bien de la nulidad, separación matrimonial o divorcio, bien de la extinción formalizada de la pareja de hecho o unión libre. Para el mantenimiento de la designación será necesario, en caso de nulidad, separación matrimonial o divorcio, que conste expresamente en la resolución judicial dictada al efecto.",C:"Se extingue a partir, bien de la interposición de la demanda de nulidad, separación matrimonial o divorcio, bien de la extinción formalizada de la pareja de hecho o unión libre. Para el mantenimiento de la designación será necesario, en caso de nulidad, separación matrimonial o divorcio, que conste expresamente en el documento de instrucciones previas.",D:"Se extingue bien a partir de la nulidad, separación matrimonial o divorcio, bien de la extinción formalizada de la pareja de hecho o unión libre. Para el mantenimiento de la designación será necesario, en caso de nulidad, separación matrimonial o divorcio, que conste expresamente en el documento de instrucciones previas."}},
  {n:100,texto:"Según dispone la Ley 7/2002, de 12 de diciembre, de las voluntades anticipadas en el ámbito de la sanidad, las instrucciones sobre el tratamiento pueden referirse:",opts:{A:"A una enfermedad o lesión que la persona otorgante ya padece o a las que eventualmente podría padecer en un futuro.",B:"Exclusivamente a una enfermedad o lesión que la persona otorgante ya padece.",C:"Exclusivamente a una enfermedad o lesión que la persona otorgante eventualmente podría padecer en un futuro.",D:"Exclusivamente a una enfermedad o lesión que la persona otorgante eventualmente podría padecer en un futuro, siempre que sea de carácter grave."}}
];

let estado={},orden=PREGUNTAS.map(p=>p.n),modoFallos=false;
function cargarEstado(){try{const r=localStorage.getItem(STORAGE_KEY);if(r)estado=JSON.parse(r);}catch(e){estado={};}}
function guardarEstado(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(estado));}catch(e){}}
function calcularStats(){let ok=0,fail=0;PREGUNTAS.forEach(p=>{if(estado[p.n]){if(estado[p.n].correcto)ok++;else fail++;}});return{ok,fail,total:PREGUNTAS.length};}
function actualizarHeader(){const s=calcularStats();const r=s.ok+s.fail;document.getElementById('barraFill').style.width=(r/s.total*100)+'%';document.getElementById('progresoTexto').textContent=r+' / '+s.total;document.getElementById('statOk').textContent=s.ok+' correctas';document.getElementById('statFail').textContent=s.fail+' incorrectas';}
function renderizar(){
  const c=document.getElementById('contenedor');c.innerHTML='';
  const s=calcularStats();
  if(s.ok+s.fail===s.total&&!modoFallos){const pct=Math.round(s.ok/s.total*100);const b=document.createElement('div');b.className='banner-completado';b.innerHTML=`<h2>🎉 ¡Lote completado!</h2><div class="puntuacion">${s.ok}/${s.total}</div><p>${pct}% de acierto · Preguntas 51–100</p>`;c.appendChild(b);}
  const pm=modoFallos?PREGUNTAS.filter(p=>estado[p.n]&&!estado[p.n].correcto):orden.map(n=>PREGUNTAS.find(p=>p.n===n));
  if(modoFallos&&pm.length===0){c.innerHTML+='<div style="text-align:center;padding:40px;color:var(--gris);font-family:Syne,sans-serif;">¡No hay preguntas falladas! 🎯</div>';return;}
  pm.forEach(pregunta=>{
    if(!pregunta)return;
    const resp=RESPUESTAS[pregunta.n];const est=estado[pregunta.n];const resuelta=!!est;
    const card=document.createElement('div');card.className='pregunta-card'+(resuelta?(' resuelta'+(est.correcto?'':' fallo')):'');card.id='p'+pregunta.n;
    let html=`<div class="pregunta-num">Pregunta ${pregunta.n}</div><div class="pregunta-texto">${pregunta.n}.- ${pregunta.texto}</div><div class="opciones">`;
    Object.entries(pregunta.opts).forEach(([letra,texto])=>{
      let cls='opcion-btn';let disabled=resuelta?'disabled':'';
      if(resuelta){if(letra===resp){cls+=est.elegida===letra?' correcta':' correcta-marcada';}else if(letra===est.elegida&&!est.correcto){cls+=' incorrecta';}}
      html+=`<button class="${cls}" ${disabled} onclick="responder(${pregunta.n},'${letra}')"><span class="letra">${letra})</span>${texto}</button>`;
    });
    html+=`</div>`;
    if(resuelta){html+=est.correcto?`<div class="resultado-badge badge-ok">✓ Correcto</div>`:`<div class="resultado-badge badge-error">✗ Incorrecto — Respuesta: ${resp}</div>`;}
    if(resp==='NULA'){html+=`<div class="pregunta-nula">⚠ Esta pregunta fue declarada NULA en el cuadro de respuestas oficial.</div>`;}
    card.innerHTML=html;c.appendChild(card);
  });
}
function responder(num,letra){if(estado[num])return;const resp=RESPUESTAS[num];estado[num]={elegida:letra,correcto:letra===resp};guardarEstado();actualizarHeader();renderizar();setTimeout(()=>{const el=document.getElementById('p'+num);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});},100);}
function resetearTodo(){if(!confirm('¿Seguro que quieres reiniciar todo el progreso de este lote?'))return;estado={};guardarEstado();modoFallos=false;orden=PREGUNTAS.map(p=>p.n);actualizarHeader();renderizar();}
function mostrarSoloFallos(){modoFallos=!modoFallos;renderizar();}
function ordenAleatorio(){modoFallos=false;orden=[...PREGUNTAS.map(p=>p.n)].sort(()=>Math.random()-0.5);renderizar();window.scrollTo({top:0,behavior:'smooth'});}
cargarEstado();actualizarHeader();renderizar();
</script>
