<script>
const STORAGE_KEY='enfermeria_q1_50';
const RESPUESTAS={1:'C',2:'A',3:'C',4:'B',5:'B',6:'B',7:'A',8:'B',9:'A',10:'D',11:'D',12:'B',13:'D',14:'C',15:'D',16:'D',17:'C',18:'A',19:'D',20:'B',21:'B',22:'B',23:'D',24:'C',25:'A',26:'D',27:'C',28:'C',29:'A',30:'C',31:'C',32:'B',33:'A',34:'B',35:'C',36:'A',37:'B',38:'C',39:'D',40:'B',41:'A',42:'C',43:'C',44:'B',45:'D',46:'B',47:'D',48:'A',49:'B',50:'D'};
const PREGUNTAS=[{n:1,texto:`La definición de enfermería de Virginia Henderson, publicada por el International Council of Nurses (ICN) en 1961 es:`,opts:{'A':`La función específica de la enfermera es ayudar a la persona, enferma o sana, a la realización de actividades que contribuyan a la salud o a su rehabilitación e inserción (o a una muerte tranquila) que realizaría sin ayuda si tuviera la fuerza, la voluntad o los conocimientos necesarios, y a hacerlo de tal manera que la ayude a ganar la independencia lo más rápidamente posible.`,'B':`La enfermería es una profesión esencial del sistema de salud dedicada al cuidado integral de personas, familias y comunidades, promoviendo la salud, previniendo enfermedades y asistiendo en la recuperación, abarcando aspectos físicos, mentales y sociales desde el nacimiento hasta la muerte, con un enfoque colaborativo y centrado en las personas que intervienen en el proceso.`,'C':`La función específica de la enfermera es ayudar a la persona, enferma o sana, a la realización de actividades que contribuyan a la salud o a su recuperación (o a una muerte tranquila) que realizaría sin ayuda si tuviera la fuerza, la voluntad o los conocimientos necesarios, y a hacerlo de tal manera que la ayude a ganar la independencia lo más rápidamente posible.`,'D':`La enfermería es una profesión esencial del sistema de salud dedicada al cuidado integral de personas, familias y comunidades, promoviendo la salud, previniendo enfermedades y asistiendo en la recuperación, abarcando aspectos físicos, mentales y sociales desde el nacimiento hasta la muerte, con un enfoque colaborativo y centrado en el paciente.`}},
{n:2,texto:`La teoría de Florence Nightingale se centró en el entorno, aun cuando ella en sus escritos prefirió el término alrededores. Definió y describió los conceptos de:`,opts:{'A':`Ventilación, calidez, luz, dieta, limpieza y ruido.`,'B':`Ventilación, calidez, luz, dieta, limpieza y descanso.`,'C':`Ventilación, humores, luz, dieta, limpieza y descanso.`,'D':`Ventilación, calidez, efluvios, alimentación, limpieza y ruido.`}},
{n:3,texto:`La obra de Nightingale es clara y fácil de comprender. Abordo tres tipos de relaciones principales, SEÑALE LA INCORRECTA:`,opts:{'A':`Entorno-paciente.`,'B':`Enfermera-entorno.`,'C':`Entorno-Cuidados.`,'D':`Enfermera-paciente.`}},
{n:4,texto:`¿Cuál de los siguientes NO es un Modelo Conceptual en enfermería?`,opts:{'A':`Modelo de la conservación.`,'B':`Modelo de promoción de la salud.`,'C':`Modelo del sistema conductual.`,'D':`Modelo de adaptación.`}},
{n:5,texto:`Dorothea Orem afirmó que:`,opts:{'A':`El autocuidado son las actividades que las personas realizan para mantener su salud y bienestar, pero cuando estas actividades exceden la capacidad de la persona, surge una "Disminución para mejorar la capacidad de autocuidado" y el personal sanitario debe intervenir para suplir esa falta mediante educación y apoyo, basándose en su teoría central, el Modelo del Déficit de Autocuidado.`,'B':`La enfermería pertenece a la familia de los servicios sanitarios que se organizan para prestar asistencia directa a personas con necesidades legítimas de diferentes formas de atención directa por sus estados de salud o por la naturaleza de sus necesidades de asistencia sanitaria.`,'C':`El autocuidado son las actividades que las personas realizan para mantener su salud y bienestar, pero cuando estas actividades exceden la capacidad de la persona, surge un "déficit de cuidado" y el personal sanitario debe intervenir para suplir esa falta mediante educación y apoyo, basándose en la teoría del Modelo de insuficiencia de Autocuidado.`,'D':`La enfermería pertenece a la familia de los servicios sanitarios y sociales que se organizan para prestar asistencia directa a personas con necesidades legítimas de diferentes formas de atención directa por sus estados de salud o por la naturaleza de sus necesidades de asistencia sanitaria.`}},
{n:6,texto:`¿Cuál de las siguientes teorías NO forma parte de la teoría general del déficit de autocuidado?`,opts:{'A':`La teoría de autocuidado.`,'B':`La teoría de procedimientos enfermeros.`,'C':`La teoría del déficit de autocuidado.`,'D':`La teoría del cuidado dependiente.`}},
{n:7,texto:`Los requisitos de autocuidado de desarrollo (RACD) estaban separados de los requisitos de autocuidado universales en la segunda edición de Nursing: Concepts of Practice de Orem. Se identificaron tres conjuntos de RACD, señálelos:`,opts:{'A':`Provisión de condiciones que fomentan el desarrollo, Implicación en el autodesarrollo y Prevenir o vencer los efectos de las condiciones humanas y de las situaciones vitales que pueden afectar de manera negativa al desarrollo humano.`,'B':`Provisión de condiciones que fomentan el desarrollo, Implicación en la adaptación a los cambios sobrevenidos y Prevenir o vencer los efectos de las condiciones humanas y de las situaciones vitales que pueden afectar de manera negativa al desarrollo humano.`,'C':`Provisión de condiciones que fomentan el desarrollo, Implicación en la adaptación al entorno y Prevenir o vencer los efectos de las condiciones humanas y de las situaciones vitales que pueden afectar de manera negativa al desarrollo humano.`,'D':`Provisión de condiciones que fomentan el desarrollo, Implicación en el autodesarrollo y Prevenir o vencer los efectos de las condiciones de la relación entorno-paciente-enfermera y de las situaciones vitales que pueden afectar de manera negativa al desarrollo humano.`}},
{n:8,texto:`¿Cuál es una característica general de los modelos conceptuales de enfermería?`,opts:{'A':`Establecen el significado de los fenómenos de enfermería a través del análisis, el razonamiento y la presentación lógica.`,'B':`Cada uno aborda los conceptos metaparadigmáticos de persona, entorno, salud y enfermería.`,'C':`Contribuyeron al desarrollo del conocimiento proporcionando una directriz o una base para los posteriores desarrollos.`,'D':`Reflejan métodos y enfoques científicos contemporáneos.`}},
{n:9,texto:`¿Cuál de las siguientes teorías de enfermería se considera una Teoría de nivel medio en enfermería?`,opts:{'A':`Teoría de las transiciones.`,'B':`Teoría de la diversidad y de la universalidad de los cuidados culturales.`,'C':`Teoría del duelo disfuncional.`,'D':`Teoría bioética sinfonológica.`}},
{n:10,texto:`¿Qué representación gráfica creo Florence Nightingale para representar los fallecimientos innecesarios en la Guerra de Crimea?`,opts:{'A':`Diagrama de Gantt.`,'B':`Diagrama de tela de araña.`,'C':`Diagrama de rosa de los vientos.`,'D':`Diagrama de área polar.`}},
{n:11,texto:`NO es un criterio para el desarrollo del estatus de profesional de enfermería.`,opts:{'A':`Aplica su corpus de conocimiento en servicios prácticos cruciales para el bienestar social y humano.`,'B':`Aumenta constantemente el corpus de conocimiento que utiliza y mejora sus técnicas de educación y servicio mediante el uso del método científico.`,'C':`Atrae a individuos con cualidades intelectuales y personales que ensalzan el servicio por encima del beneficio personal y que reconocen la ocupación que han escogido como un trabajo de por vida.`,'D':`Funciona de manera interdependiente para formular estrategias profesionales y, por tanto, controlar la actividad profesional.`}},
{n:12,texto:`Es considerada la madre de la enfermería psiquiátrica:`,opts:{'A':`Nancy Roper.`,'B':`Hildegard E. Peplau.`,'C':`Madeleine M. Leininger.`,'D':`Callista Roy.`}},
{n:13,texto:`Para Sor Callista Roy, la adaptación se refiere:`,opts:{'A':`Al proceso de ajustar el comportamiento, estructura o funcionamiento para acomodarse a un entorno o situación cambiante, permitiendo la estabilidad y el éxito en un ambiente determinado.`,'B':`Al proceso y al resultado por los que las personas, que tienen la capacidad de pensar, actuar y de sentir, como individuos, son conscientes y escogen integrar el ser humano con su entorno.`,'C':`Al proceso de ajustar el comportamiento, estructura o funcionamiento para acomodarse a un entorno o situación estable, permitiendo la supervivencia y el éxito en un ambiente determinado.`,'D':`Al proceso y al resultado por los que las personas, que tienen la capacidad de pensar y de sentir, como individuos o en grupos, son conscientes y escogen integrar el ser humano con su entorno.`}},
{n:14,texto:`La descripción breve de factor relacionado es:`,opts:{'A':`Evidencias o inferencias observables, que se agrupan como manifestaciones de diagnósticos, focalizados en problemas de promoción de la salud o síndromes.`,'B':`Factor antecedente que aumenta la susceptibilidad de una persona, cuidador, cuidadora, familia o comunidad a una respuesta humana indeseable.`,'C':`Factor antecedente que parece mostrar algún tipo de patrón de relación con la respuesta humana.`,'D':`Grupos de personas que comparten características socio demográficas, antecedentes de salud/familiares, estados de crecimiento/desarrollo o exposición a ciertos eventos/experiencias que hacen que todos los individuos sean susceptibles de una respuesta humana particular.`}},
{n:15,texto:`¿Cuál de las siguientes, se corresponde con una etiqueta diagnóstica nueva de la edición 2024-2026 de Diagnósticos enfermeros?`,opts:{'A':`Deterioro de la bipedestación.`,'B':`Riesgo de lesión.`,'C':`Salud deficiente de la comunidad.`,'D':`Disposición para mejorar el patrón del sueño.`}},
{n:16,texto:`¿Que engloba un diagnóstico enfermero?`,opts:{'A':`La culminación de los conocimientos disciplinares, enfermeros y el razonamiento clínico.`,'B':`Las observaciones realizadas y la consiguiente anotación de signos, síntomas y comportamientos específicos.`,'C':`La representación y codificación de las afecciones médicas que tratan.`,'D':`Una etiqueta derivada de los resultados de una valoración exhaustiva, basada en la comprensión de los conceptos cruciales dentro de la disciplina enfermera.`}},
{n:17,texto:`¿Cuál es el dominio en el que se encuentra el diagnóstico de “Hipertermia”?`,opts:{'A':`Confort.`,'B':`Principios vitales.`,'C':`Seguridad/protección.`,'D':`Eliminación/intercambio.`}},
{n:18,texto:`Una de las funciones que puede tener de la taxonomía II de NANDA I es:`,opts:{'A':`Identificar diagnósticos enfermeros fuera de su área de experiencia.`,'B':`Registrar más datos.`,'C':`Distinguir los datos relevantes de los irrelevantes.`,'D':`Puede ayudar a los profesionales sanitarios a desarrollar el currículo de formación de enfermería.`}},
{n:19,texto:`La taxonomía II de NANDA-I se organiza en:`,opts:{'A':`13 Dominios, 47 clases y 277 diagnósticos.`,'B':`12 Dominios, 48 clases y 277 diagnósticos.`,'C':`13 Dominios, 47 clases y 277 diagnósticos.`,'D':`13 Dominios, 48 clases y 277 diagnósticos.`}},
{n:20,texto:`¿En qué dominio “encaja” la clase 4; Función respiratoria?`,opts:{'A':`Actividad/reposo.`,'B':`Eliminación/intercambio.`,'C':`Principios vitales.`,'D':`Necesidad de respirar.`}},
{n:21,texto:`La definición del diagnóstico (00030), Deterioro del intercambio de gases es:`,opts:{'A':`Sensación exagerada y sostenida, de agotamiento y disminución de la capacidad para el trabajo físico y mental habitual.`,'B':`Exceso o déficit en la oxigenación y/o eliminación de dióxido de carbono.`,'C':`Dificultad para mantener una ventilación adecuada durante la inspiración y/o la expiración.`,'D':`Incapacidad para iniciar, y o mantener la respiración, independientemente para el mantenimiento de la vida.`}},
{n:22,texto:`Es un marco de valoración basado en la evidencia, recomendado según la declaración de posición de la NANDA-I.`,opts:{'A':`14 Necesidades básicas de Virginia Henderson.`,'B':`11 Patrones Funcionales de Salud.`,'C':`13 Dominios de la taxonomía NANDA-I.`,'D':`Conjunto mínimo básico de datos.`}},
{n:23,texto:`Según la estructura axial de NANDA-I, en el eje 2: sujeto del cuidado, se define al “paciente” como:`,opts:{'A':`Individuo, cuidador principal y familia.`,'B':`Individuo y familia.`,'C':`Individuo, cuidadores y comunidad.`,'D':`Individuo, familia y comunidad.`}},
{n:24,texto:`Señale la respuesta correcta en referencia a la obtención de datos subjetivos.`,opts:{'A':`Se refiere a las creencias o sentimientos que recoge la enfermera.`,'B':`Denotan hechos, observados por la enfermera u otros profesionales de la salud.`,'C':`Proceden de los informes verbales del paciente, que abarcan sus percepciones y pensamientos sobre diversos aspectos de la salud, la vida cotidiana, la comodidad, la relaciones y otros.`,'D':`Engloban las observaciones realizadas por las enfermeras sobre el paciente, recogidas mediante exploraciones físicas y resultados de pruebas diagnósticas.`}},
{n:25,texto:`“Una configuración de conductas que se produce secuencialmente largo del tiempo”, es la definición de:`,opts:{'A':`Patrón de M. Gordon.`,'B':`Necesidades de Maslow.`,'C':`Necesidad de autorrealización.`,'D':`Niveles de adquisición de habilidades clínicas en enfermería de P. Benner.`}},
{n:26,texto:`La secuencia ordenada de principio a final de los diversos componentes del Proceso Enfermero es:`,opts:{'A':`Valoración-Planificación-Diagnosticar -Implementar-Evaluar.`,'B':`Diagnosticar-Valoración -Planificación-Implementar-Evaluar.`,'C':`Observación-Diagnosticar-Planificación-Implementar-Evaluar.`,'D':`Valoración-Diagnosticar-Planificación-Implementar-Evaluar.`}},
{n:27,texto:`En relación con los axiomas de la comunicación formulados por Watzlawick, señale la afirmación VERDADERA:`,opts:{'A':`La comunicación solo se produce cuando existe una intención consciente de transmitir un mensaje.`,'B':`El nivel de contenido de un mensaje es independiente del tipo de relación existente entre los interlocutores.`,'C':`La manera en que cada interlocutor puntúa la secuencia comunicativa influye en la naturaleza de la relación.`,'D':`Las interacciones complementarias se caracterizan siempre por relaciones patológicas de dependencia.`}},
{n:28,texto:`En relación con la formación de la primera impresión en la comunicación interpersonal, ¿cuál de las siguientes afirmaciones es la CORRECTA?`,opts:{'A':`La primera impresión refleja de forma directa la intención comunicativa del emisor cuando el mensaje verbal es claro.`,'B':`La primera impresión depende exclusivamente de los elementos no verbales observables en el interlocutor.`,'C':`La primera impresión se construye a partir de la interpretación del receptor, que no siempre coincide con la intención comunicativa del emisor.`,'D':`La primera impresión puede controlarse completamente mediante la planificación consciente del discurso verbal.`}},
{n:29,texto:`En el ámbito de la comunicación interpersonal, ¿cuál de las siguientes definiciones se corresponde CORRECTAMENTE con la distancia personal lejana?`,opts:{'A':`Distancia limitada aproximadamente a la extensión del brazo, que marca el límite del dominio físico y suele utilizarse en interacciones personales sin contacto íntimo.`,'B':`Distancia propia de conversaciones formales con grupos o audiencias, en la que el interlocutor se sitúa claramente fuera del espacio personal.`,'C':`Distancia caracterizada por el contacto físico frecuente y la percepción del olor y la temperatura corporal.`,'D':`Distancia habitual en conversaciones informales entre personas que comparten un entorno laboral y mantienen una relación cotidiana.`}},
{n:30,texto:`En el contexto de la relación terapéutica, ¿cuál de las siguientes afirmaciones define de forma más precisa la actitud empática del profesional sanitario?`,opts:{'A':`Tendencia a experimentar una respuesta de lástima ante el sufrimiento del paciente, acompañada del deseo de protegerlo o aliviar su malestar.`,'B':`Capacidad de compartir emocionalmente el sufrimiento del paciente, viviéndolo como propio y reduciendo la distancia emocional entre ambos.`,'C':`Capacidad de comprender y percibir con precisión la experiencia emocional del paciente, comunicándole esa comprensión y manteniendo un límite claro entre el “yo” profesional y el “tú” del paciente.`,'D':`Actitud de preocupación afectiva orientada principalmente a consolar y aliviar el malestar del paciente, sin necesidad de explorar ni devolver de forma explícita su vivencia emocional.`}},
{n:31,texto:`Según la escala de Carkhuff para medir el nivel de autenticidad del profesional, ¿qué característica define mejor el NIVEL 4 de autenticidad?`,opts:{'A':`El profesional escucha al paciente, pero evita implicarse por temor a que la relación terapéutica se deteriore.`,'B':`El profesional responde de forma estereotipada, no se compromete con el paciente y desconoce su estado emocional.`,'C':`El profesional abandona una actitud rígida, muestra empatía hacia el paciente y facilita que este hable de lo que le ocurre, comprometiéndose a ayudarle.`,'D':`El profesional se compromete totalmente, comunica de forma empática y anima al paciente a una revelación profunda de su yo auténtico.`}},
{n:32,texto:`En la resolución de conflictos, ¿qué estilo se caracteriza por un equilibrio entre asertividad y cooperación, en el que ambas partes ceden parcialmente y ninguna obtiene plenamente lo que desea?`,opts:{'A':`Evitación.`,'B':`Compromiso.`,'C':`Colaboración.`,'D':`Acomodación.`}},
{n:33,texto:`En relación con la capacidad del profesional sanitario para desconectar y no llevarse consigo los problemas de los pacientes, ¿cuál de las siguientes afirmaciones es la MÁS ajustada a una práctica profesional saludable?`,opts:{'A':`Implicarse plenamente en el aquí y ahora con el paciente, delimitando conscientemente el momento en que finaliza la relación asistencial para poder reorientarse a otras actividades sin culpa.`,'B':`Reducir la implicación emocional durante la atención para evitar el desgaste profesional, manteniendo una distancia afectiva constante con todos los pacientes.`,'C':`Compartir de forma habitual con familiares o personas cercanas las vivencias emocionales intensas del trabajo como principal estrategia de descarga.`,'D':`Evitar reflexionar sobre las situaciones vividas con los pacientes una vez finalizada la jornada laboral para impedir la aparición de malestar emocional.`}},
{n:34,texto:`Una paciente expresa durante la entrevista: “Me siento muy sola últimamente. Desde que falleció mi marido no tengo ganas de salir ni de ver a nadie; creo que eso es lo que me está provocando esta tristeza constante”. Según las fases de la relación de ayuda, ¿en cuál de las siguientes se sitúa principalmente este momento del proceso?`,opts:{'A':`Configuración del encuentro personal: acogida y orientación.`,'B':`Exposición, clarificación, identificación y definición del problema.`,'C':`Confrontación y reestructuración del problema.`,'D':`Iniciación al plan de acción: definición de objetivos y planificación de actividades.`}},
{n:35,texto:`Durante una sesión grupal, una profesional de enfermería recibe feedback de sus compañeras sobre un tono autoritario del que ella no era consciente y que puede estar influyendo negativamente en la comunicación con los pacientes. Según el modelo de la ventana de Johari, ¿en qué área se situaba inicialmente este aspecto de su conducta?`,opts:{'A':`Área abierta o libre.`,'B':`Área oculta.`,'C':`Área ciega.`,'D':`Área desconocida.`}},
{n:36,texto:`Cuando un paciente llega agresivo a la consulta, ¿cuál es la intervención MÁS adecuada desde el punto de vista de la comunicación terapéutica?`,opts:{'A':`Manifestarle que nos preocupa su agresividad, explorando a qué se debe y qué cree que le ayudaría a sentirse mejor.`,'B':`Desde el primer momento mostrarle firmeza, estableciendo límites claros mediante mensajes directos como “no toleramos que nos grite o nos falte al respeto”.`,'C':`Decirle que lo atenderemos cuando se calme, interrumpiendo la interacción hasta que modifique su conducta.`,'D':`Responder a la agresividad con un tono igualmente firme y autoritario para recuperar el control de la situación.`}},
{n:37,texto:`En el contexto de la comunicación terapéutica, el feedback se define como:`,opts:{'A':`Reflejar literalmente al paciente lo que nos ha dicho, sin añadir ni modificar ningún contenido.`,'B':`Devolver al paciente lo que hemos comprendido de su mensaje, integrando tanto el contenido como los aspectos emocionales percibidos.`,'C':`Interpretar el discurso del paciente desde el marco teórico del profesional para explicarle el origen de su problema.`,'D':`Resumir la información aportada por el paciente con el objetivo principal de agilizar la entrevista clínica.`}},
{n:38,texto:`En el contexto de la relación de ayuda, el profesional que actúa como receptor eficaz es aquel que:`,opts:{'A':`Se comporta en todo momento de forma auténtica, priorizando la expresión de sus propias vivencias personales durante la interacción con el paciente.`,'B':`Sabe disimular adecuadamente las situaciones difíciles para evitar que el paciente se sienta incómodo.`,'C':`Sabe interpretar correctamente los mensajes verbales y no verbales del paciente, devolviéndolos de forma comprensible y ajustada.`,'D':`Mantiene una actitud distante y neutral para no implicarse emocionalmente en los problemas del paciente.`}},
{n:39,texto:`En la fase de confrontación de la relación de ayuda, el profesional debe decidir qué aspectos confrontar para favorecer la toma de conciencia del paciente. Señale la opción FALSA:`,opts:{'A':`Las incongruencias entre lo que el paciente dice y lo que hace.`,'B':`Los mecanismos de defensa que dificultan la autoexploración`,'C':`La responsabilidad del paciente en la persistencia de su problema.`,'D':`Los rasgos de personalidad del paciente para que los modifique.`}},
{n:40,texto:`La definición de la categoría III de las lesiones por presión, se corresponde con:`,opts:{'A':`La pérdida de espesor parcial de la dermis se presenta como una úlcera abierta poco profunda con un lecho de la herida rojo-rosado, sin esfacelos.`,'B':`El tejido subcutáneo o hipodermis puede ser visible, pero los huesos, tendones o músculos no están expuestos, pudiendo presentar cavitaciones y tunelizaciones.`,'C':`Pérdida del espesor total de los tejidos donde la profundidad real de la lesión por presión está completamente cubierta por esfacelos y/o escaras en el lecho de la herida.`,'D':`Piel intacta con enrojecimiento que no palidece al presionar en un área localizada generalmente sobre una prominencia ósea.`}},
{n:41,texto:`Señale la respuesta CORRECTA relacionada con la prevención de lesiones por presión relacionadas con uso de dispositivos sanitarios.`,opts:{'A':`Revisa al menos 2 veces/día la piel bajo los dispositivos sanitarios.`,'B':`Considere usar apósitos reguladores de metaloproteasas para la prevención de lesiones cutáneas.`,'C':`Evite la presión directa sobre las prominencias óseas del cuerpo y aplíquela sobre dispositivos.`,'D':`Realice cambios posturales cada 2h.`}},
{n:42,texto:`Las localizaciones más frecuentes de lesiones por presión en la posición de decúbito lateral, son:`,opts:{'A':`Maléolos, los trocánteres, las costillas, los hombros, las orejas, los pómulos, las crestas ilíacas y la cara interna y lateral de las rodillas.`,'B':`Maléolos, los trocánteres, las costillas, los hombros, las orejas, los pómulos, las mamas, las crestas ilíacas y la cara interna y lateral de las rodillas.`,'C':`Maléolos, los trocánteres, las costillas, los hombros, las orejas, las crestas ilíacas y la cara interna y lateral de las rodillas.`,'D':`Maléolos, los trocánteres, las costillas, los hombros, las orejas, los omoplatos, las crestas ilíacas y la cara interna y lateral de las rodillas.`}},
{n:43,texto:`Osakidetza ha establecido consideraciones especiales, tanto para la valoración inicial como para la revaluación del riesgo de lesiones por presión. SEÑALE LA CORRECTA.`,opts:{'A':`En ingresos inferiores a 24h es obligatorio valorar el riesgo en las primeras 2 horas.`,'B':`En intervenciones quirúrgicas programadas se debe realizar la valoración pre y post cirugía.`,'C':`En hospitalización a domicilio, la valoración del riesgo debe realizarse en las primeras 72h tras el ingreso.`,'D':`Es obligatorio valorar el riesgo de lesión por presion a las mujeres que ingresan en obstetricia para parto o cesárea.`}},
{n:44,texto:`En Atención Hospitalaria, la primera valoración del riesgo de lesiones por presión debe realizarse al ingreso. La frecuencia de la valoración de una persona sin riesgo, ingresada en una Unidad de Cuidados Intensivos es:`,opts:{'A':`c/ 7 días.`,'B':`Diaria.`,'C':`c/ 4 días.`,'D':`c/ 2 días.`}},
{n:45,texto:`En la prevención de lesiones por presión, en las posiciones de decúbito lateral y a fin de evitar apoyar el peso sobre los trocánteres:`,opts:{'A':`Se recomienda sobrepasar los 30º de lateralización.`,'B':`No se recomienda sobrepasar los 60º de lateralización.`,'C':`Se recomienda sobrepasar los 60º de lateralización.`,'D':`No se recomienda sobrepasar los 30º de lateralización.`}},
{n:46,texto:`Señale la respuesta CORRECTA relacionada con la prevención de lesiones por presión en personas que permanecen sentadas.`,opts:{'A':`Utilice flotadores o rodetes cuando la persona esté en sedestación.`,'B':`Recomiende que efectúe pulsiones cada 15 minutos. Si no se puede movilizar, se le realizarán cambios posturales al menos cada hora.`,'C':`Limite el tiempo que la persona pasa sentado en una silla con alivio de presión.`,'D':`Ponga los pies de la persona sobre una silla anexa cuando éstos no llegan a tocar el suelo.`}},
{n:47,texto:`Ante una persona que presenta mayor riesgo de desarrollar lesión por presión y no sea factible realizar cambios posturales, se debe utilizar:`,opts:{'A':`Superficie especial de manejo de presión estática.`,'B':`Colchones-cojines viscoelásticos.`,'C':`Colchonetas-cojines estáticos de aire.`,'D':`Superficie especial de manejo de presión activa.`}},
{n:48,texto:`En el interior de heridas, como material de relleno, ya que tienen gran capacidad de absorción de exudado, se recomienda utilizar:`,opts:{'A':`Alginatos e hidrofibras gelificantes.`,'B':`Apósitos con plata.`,'C':`Espuma de poliuretano como apósito secundario.`,'D':`a) y c) son correctas.`}},
{n:49,texto:`Señale una propiedad de los Ácidos Grasos Hiperoxigenados.`,opts:{'A':`Forman una película transparente e impermeable a líquidos.`,'B':`Restablecen el film hidro-lipídico de la piel.`,'C':`Mejoran la hidratación de la piel, aumentando su resistencia a la humedad.`,'D':`Preserva el nivel de oxigenación de los tejidos de apoyo, disminuyendo la microcirculación sanguínea y evitando las lesiones por presión.`}},
{n:50,texto:`Señale la afirmación CORRECTA relacionada con la prevención de lesiones por presión.`,opts:{'A':`Utilice dispositivos que eleven y descarguen el talón completamente de tal manera que distribuyan el peso de la pierna a lo largo del tríceps sural, presionando el talón de Aquiles.`,'B':`Proteja la piel del exceso de humedad con productos barrera (cremas con base de zinc o películas barrera)`,'C':`Utilice ácidos grasos hiperoxigenados (AGHO) hasta su absorción para hidratar a la persona en riesgo.`,'D':`Los apósitos recomendados para el alivio de presión son los apósitos de espuma de poliuretano.`}}];
let estado={},orden=PREGUNTAS.map(p=>p.n),modoFallos=false;
function cargarEstado(){try{const r=localStorage.getItem(STORAGE_KEY);if(r)estado=JSON.parse(r);}catch(e){estado={};}}
function guardarEstado(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(estado));}catch(e){}}
function calcularStats(){let ok=0,fail=0;PREGUNTAS.forEach(p=>{if(estado[p.n]){if(estado[p.n].correcto)ok++;else fail++;}});return{ok,fail,total:PREGUNTAS.length};}
function actualizarHeader(){const s=calcularStats();const r=s.ok+s.fail;document.getElementById('barraFill').style.width=(r/s.total*100)+'%';document.getElementById('progresoTexto').textContent=r+' / '+s.total;document.getElementById('statOk').textContent=s.ok+' correctas';document.getElementById('statFail').textContent=s.fail+' incorrectas';}
function renderizar(){
  const c=document.getElementById('contenedor');c.innerHTML='';
  const s=calcularStats();
  if(s.ok+s.fail===s.total&&!modoFallos){const pct=Math.round(s.ok/s.total*100);const b=document.createElement('div');b.className='banner-completado';b.innerHTML=`<h2>🎉 ¡Lote completado!</h2><div class="puntuacion">${s.ok}/${s.total}</div><p>${pct}% de acierto · Preguntas 1–50 · Enfermería</p>`;c.appendChild(b);}
  const pm=modoFallos?PREGUNTAS.filter(p=>estado[p.n]&&!estado[p.n].correcto):orden.map(n=>PREGUNTAS.find(p=>p.n===n));
  if(modoFallos&&pm.length===0){c.innerHTML+='<div style="text-align:center;padding:40px;color:var(--gris);font-family:Syne,sans-serif;">¡No hay preguntas falladas! 🎯</div>';return;}
  pm.forEach(pregunta=>{
    if(!pregunta)return;
    const resp=RESPUESTAS[pregunta.n];const est=estado[pregunta.n];const resuelta=!!est;
    const card=document.createElement('div');card.className='pregunta-card'+(resuelta?(' resuelta'+(est.correcto?'':' fallo')):'');card.id='p'+pregunta.n;
    let html=`<div class="pregunta-num">Pregunta ${pregunta.n}</div><div class="pregunta-texto">${pregunta.n}.- ${pregunta.texto}</div><div class="opciones">`;
    Object.entries(pregunta.opts).forEach(([letra,texto])=>{
      let cls='opcion-btn';let disabled=resuelta?'disabled':'';
      if(resuelta){if(letra===resp){cls+=est.elegida===letra?' correcta':' correcta-marcada';}else if(letra===est.elegida&&!est.correcto){cls+=' incorrecta';}}
      html+=`<button class="${cls}" ${disabled} onclick="responder(${pregunta.n},'${letra}')"><span class="letra">${letra})</span>${texto}</button>`;
    });
    html+=`</div>`;
    if(resuelta){html+=est.correcto?`<div class="resultado-badge badge-ok">✓ Correcto</div>`:`<div class="resultado-badge badge-error">✗ Incorrecto — Respuesta: ${resp}</div>`;}
    card.innerHTML=html;c.appendChild(card);
  });
}
function responder(num,letra){if(estado[num])return;const resp=RESPUESTAS[num];estado[num]={elegida:letra,correcto:letra===resp};guardarEstado();actualizarHeader();renderizar();setTimeout(()=>{const el=document.getElementById('p'+num);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});},100);}
function resetearTodo(){if(!confirm('¿Seguro que quieres reiniciar todo el progreso de este lote?'))return;estado={};guardarEstado();modoFallos=false;orden=PREGUNTAS.map(p=>p.n);actualizarHeader();renderizar();}
function mostrarSoloFallos(){modoFallos=!modoFallos;renderizar();}
function ordenAleatorio(){modoFallos=false;orden=[...PREGUNTAS.map(p=>p.n)].sort(()=>Math.random()-0.5);renderizar();window.scrollTo({top:0,behavior:'smooth'});}
cargarEstado();actualizarHeader();renderizar();
</script>
