const PREGUNTAS=[{n:251,texto:`En relación con la valoración enfermera del recién nacido que presenta vómitos, ¿cuál de las siguientes afirmaciones NO es correcta?`,opts:{'A':`Los vómitos de estos niños pueden asociarse con la ingestión de sangre o moco procedente del canal del parto.`,'B':`La aparición precoz de vómitos se asocia a obstrucción baja del tubo digestivo.`,'C':`A menudo, los vómitos se asocian a una sobrealimentación.`,'D':`Los vómitos pueden ser secundarios a procesos infecciosos locales fuera del tracto digestivo.`}},
{n:252,texto:`En relación con la rehidratación intravenosa en un lactante con deshidratación isotónica que presenta signos de hipovolemia, ¿cuál de las siguientes pautas iniciales de sueroterapia es la más adecuada durante la primera hora?`,opts:{'A':`Suero glucosado al 5% a 10 ml/kg/hora.`,'B':`Suero salino hipertónico al 3% a 5 ml/kg/hora.`,'C':`Suero glucosado al 10% a 15 ml/kg/hora.`,'D':`Suero glucosalino 1/5 a 20 ml/kg/hora.`}},
{n:253,texto:`En relación con la valoración clínica del lactante con sospecha de deshidratación leve, ¿cuál de los siguientes conjuntos de signos y síntomas es más compatible con este grado de deshidratación?`,opts:{'A':`Letargo y fontanelas hundidas.`,'B':`Mucosas muy secas y taquicardia leve.`,'C':`Pérdida de peso inferior al 5% y oliguria incipiente.`,'D':`Orina concentrada y somnolencia.`}},
{n:254,texto:`En relación con los cuidados enfermeros dirigidos a la familia y personas cuidadoras de un recién nacido ingresado en la Unidad de Cuidados Intensivos Neonatales, señale la afirmación INCORRECTA:`,opts:{'A':`Proporcionar información homogénea y comprensible entre los distintos miembros del equipo multidisciplinar.`,'B':`Mantener una comunicación sincera, incluso cuando el pronóstico sea incierto.`,'C':`Favorecer el contacto familiar mediante la flexibilización de horarios.`,'D':`Limitar la información proporcionada a la familia para reducir su ansiedad.`}},
{n:255,texto:`En relación con la valoración y los cuidados enfermeros del recién nacido con sospecha de síndrome de aspiración meconial, ¿cuál de los siguientes hallazgos debe alertar prioritariamente a la enfermera sobre la presencia de distrés respiratorio?`,opts:{'A':`Taquipnea, cianosis y tiraje subcostal.`,'B':`Bradipnea acompañada de hipotonía y episodios de apnea.`,'C':`Respiración irregular con respiraciones superficiales.`,'D':`Bradipnea, aleteo nasal y cianosis.`}},
{n:256,texto:`En relación con los cuidados inmediatos del recién nacido prematuro en la sala de partos, ¿cuál de las siguientes actuaciones enfermeras es prioritaria respecto al uso de la incubadora?`,opts:{'A':`Mantener la temperatura corporal del recién nacido entre 36,7 y 37,2ºC para evitar hipotermia.`,'B':`Ajustar la temperatura de la incubadora según la edad gestacional y el peso.`,'C':`Colocar al recién nacido en incubadora con control térmico intermitente.`,'D':`Ajustar la temperatura de la incubadora entre 25-29ºC.`}},
{n:257,texto:`En relación con la administración de oxígeno en el recién nacido pretérmino durante la reanimación y los cuidados iniciales, ¿cuál de las siguientes actuaciones enfermeras es correcta?`,opts:{'A':`Administrar oxígeno al 80-95% para prevenir episodios de hipoxia.`,'B':`Mantener concentraciones estables de oxígeno durante las primeras horas, ajustándolas solo ante cambios clínicos evidentes.`,'C':`Administrar oxígeno evitando concentraciones superiores al 40%.`,'D':`Suspender la administración de oxígeno en cuanto se estabilice la frecuencia respiratoria.`}},
{n:258,texto:`Durante la monitorización de un recién nacido pretérmino ingresado en la Unidad de Cuidados Intensivos Neonatales, la enfermera observa episodios recurrentes de apnea sin causa orgánica aparente. En relación con la apnea idiopática del prematuro, ¿cuál de los siguientes hallazgos es más característico de este cuadro clínico?`,opts:{'A':`Pausas respiratorias asociadas a inestabilidad laríngea.`,'B':`Episodios de hipoventilación asociados a inmadurez del control respiratorio.`,'C':`Episodios de apnea exclusivamente durante el llanto.`,'D':`Apnea asociada a estridor espiratorio persistente.`}},
{n:259,texto:`¿Cuál de las siguientes afirmaciones NO describe correctamente las convulsiones en el período neonatal?`,opts:{'A':`Pueden pasar desapercibidas por su presentación poco definida.`,'B':`Pueden corresponder a crisis ocasionales secundarias a agresiones agudas del sistema nervioso central.`,'C':`Suelen manifestarse mediante patrones motores claros y reconocibles.`,'D':`Pueden ser indicativas de disfunción del sistema nervioso central.`}},
{n:260,texto:`Las epilepsias y síndromes epilépticos en el período neonatal pueden manifestarse fundamentalmente de dos formas. ¿Cuál de las siguientes opciones recoge correctamente su clasificación?`,opts:{'A':`Epilepsias reflejas y epilepsias metabólicas.`,'B':`Epilepsias ocasionales y verdaderas epilepsias.`,'C':`Epilepsias transitorias y epilepsias adaptativas.`,'D':`Epilepsias funcionales y epilepsias madurativas.`}},
{n:261,texto:`Según las recomendaciones recogidas en el Programa de Salud Infantil de Osakidetza sobre seguridad vial, ¿cuál de las siguientes medidas es la más adecuada para reducir lesiones graves en un niño o una niña como pasajero/a?`,opts:{'A':`Usar un sistema de retención infantil (SRI) con arnés orientado hacia delante desde que no caben en el SRI a contramarcha hasta por lo menos los 6 años.`,'B':`Utilizar un sistema de retención infantil homologado, pudiendo utilizar el cinturón de seguridad de adulto en trayectos cortos.`,'C':`Utilizar cinturón de seguridad de tres puntos cuando ya no quepa en el sistema de retención infantil.`,'D':`Todos los menores de 15 años deben viajar en los asientos traseros.`}},
{n:262,texto:`En relación con las recomendaciones de prevención de accidentes y lesiones en la infancia, ¿cuál de las siguientes opciones agrupa medidas preventivas correctas en el hogar y en la vía pública?`,opts:{'A':`Girar los mangos de las ollas lejos del borde y tener precaución al cocinar con niños alrededor; asegurar el uso de casco en bicicleta/patinete y enseñar seguridad vial.`,'B':`Enseñar a los niños a compartir y controlar su temperamento; enseñar a evitar animales que no conocen; y evitar el uso de puertas en escalones y escaleras.`,'C':`Mantener cerillas y mecheros fuera del alcance de los niños; incentivar el uso de andadores para bebes; y asegurar el uso del casco al andar en bicicleta/patinete.`,'D':`Girar los mangos de las ollas hacia el borde para facilitar el manejo; evitar el transporte de preescolares en vehículos todo terreno; y enseñar a los niños a evitar los animales que no conocen.`}},
{n:263,texto:`El Programa de Salud Infantil de Osakidetza 2021 contempla un total de 15 visitas programadas. De ellas, dos se realizan exclusivamente con finalidad vacunal. ¿A qué edades están establecidas dichas visitas?`,opts:{'A':`4 meses y 6 meses.`,'B':`12 meses y 12 años.`,'C':`12 meses y 15 meses.`,'D':`6 meses y 13 años.`}},
{n:264,texto:`Según el Programa de Salud Infantil de Osakidetza 2021, ¿a qué edad se recomienda una visita con enfermería para el cribado de obesidad?`,opts:{'A':`Entre los 6–8 años, coincidiendo con la incorporación a la Educación Primaria y el inicio de cambios en los hábitos alimentarios.`,'B':`Entre los 4-6 años, ya que en ese periodo se produce el rebote adiposo.`,'C':`Entre los 6 y 10 años, dado que en esa edad se observa un riesgo elevado.`,'D':`A los 12 años, aprovechando la visita de vacunación para evaluar el IMC y orientar medidas preventivas frente al aumento ponderal puberal.`}},
{n:265,texto:`Según el Programa de Salud Infantil de Osakidetza 2021, respecto a la salud bucodental en menores de 2 años, ¿cuál de las siguientes afirmaciones es correcta?`,opts:{'A':`Se considerará anormal la falta de erupción de la primera pieza a los 11 meses y la erupción de dientes malformados.`,'B':`Solamente si se pertenece a un grupo de riesgo de caries dental se darán suplementos de flúor por vía oral a partir de los 6 meses.`,'C':`En niños menores de 2 años el cepillado deben realizarlo los padres, con una pasta de dientes con 1200 ppm de flúor.`,'D':`No se considera necesario el cepillado dental hasta la erupción de todas las piezas dentarias temporales.`}},
{n:266,texto:`¿Cuál de las siguientes opciones incluye factores de riesgo de maltrato infantil relacionados con el menor de edad?`,opts:{'A':`Separación o divorcio gravemente conflictivo.`,'B':`Inteligencia del menor superior a la media.`,'C':`Alta conflictividad parental y violencia doméstica.`,'D':`Nacimiento prematuro, anomalías al nacimiento o bajo peso al nacer.`}},
{n:267,texto:`Dentro de la promoción de estilos de vida saludables en la infancia, ¿cuál de las siguientes recomendaciones se ajusta mejor al concepto de alimentación equilibrada?`,opts:{'A':`Priorizar un patrón dietético basado en el incremento de proteínas y la reducción marcada de hidratos de carbono, como estrategia principal para prevenir el exceso ponderal en la infancia.`,'B':`Promover una dieta variada y equilibrada, ajustada a la edad.`,'C':`Recomendar la incorporación sistemática de tentempiés entre comidas para evitar la sensación de hambre, aunque ello suponga aumentar el aporte calórico diario.`,'D':`Se deberá dar consejo alimentario únicamente cuando el IMC se encuentre fuera del rango normal.`}},
{n:268,texto:`Dentro de la visita “hasta el mes de vida” del Programa de Salud Infantil de Osakidetza 2021, ¿cuál de las siguientes NO es una actividad realizada por enfermería?`,opts:{'A':`Maniobras de Ortolani y Barlow.`,'B':`Promoción de la lactancia materna.`,'C':`Valoración del cordón umbilical.`,'D':`Comprobar la realización de cribado de metabolopatías.`}},
{n:269,texto:`En Osakidetza, la historia clínica utilizada para la valoración, seguimiento y registro del Progama de Salud Infantil se estructura por etapas que corresponden a 5 guías tipo faro. ¿Cuál de las siguientes opciones recoge correctamente dichas etapas?`,opts:{'A':`Neonatal (hasta el mes de vida), 2–12 meses, 1–3 años, 3–8 años y 9–14 años.`,'B':`Neonatal (0–28 días), 2–9 meses, 12–36 meses, 4–7 años y 8–15 años.`,'C':`Neonatal (hasta el mes de vida), 2–6 meses, 11–24 meses, 3–6 años y 8–13 años.`,'D':`Neonatal (0–28 días), 2–5 meses, 6–24 meses, 2–6 años y 7–13 años.`}},
{n:270,texto:`En el ámbito de la Atención Primaria, el personal de enfermería debe tener en cuenta los factores de riesgo relacionados con el desarrollo de obesidad en la infancia. Señale la opción correcta:`,opts:{'A':`La obesidad en los progenitores no influye en el riesgo de obesidad infantil.`,'B':`La duración del sueño inferior a 7 horas se asocia a mayor riesgo de obesidad.`,'C':`El nivel socioeconómico no guarda relación con la obesidad infantil.`,'D':`La maduración puberal tardía se relaciona con un mayor riesgo de obesidad infantil.`}},
{n:271,texto:`En el ámbito de la Atención Primaria, el personal de enfermería debe promover hábitos adecuados de higiene bucodental en niños de entre 3 y 6 años, con el fin de prevenir la caries y otras patologías orales. En relación con estas recomendaciones, señale la afirmación INCORRECTA:`,opts:{'A':`Se recomienda el cepillado dental al menos dos veces al día con pasta fluorada que contenga más de 1000 ppm de flúor.`,'B':`Uno de los cepillados debe realizarse siempre antes de dormir, utilizando una cantidad de dentífrico similar al tamaño de un guisante.`,'C':`El cepillado debe ser supervisado por los cuidadores y se debe reducir el consumo de alimentos y bebidas azucaradas.`,'D':`Tras el cepillado, se debe escupir el dentífrico y enjuagar con abundante agua para eliminar los restos.`}},
{n:272,texto:`En el ámbito del Programa de Salud Infantil de Osakidetza 2021, la prevención del maltrato infantil constituye una línea prioritaria de actuación desde Atención Primaria. En relación con las recomendaciones para la prevención del maltrato infantil, señale la afirmación INCORRECTA:`,opts:{'A':`La detección sistemática de factores de riesgo en todas las edades permite identificar a familias vulnerables.`,'B':`La promoción de la lactancia materna forma parte de las estrategias preventivas.`,'C':`Ante la sospecha de riesgo psicosocial leve, se debe adoptar una actitud de observación sin intervención hasta confirmar el diagnóstico.`,'D':`La realización de actuaciones preventivas frente a la mutilación genital femenina forma parte de las estrategias del PSI.`}},
{n:273,texto:`En relación con las etapas del proceso de inicio, consumo y adicción a las drogas en adolescentes, señale la afirmación correcta:`,opts:{'A':`En la etapa 1 (aprendizaje) el adolescente adquiere sus propios suministros y consume de forma ocasional a diario.`,'B':`En la etapa 0 (curiosidad) el adolescente consume drogas únicamente en reuniones del grupo durante los fines de semana.`,'C':`En la etapa 3 (preocupación) el adolescente se siente dependiente y necesita las drogas para mantener su bienestar, pudiendo robar, mentir o faltar a clase para conseguirlas.`,'D':`En la etapa 4 (destrucción) las drogas producen máxima euforia y se mantiene un consumo elevado.`}},
{n:274,texto:`En el cribado universal de dislipemia en población adolescente, ¿qué parámetro se recomienda calcular a partir del perfil lipídico sin ayunas?`,opts:{'A':`Colesterol no-HDL.`,'B':`Colesterol LDL.`,'C':`Triglicéridos.`,'D':`Colesterol VLDL.`}},
{n:275,texto:`En relación con el cribado del consumo de tabaco (CT) en adolescentes, señale la afirmación correcta:`,opts:{'A':`Existe evidencia sólida de que el cribado del CT reduce el hábito y su intensidad.`,'B':`El cribado del CT ha demostrado producir cambios consistentes en la actitud del adolescente hacia el consumo.`,'C':`Aunque no hay evidencia de reducción del hábito, el beneficio potencial del consejo/intervención individual puede superar el riesgo.`,'D':`Las intervenciones breves de consejo individual se han demostrado moderadamente eficaces.`}},
{n:276,texto:`En el abordaje del consumo de tabaco en adolescentes desde Atención Primaria, el modelo de intervención recomendado es el de las “5 Aes”. ¿Cuál de las siguientes opciones recoge correctamente sus componentes?`,opts:{'A':`(Assess) Evaluar actitud – Analizar – Actuar – Acompañar – Ajustar.`,'B':`(Ask) Interrogar – Aconsejar – (Assess) Evaluar actitud – Ayudar – Acordar seguimiento.`,'C':`(Ask) Interrogar – Alertar – Aplicar tratamiento – Aconsejar – Auditar.`,'D':`Aceptar – Animar – Aumentar motivación – (Assess) Evaluar actitud – Aplicar control.`}},
{n:277,texto:`Respecto a las definiciones relacionadas con el consumo de alcohol en adolescentes, señale la opción INCORRECTA:`,opts:{'A':`Consumo de alcohol de riesgo: 20–40 g/día en mujeres y 40–60 g/día en hombres.`,'B':`Consumo excesivo episódico: implica un consumo ≥40 g de alcohol en una sola ocasión.`,'C':`Consumo perjudicial: >40 g/día en mujeres y >60 g/día en hombres, con consecuencias para la salud física y mental.`,'D':`Binge drinking: ≥4 bebidas en mujeres y ≥5 en hombres en un corto periodo (≈2 horas).`}},
{n:278,texto:`En relación con el consumo de cannabis durante la adolescencia, señale la afirmación correcta:`,opts:{'A':`Solo se asocia a cambios afectivos transitorios.`,'B':`No se han descrito cambios estructurales a nivel cerebral.`,'C':`Se relaciona principalmente con alteraciones del sueño.`,'D':`Se asocia a deterioro cognitivo y cambios cerebrales.`}},
{n:279,texto:`En relación con las infecciones de transmisión sexual (ITS), señale la opción que incluye únicamente microorganismos causantes de ITS:`,opts:{'A':`VPH – Chlamydia – Neisseria gonorrhoeae.`,'B':`VHB – Escherichia coli – tricomona vaginal.`,'C':`VIH – Candida albicans – Gardnerella vaginalis.`,'D':`VHS – Mycoplasma hominis – Enterococcus faecalis.`}},
{n:280,texto:`Según las recomendaciones del Programa de Salud Infantil de Osakidetza 2021 sobre sexualidad en la adolescencia, señale la afirmación correcta:`,opts:{'A':`A los 10 años se indica consejo directo al adolescente sobre ITS y métodos anticonceptivos.`,'B':`A los 13 años, en adolescentes sexualmente activos/as, se recomienda consejo moderado y valorar riesgo de ITS para posible cribado.`,'C':`La educación para la salud grupal se recomienda únicamente a partir de los 14 años.`,'D':`A los 13 años se recomienda consejo de alta intensidad al adolescente y consejo breve a padres y madres.`}},
{n:281,texto:`Según las recomendaciones de Osakidetza para el cribado de hipercolesterolemia en infancia y adolescencia, ¿cuál es la conducta correcta en niños/as con antecedentes familiares de hipercolesterolemia genética?`,opts:{'A':`Perfil lipídico universal a los 7 años.`,'B':`Perfil lipídico selectivo a los 9–11 años.`,'C':`Perfil lipídico selectivo entre los 12–16 años por mayor sensibilidad.`,'D':`Perfil lipídico solo si existe obesidad.`}},
{n:282,texto:`En la mayoría de los países europeos, incluida España, una Unidad de Bebida Estándar (UBE) equivale aproximadamente a:`,opts:{'A':`8 g de alcohol puro.`,'B':`5 g de alcohol puro.`,'C':`12 g de alcohol puro.`,'D':`10 g de alcohol puro.`}},
{n:283,texto:`¿Cuál NO es una de las características de los Anticonceptivos Hormonales Gestágenos?`,opts:{'A':`Pueden usarse durante la lactancia a partir de las 4 semanas desde el parto.`,'B':`No interfieren en las relaciones coitales.`,'C':`Son compatibles con el uso de preservativos.`,'D':`Pueden usarlos mujeres que no deben usar estrógenos.`}},
{n:284,texto:`En relación con el uso seguro de las Tecnologías de la Información y la Comunicación en adolescentes, señale la definición ERRÓNEA:`,opts:{'A':`Sharenting: práctica de padres y madres de publicar contenido sobre sus hijos/as en plataformas de internet.`,'B':`Ciberacoso/ciberbullying: daño intencional y repetido infligido por un/a menor o grupo de menores hacia otro/a menor mediante medios digitales.`,'C':`Grooming: situación en la que un/a menor difunde deliberadamente imágenes íntimas de otro/a menor a través de redes sociales para dañarle.`,'D':`Sexting: envío de fotografías o vídeos con contenido sexual realizados por la propia persona y enviados a través de medios digitales, pudiendo derivar en difusión no consentida y acoso.`}},
{n:285,texto:`¿Cuál de los siguientes corresponde a un síntoma negativo característico de la esquizofrenia?`,opts:{'A':`Ideas delirantes de persecución`,'B':`Alucinaciones auditivas con contenido amenazante`,'C':`Aplanamiento afectivo`,'D':`Pensamiento tangencial`}},
{n:286,texto:`¿Cuál de las siguientes definiciones es CORRECTA?`,opts:{'A':`Trastorno esquizoafectivo: trastorno psicótico caracterizado por la presencia continua de síntomas negativos durante al menos seis meses, sin alteraciones del estado de ánimo asociadas.`,'B':`Trastorno esquizofreniforme: cuadro clínico con síntomas psicóticos similares a la esquizofrenia, cuya duración total es inferior a seis meses y que no requiere necesariamente deterioro social o laboral para su diagnóstico.`,'C':`Síndrome de Capgras: trastorno delirante en el que el paciente identifica a personas desconocidas como familiares cercanos que han cambiado de identidad.`,'D':`Síndrome de Fregoli: alteración psicótica en la que el sujeto cree que ha sido sustituido por un doble idéntico que ocupa su lugar.`}},
{n:287,texto:`Durante el seguimiento de un paciente en tratamiento con antipsicóticos, la enfermera debe identificar correctamente las posibles complicaciones y sus manifestaciones clínicas. ¿Cuál de las siguientes afirmaciones es CORRECTA?`,opts:{'A':`La acatisia se caracteriza por somnolencia, apatía y síntomas antimuscarínicos.`,'B':`La discinesia tardía se manifiesta por una inquietud motora intensa con necesidad imperiosa de moverse, especialmente en reposo.`,'C':`El síndrome neuroléptico maligno cursa con rigidez muscular, hipertermia, disfunción autonómica y alteración del nivel de conciencia.`,'D':`La distonía aguda consiste en movimientos involuntarios orofaciales de aparición tardía tras años de tratamiento antipsicótico.`}},
{n:288,texto:`Durante la valoración inicial de un paciente con esquizofrenia ingresado en la unidad, la enfermera observa que el paciente presenta risas inmotivadas, frases incomprensibles, fuga de ideas y tendencia al soliloquio. Según los patrones funcionales, ¿en cuál de los siguientes patrones se encuadran principalmente estos hallazgos?`,opts:{'A':`Patrón roles y relaciones.`,'B':`Patrón autopercepción y autoconcepto.`,'C':`Patrón cognición y percepción.`,'D':`Patrón afrontamiento y tolerancia al estrés.`}},
{n:289,texto:`Desde la perspectiva psicológica, ¿qué teoría explica la etiología de los trastornos depresivos como el resultado de un estilo cognitivo alterado que surge a partir de hipótesis aprendidas en la infancia, relacionadas con experiencias de decepción, pérdida o rechazo, y que conduce a expectativas negativas persistentes sobre uno mismo, el mundo y el futuro?`,opts:{'A':`Teoría psicodinámica`,'B':`Teoría cognitiva`,'C':`Teoría conductista`,'D':`Teoría del déficit motivacional adquirido`}},
{n:290,texto:`Durante la valoración de un paciente con sospecha de trastorno bipolar, la enfermera identifica un período de estado de ánimo anormal y persistentemente elevado. ¿Cuál de los siguientes conjuntos de manifestaciones clínicas es más característico de un episodio maníaco?`,opts:{'A':`Ánimo deprimido, anhedonia, hipersomnia y sentimientos de inutilidad.`,'B':`Estado de ánimo elevado, disminución de la necesidad de dormir, verborrea y aumento de la actividad dirigida a objetivos.`,'C':`Irritabilidad leve, fatiga, enlentecimiento psicomotor y dificultad de concentración.`,'D':`Ansiedad persistente, insomnio inicial, preocupación excesiva y síntomas somáticos.`}},
{n:291,texto:`Durante la valoración de un paciente con trastorno bipolar, la enfermera debe diferenciar un episodio hipomaníaco de un episodio maníaco. ¿Cuál de las siguientes afirmaciones es CORRECTA?`,opts:{'A':`La hipomanía cursa con síntomas psicóticos, mientras que la manía no los presenta.`,'B':`En la hipomanía existe un deterioro social y laboral grave que suele requerir hospitalización.`,'C':`La manía implica un estado de ánimo elevado o irritable de mayor duración y gravedad, con deterioro funcional significativo o necesidad de hospitalización.`,'D':`La diferencia principal entre hipomanía y manía es exclusivamente la edad de inicio del episodio.`}},
{n:292,texto:`En relación a los criterios diagnósticos de los subtipos del trastorno bipolar, ¿cuál de las siguientes afirmaciones es CORRECTA?`,opts:{'A':`Trastorno bipolar I: se caracteriza por la presencia de, al menos, un episodio maníaco, independientemente de que existan o no episodios depresivos mayores.`,'B':`Trastorno bipolar II: se define por la alternancia de episodios maníacos y episodios hipomaníacos sin depresión mayor.`,'C':`Trastorno bipolar III: incluye episodios depresivos recurrentes con activación maniforme inducida exclusivamente por antidepresivos.`,'D':`Trastorno bipolar IV: se diagnostica cuando existen síntomas subclínicos de manía asociados a trastornos de ansiedad crónico.`}},
{n:293,texto:`Durante la valoración enfermera, un paciente refiere pensamientos constantes de catástrofe, anticipa resultados negativos ante situaciones cotidianas y expresa dificultad para concentrarse. Además, durante la entrevista se observa inquietud motora, tensión muscular y conductas de evitación ante determinadas situaciones. ¿Cuál de las siguientes opciones identifica de forma más adecuada los sistemas de respuesta predominantes en este caso?`,opts:{'A':`Componente emocional y componente interpersonal.`,'B':`Componente fisiológico y componente afectivo.`,'C':`Componente cognitivo y componente conductual.`,'D':`Componente neurovegetativo y componente perceptivo.`}},
{n:294,texto:`¿Cuál de las siguientes NO es un principio de manejo general en la atención enfermera a pacientes con trastornos de ansiedad?`,opts:{'A':`Minimizar la ansiedad del paciente cuando no exista un motivo clínico objetivable que la justifique.`,'B':`Aceptar inicialmente las estrategias de afrontamiento del paciente, aunque no sean las más adaptativas.`,'C':`Proporcionar feedback al paciente sobre su conducta, las estrategias que utiliza y los factores de estrés identificados.`,'D':`Evitar que el paciente se aísle completamente durante el proceso asistencial.`}},
{n:295,texto:`Durante la valoración de una paciente con sospecha de anorexia nerviosa, la enfermera identifica varias manifestaciones clínicas compatibles con este trastorno. ¿Cuál de las siguientes manifestaciones es MÁS característica de la anorexia nerviosa, según la clínica descrita?`,opts:{'A':`Episodios recurrentes de atracones seguidos de conductas purgativas repetidas.`,'B':`Restricción alimentaria mantenida con preocupación intensa por el peso corporal y necesidad de control.`,'C':`Sensación persistente de saciedad precoz acompañada de evitación progresiva de la ingesta.`,'D':`Conductas alimentarias impulsivas asociadas a estados emocionales fluctuantes.`}},
{n:296,texto:`En relación con el pronóstico de la anorexia nerviosa, señale cuál de los siguientes factores se asocia a una evolución MÁS DESFAVORABLE:`,opts:{'A':`Detección temprana del trastorno.`,'B':`Índice de masa corporal superior a 17 en el momento del seguimiento.`,'C':`Adecuada motivación para el cambio.`,'D':`Persistencia prolongada de la enfermedad con recaídas repetidas.`}},
{n:297,texto:`En relación con la evolución reciente del consumo y la demanda de sustancias adictivas en Euskadi, según el VIII Plan de Adicciones, ¿cuál de las siguientes afirmaciones es CORRECTA?`,opts:{'A':`En la población adolescente se observa un descenso generalizado del consumo de todas las sustancias, incluido el alcohol y el cannabis, acompañado de una menor aceptación social.`,'B':`El consumo de tabaco muestra una tendencia descendente en todos los grupos de edad, siendo el nivel educativo un factor poco relevante en su prevalencia.`,'C':`El consumo de alcohol se mantiene en niveles muy elevados y socialmente normalizados, con mayor consumo en hombres adultos, aunque sin un patrón claro de desigualdad social en el consumo actual.`,'D':`La pandemia de la COVID-19 no tuvo un impacto significativo en los consumos, pero sí redujo de forma notable el uso de videojuegos, internet y redes sociales.`}},
{n:298,texto:`Según los datos recogidos en el VIII Plan de Adicciones de Euskadi, en relación con la venta de alcohol por habitante, ¿cuál fue el consumo aproximado en litros por persona en el año 2020?`,opts:{'A':`18,6 litros por habitante y año.`,'B':`28,4 litros por habitante y año.`,'C':`48,2 litros por habitante y año.`,'D':`62,8 litros por habitante y año.`}},
{n:299,texto:`En el marco conceptual del VIII Plan de Adicciones de Euskadi, ¿cuál de los siguientes elementos se considera un determinante estructural del desarrollo de las adicciones?`,opts:{'A':`Estrategias individuales de afrontamiento del estrés.`,'B':`Entorno familiar.`,'C':`Políticas fiscales y de regulación de la oferta de sustancias.`,'D':`Habilidades personales para la toma de decisiones.`}},
{n:300,texto:`En relación con los agentes implicados en el desarrollo del VIII Plan sobre Adicciones de Euskadi, señale cuál de las siguientes entidades NO forma parte de la estructura institucional del plan.`,opts:{'A':`Comisión Europea.`,'B':`Osakidetza.`,'C':`Diputaciones forales.`,'D':`Entidades del tercer sector y agentes sociales.`}}];
let estado={},orden=PREGUNTAS.map(p=>p.n),modoFallos=false;
function cargarEstado(){try{const r=localStorage.getItem(STORAGE_KEY);if(r)estado=JSON.parse(r);}catch(e){estado={};}}
function guardarEstado(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(estado));}catch(e){}}
function calcularStats(){let ok=0,fail=0;PREGUNTAS.forEach(p=>{if(estado[p.n]){if(estado[p.n].correcto)ok++;else fail++;}});return{ok,fail,total:PREGUNTAS.length};}
function actualizarHeader(){const s=calcularStats();const r=s.ok+s.fail;document.getElementById('barraFill').style.width=(r/s.total*100)+'%';document.getElementById('progresoTexto').textContent=r+' / '+s.total;document.getElementById('statOk').textContent=s.ok+' correctas';document.getElementById('statFail').textContent=s.fail+' incorrectas';}
function renderizar(){
  const c=document.getElementById('contenedor');c.innerHTML='';
  const s=calcularStats();
  if(s.ok+s.fail===s.total&&!modoFallos){const pct=Math.round(s.ok/s.total*100);const b=document.createElement('div');b.className='banner-completado';b.innerHTML=`<h2>🎉 ¡Lote completado!</h2><div class="puntuacion">${s.ok}/${s.total}</div><p>${pct}% de acierto · Preguntas 251–300 · Enfermería</p>`;c.appendChild(b);}
  const pm=modoFallos?PREGUNTAS.filter(p=>estado[p.n]&&!estado[p.n].correcto):orden.map(n=>PREGUNTAS.find(p=>p.n===n));
  if(modoFallos&&pm.length===0){c.innerHTML+='<div style="text-align:center;padding:40px;color:var(--gris);font-family:Syne,sans-serif;">¡No hay preguntas falladas! 🎯</div>';return;}
  pm.forEach(pregunta=>{
    if(!pregunta)return;
    const resp=RESPUESTAS[pregunta.n];const est=estado[pregunta.n];const resuelta=!!est;
    const card=document.createElement('div');card.className='pregunta-card'+(resuelta?(' resuelta'+(est.correcto?'':' fallo')):'');card.id='p'+pregunta.n;
    let html=`<div class="pregunta-num">Pregunta ${pregunta.n}</div><div class="pregunta-texto">${pregunta.n}.- ${pregunta.texto}</div><div class="opciones">`;
    Object.entries(pregunta.opts).forEach(([letra,texto])=>{
      let cls='opcion-btn';let disabled=resuelta?'disabled':'';
      if(resuelta){if(letra===resp){cls+=est.elegida===letra?' correcta':' correcta-marcada';}else if(letra===est.elegida&&!est.correcto){cls+=' incorrecta';}}
      html+=`<button class="${cls}" ${disabled} onclick="responder(${pregunta.n},'${letra}')"><span class="letra">${letra})</span>${texto}</button>`;
    });
    html+=`</div>`;
    if(resuelta){html+=est.correcto?`<div class="resultado-badge badge-ok">✓ Correcto</div>`:`<div class="resultado-badge badge-error">✗ Incorrecto — Respuesta: ${resp}</div>`;}
    card.innerHTML=html;c.appendChild(card);
  });
}
function responder(num,letra){if(estado[num])return;const resp=RESPUESTAS[num];estado[num]={elegida:letra,correcto:letra===resp};guardarEstado();actualizarHeader();renderizar();setTimeout(()=>{const el=document.getElementById('p'+num);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});},100);}
function resetearTodo(){if(!confirm('¿Seguro que quieres reiniciar todo el progreso de este lote?'))return;estado={};guardarEstado();modoFallos=false;orden=PREGUNTAS.map(p=>p.n);actualizarHeader();renderizar();}
function mostrarSoloFallos(){modoFallos=!modoFallos;renderizar();}
function ordenAleatorio(){modoFallos=false;orden=[...PREGUNTAS.map(p=>p.n)].sort(()=>Math.random()-0.5);renderizar();window.scrollTo({top:0,behavior:'smooth'});}
cargarEstado();actualizarHeader();renderizar();
</script>
