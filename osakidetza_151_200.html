  {n:151,texto:"¿Cuál es el Objetivo General establecido para la 'Estrategia de Seguridad del Paciente 20-30'?",opts:{A:"Reducir a cero los eventos adversos mediante la incorporación de tecnología robótica.",B:"Mejorar la calidad asistencial del sistema sanitario vasco.",C:"Promover el máximo nivel de seguridad posible, minimizando la probabilidad de ocurrencia de incidentes de seguridad en el transcurso de la asistencia sanitaria.",D:"Centralizar la gestión de riesgos en un único organismo fuera de Osakidetza."}},
  {n:152,texto:"El principio hipocrático al que se hace referencia en la 'Estrategia de Seguridad del Paciente 20-30', y que la ciudadanía asume que se verifica en el transcurso de la actividad asistencial, es:",opts:{A:"Salus populi suprema lex esto (la salud del pueblo es la ley suprema).",B:"Corpus sanum in mente sana (mente sana en cuerpo sano).",C:"Lex artis ad hoc (ley del arte para el caso).",D:"Primum non nocere (primero no hacer daño)."}},
  {n:153,texto:"¿Cuáles son las dos nuevas Líneas de Acción incorporadas en la 'Estrategia de Seguridad del Paciente 20-30' que responden a una necesidad percibida por las personas expertas?",opts:{A:"Seguridad en Pediatría y Buenas Prácticas en el Uso de Biológicos.",B:"Atención en Cuidados Paliativos y Seguridad Domiciliaria.",C:"La Seguridad de Paciente en Emergencias y la Prevención del Suicidio.",D:"Seguridad en Salud Mental y Prevención de las Úlceras por Presión."}},
  {n:154,texto:"De acuerdo con la 'Estrategia de Seguridad del Paciente 20-30', ¿cómo se denomina al incidente de seguridad que, a diferencia del incidente sin daño, sí ocasiona algún tipo de daño a las personas atendidas?",opts:{A:"Error no evitable.",B:"Circunstancia notificable.",C:"Fallo latente.",D:"Evento Adverso."}},
  {n:155,texto:"¿Cuál es el enfoque principal de la Línea de Acción Corporativa L2 de la 'Estrategia de Seguridad del Paciente 20-30'?",opts:{A:"Implicación de pacientes en su seguridad.",B:"Conciliación de la medicación.",C:"Atención a las segundas y terceras víctimas.",D:"Gestión de los incidentes de seguridad."}},
  {n:156,texto:"¿Cuál de los siguientes es el Objetivo Específico número 1 de la 'Estrategia de Seguridad del Paciente 20-30', enfocado en el cambio interno?",opts:{A:"Garantizar la continuidad de las líneas de acción y proyectos previamente implantados.",B:"Impulsar la cultura de seguridad de paciente en las organizaciones de servicios de Osakidetza, promoviendo la formación y sensibilización como aspectos clave.",C:"Optimizar la prescripción de pruebas diagnósticas que utilizan radiación ionizante.",D:"Implantar un sistema de identificación inequívoca de pacientes en todas las fases del proceso asistencial."}},
  {n:157,texto:"La Línea de Acción Corporativa L8 de la 'Estrategia de Seguridad del Paciente 20-30' está dedicada a:",opts:{A:"Conciliación de la medicación.",B:"Prevención y control de las infecciones relacionadas con la asistencia sanitaria.",C:"Seguridad en el proceso asistencial gestación-parto-puerperio.",D:"Seguridad transfusional."}},
  {n:158,texto:"¿Qué documento se menciona en la 'Estrategia de Seguridad del Paciente 20-30' como el que determinó que las personas atendidas por un sistema medicalizado (tipo 061/112) presentan un mayor porcentaje de incidentes de seguridad en el entorno de Emergencias?",opts:{A:"Estudio Nacional de Efectos Adversos en centros hospitalarios (ENEAS).",B:"Estudio APEAS.",C:"Estudio EVADUR.",D:"Informe del Instituto de Medicina de los Estados Unidos (IOM)."}},
  {n:159,texto:"El capítulo de Formación de la 'Estrategia de Seguridad del Paciente 20-30' señala que, además de impulsar el desarrollo de prácticas seguras, las organizaciones comprometidas orientan sus esfuerzos a aumentar la formación en los llamados:",opts:{A:"Factores humanos o factores no técnicos.",B:"Factores biomédicos y patofisiológicos.",C:"Factores económicos y de sostenibilidad.",D:"Factores organizativos de Osakidetza."}},
  {n:160,texto:"¿Cuál de las siguientes Líneas de Acción de la 'Estrategia de Seguridad del Paciente 20-30' NO está relacionada con el sistema de utilización del medicamento?",opts:{A:"L5. Conciliación de la medicación.",B:"L14. Buenas prácticas asociadas a la utilización de medicación.",C:"L6. Optimización en la prescripción de pruebas diagnósticas que utilizan radiación ionizante.",D:"L7. Seguridad transfusional."}},
  {n:161,texto:"Según el diagnóstico del II Plan para la Igualdad de Mujeres y Hombres en Osakidetza, ¿qué porcentaje de mujeres y hombres, respectivamente, componía la plantilla total de Osakidetza en enero de 2025?",opts:{A:"60% mujeres y 40% hombres.",B:"75% mujeres y 25% hombres.",C:"80% mujeres y 20% hombres.",D:"90% mujeres y 10% hombres."}},
  {n:162,texto:"Una de las metas del II Plan para la Igualdad de Mujeres y Hombres en Osakidetza es la 'CAPACITACIÓN EN IGUALDAD'. ¿Cuál es su objetivo principal?",opts:{A:"Reducir la brecha de género en investigación en un 4%.",B:"Conseguir que todas las personas trabajadoras de Osakidetza conozcan el Plan y el Protocolo de Acoso.",C:"Reducir a la mitad las categorías con brecha retributiva superior al 5%.",D:"Garantizar la formación básica, progresiva, permanente y obligatoria de todo el personal de Osakidetza."}},
  {n:163,texto:"¿Qué institución aprueba el II Plan para la Igualdad de Mujeres y Hombres en Osakidetza (2025-2028)?",opts:{A:"Mesa Sectorial de Sanidad.",B:"Emakunde.",C:"Consejo de Administración de Osakidetza.",D:"Dirección General de Osakidetza."}},
  {n:164,texto:"De acuerdo con el II Plan para la Igualdad de Mujeres y Hombres en Osakidetza (2025-2028), ¿qué concepto define, dentro del diagnóstico de la organización, la dificultad invisible que encuentran las mujeres para acceder a puestos de mayor responsabilidad y toma de decisiones?",opts:{A:"Segregación horizontal.",B:"Suelo pegajoso.",C:"Brecha salarial técnica.",D:"Techo de cristal."}},
  {n:165,texto:"Una de las Metas del II Plan para la Igualdad de Mujeres y Hombres en Osakidetza (2025-2028) es 'CORRESPONSABILIDAD'. ¿Cuál es el objetivo específico asociado a esta meta?",opts:{A:"Reducir el porcentaje de hombres en puestos de dirección.",B:"Reducir a la mitad la brecha de género en investigación.",C:"Reducir, al menos, en un 2% la brecha de género existente en las medidas de conciliación para cuidados.",D:"Aumentar el número de investigaciones con perspectiva de género interseccional en un 4%."}},
  {n:166,texto:"¿Cuál fue el objetivo del I Plan de Igualdad, teniendo en cuenta su condición de primer plan estratégico de Osakidetza en esta materia?",opts:{A:"Consolidar los avances logrados y profundizar el proceso transformador.",B:"Establecer unos cimientos sólidos para garantizar el cumplimiento de la legislación y la alineación a los marcos estratégicos.",C:"Reducir la brecha salarial a la mitad en todas las categorías profesionales.",D:"Lograr la aprobación por parte del Consejo de Dirección de Osakidetza en julio de 2025."}},
  {n:167,texto:"¿Cuál es la Meta 5 establecida en el II Plan para la Igualdad de Mujeres y Hombres en Osakidetza (2025-2028)?",opts:{A:"Reducir la brecha de género existente en las medidas de conciliación para cuidados.",B:"Capacitación en Igualdad, garantizando la formación progresiva del personal.",C:"Igualdad Salarial, con el objetivo de reducir a la mitad las categorías que tienen una brecha retributiva > 5%.",D:"Investigación, aumentando el número de investigaciones con perspectiva de género."}},
  {n:168,texto:"En relación con la violencia machista contra las mujeres, el Plan II Plan para la Igualdad de Mujeres y Hombres en Osakidetza (2025-2028) establece como línea de actuación prioritaria:",opts:{A:"El refuerzo de la prevención, la detección precoz y la mejora de la respuesta asistencial integrada desde el sistema de salud.",B:"La derivación inmediata de cualquier caso detectado a servicios jurídicos externos, sin intervención del personal sanitario.",C:"La creación de un registro anónimo donde las personas profesionales puedan denunciar conductas sin seguimiento posterior.",D:"La limitación de la atención asistencial únicamente a las consecuencias físicas derivadas de la violencia."}},
  {n:169,texto:"El III Plan de Normalización del Uso del Euskera en Osakidetza 2022-2028 establece respecto a los mensajes audiovisuales que:",opts:{A:"Deben emitirse en la lengua que decidan las personas responsable de las unidades que utilizan estos sistemas audiovisuales.",B:"Deben emitirse en las dos lenguas oficiales, primero en castellano y luego en euskera.",C:"Deben emitirse en las dos lenguas oficiales, primero en euskera y luego en castellano.",D:"Deben emitirse en una de las dos lenguas oficiales."}},
  {n:170,texto:"De acuerdo con el III Plan de Normalización del Uso del Euskera en Osakidetza 2022-2028, señale la respuesta correcta:",opts:{A:"Por aplicación de la Ley Orgánica de Protección de Datos Personales y garantía de los derechos digitales no puede constar en los datos personales de cada paciente de Osakidetza su idioma de preferencia para las comunicaciones con Osakidetza.",B:"El signo azul con la letra e indica que la persona paciente no tiene competencia para comunicarse en un idioma que no sea el euskera para las comunicaciones orales con Osakidetza.",C:"En los datos personales de cada paciente, se registrará su idioma de preferencia para las comunicaciones orales con Osakidetza.",D:"A las personas que elijan el euskera como lengua prioritaria en sus comunicaciones con Osakidetza solo se les deberá ofrecer servicios en euskera."}},
  {n:171,texto:"En atención al III Plan de Normalización del Uso del Euskera en Osakidetza 2022-2028, señale la respuesta correcta:",opts:{A:"'Aukeratu zeure hizkuntza/Elige tu lengua' es el lema de la campaña de activación del registro de la lengua preferente de cada paciente llevada a cabo en 2017.",B:"Se atribuye a todas las direcciones y gerencias de Osakidetza la responsabilidad de realizar la campaña con el lema 'Aukeratu zeure hizkuntza/Elige tu lengua'.",C:"'Aukeratu zeure hizkuntza/Elige tu lengua' es el lema de la campaña de activación del registro de la lengua preferente de cada paciente que realizará Osakidetza durante el primer año de planificación.",D:"'Aukeratu zeure hizkuntza/Elige tu lengua' es el lema de la campaña de activación del registro de la lengua preferente de cada paciente que realizará Osakidetza durante el tercer año de planificación."}},
  {n:172,texto:"El III Plan de Normalización del Uso del Euskera en Osakidetza 2022-2028 contempla que tanto en los servicios de recepción y admisión, como en las unidades asistenciales y administrativas a toda la ciudadanía vascohablante debe garantizarse:",opts:{A:"La recepción en euskera.",B:"La recepción en euskera solo cuando la comunicación oral con pacientes y personas usuarias sea de modo presencial.",C:"La recepción en euskera solo cuando la comunicación con pacientes y personas usuarias sea telefónicamente.",D:"La recepción en euskera solo por las y los empleados que sepan en euskera."}},
  {n:173,texto:"El III Plan de Normalización del Uso del Euskera en Osakidetza 2022-2028 establece que, en los escritos individualizados de respuesta a solicitudes y reclamaciones de pacientes o personas usuarias de Osakidetza se utilizará:",opts:{A:"La lengua utilizada por cada ciudadano o ciudadana.",B:"Siempre el euskera como lengua preferente.",C:"Siempre las dos lenguas oficiales independientemente de la lengua utilizada por cada ciudadano o ciudadana.",D:"Ambas lenguas oficiales, siendo los escritos contestados primero en euskera y luego en castellano."}},
  {n:174,texto:"Siguiendo lo previsto en el III Plan de Normalización del Uso del Euskera en Osakidetza 2022-2028, señale la respuesta que no es correcta:",opts:{A:"Se pondrá a disposición del personal bilingüe que lo desee diferentes elementos identificativos portadores del circulo azul con la letra e, signo que invita a relacionarse en euskera.",B:"El signo azul y la letra e solo se utilizará para la identificación individual del personal bilingüe.",C:"En los centros de salud, consultorios y unidades hospitalarias, deberá estar colocado, de modo visible, el cartel que explica a las personas usuarias el significado del signo identificativo con la letra e.",D:"Se estudiará introducir una variante del círculo azul con la letra e para el personal dispuesto a que le hablen en euskera pero que muestra dificultades para expresarse en ciertas situaciones."}},
  {n:175,texto:"En atención a lo previsto en el III Plan de Normalización del Uso del Euskera en Osakidetza 2022-2028, en todos los centros de atención primaria ha de ponerse en marcha un procedimiento para que, en la medida de las posibilidades, se propongan servicios en euskera a las personas pacientes que hayan registrado esta lengua como preferente y que aún reciban los citados servicios en castellano. Señale a qué servicios se refiere el citado Plan:",opts:{A:"Medicina familiar, pediatría, enfermería y salud mental.",B:"Pediatría, medicina familiar y salud mental.",C:"Medicina familiar, pediatría, enfermería y matrona.",D:"Todas las anteriores respuestas son correctas."}},
  {n:176,texto:"Conforme al III Plan de Normalización del Uso del Euskera en Osakidetza 2022-2028:",opts:{A:"En los casos de los mensajes SMS que se envían a los teléfonos móviles de personas trabajadoras o candidatas, estarán escritos en las dos lenguas oficiales, primero en castellano y luego en euskera.",B:"Los escritos individualizados de respuesta a solicitudes y reclamaciones de las personas trabajadoras deberán redactarse en las dos lenguas oficiales.",C:"Osakidetza ha de garantizar que la información y los servicios ofrecidos tanto al personal empleado como a personas candidatas a través de las tecnologías de la comunicación estén en las dos lenguas oficiales, con el fin de que cada persona haga uso de la lengua de su preferencia.",D:"Las informaciones y comunicaciones no personalizadas dirigidas al personal deberán redactarse en las dos lenguas oficiales y se dará prioridad al castellano."}},
  {n:177,texto:"Según el Resumen Ejecutivo del Plan Oncológico Integral de Euskadi (POIE) 2025-2030, ¿de qué porcentaje de los fallecimientos en Euskadi fue responsable el cáncer en el año 2023?",opts:{A:"22,3%.",B:"Menos del 15%.",C:"33,8%.",D:"28%."}},

  {n:179,texto:"¿Cuál de las siguientes es una de las aspiraciones definidas en la VISIÓN del Plan Oncológico Integral de Euskadi (POIE) 2025-2030?",opts:{A:"Mejorar la calidad de vida de las personas: de pacientes, supervivientes y de sus familiares y personas cuidadoras.",B:"Aumentar la cuota de mercado de Osakidetza en el sector oncológico privado.",C:"Garantizar la presencia equilibrada de ambos sexos en los órganos de gestión sanitaria.",D:"Establecer la telemedicina como la única forma de seguimiento oncológico."}},
  {n:180,texto:"La Misión del Plan Oncológico Integral de Euskadi (POIE) 2025-2030 busca generar valor a la ciudadanía vasca en términos de:",opts:{A:"Mayor financiación externa para I+D.",B:"Menores listas de espera y más personal asistencial.",C:"Mejores resultados en salud.",D:"Una mayor supervivencia a los 10 años en todos los tumores."}},
  {n:181,texto:"En el Plan Oncológico Integral de Euskadi (POIE) 2025-2030, la 'Centralidad de la persona y humanización' como Principio Rector incluye la incorporación de la perspectiva de género y la atención a:",opts:{A:"La telemonitorización avanzada.",B:"La diversidad.",C:"El personal profesional no implicado directamente.",D:"Las redes sociales."}},
  {n:182,texto:"Teniendo en cuenta la introducción y el contexto del Plan Oncológico Integral de Euskadi 2025-2030. ¿Cuál fue una de las principales áreas de mejora identificadas en la evaluación del Plan Oncológico de Euskadi (POE) 2018-2023?",opts:{A:"La excesiva visibilidad del plan entre profesionales sin implicación.",B:"La necesidad de aumentar el número de Comités de Tumores.",C:"La necesidad de reforzar la atención a colectivos específicos (infancia, mayores, personas largas supervivientes).",D:"La ausencia total de un modelo asistencial común."}},
  {n:183,texto:"Según el listado de acrónimos del Plan Oncológico Integral de Euskadi (POIE) 2025-2030, ¿a qué hacen referencia las siglas PROMs?",opts:{A:"Plan de Resultados Oncológicos y Metodología de Seguimiento.",B:"Plan de Riesgos Ocupacionales en Medicina Sanitaria.",C:"Programa de Rehabilitación Oncológica y Mejora de la Supervivencia.",D:"Medidas de Resultados Reportadas por los y las Pacientes."}},
  {n:184,texto:"El Plan Oncológico Integral de Euskadi (POIE) 2025-2030 se alinea con el Plan de Salud de Euskadi 2030. ¿Cuál de las siguientes es una de las prioridades estratégicas de dicho Plan de Salud mencionadas en el documento?",opts:{A:"Creación de una red de servicios privados de salud.",B:"Aumentar la esperanza de vida a 90 años.",C:"Reducir la morbimortalidad evitable y disminuir las desigualdades en salud.",D:"Eliminación total del cáncer infantil antes de 2030."}},
  {n:185,texto:"¿Cuál es el objeto fundamental de la Ley Orgánica 3/2021, de 24 de marzo, de regulación de la eutanasia, según su Artículo 1?",opts:{A:"Regular los cuidados paliativos avanzados en el Sistema Nacional de Salud.",B:"Modificar el Código Penal para despenalizar la asistencia al suicidio.",C:"Regular el derecho de toda persona a solicitar y recibir la prestación de ayuda para morir y la obligación de las Administraciones de garantizarla.",D:"Establecer el registro de las voluntades anticipadas y testamentos vitales."}},
  {n:186,texto:"Conforme al Artículo 5 de la Ley Orgánica 3/2021, de 24 de marzo, de regulación de la eutanasia, ¿qué requisito de nacionalidad se exige para poder recibir la prestación de ayuda para morir?",opts:{A:"Tener la ciudadanía española con residencia legal ininterrumpida de al menos 10 años.",B:"Tener la nacionalidad española o tener residencia legal en España de al menos 5 años.",C:"Ser mayor de edad y tener la nacionalidad española, residencia legal o certificado de empadronamiento que acredite un tiempo de permanencia superior a 12 meses en territorio español.",D:"Tener la nacionalidad española y residencia en el mismo municipio durante los últimos 2 años."}},
  {n:187,texto:"Según la Ley Orgánica 3/2021, de 24 de marzo, de regulación de la eutanasia, ¿qué concepto define la ley como la 'administración directa a la persona paciente de una sustancia por parte del personal sanitario competente'?",opts:{A:"Suicidio médicamente asistido.",B:"Sedación paliativa profunda.",C:"Eutanasia.",D:"Asistencia para morir."}},
  {n:188,texto:"Según el Artículo 5 de la Ley Orgánica 3/2021, de 24 de marzo, de regulación de la eutanasia, ¿cuál es la condición que debe padecer la persona paciente para solicitar la prestación de ayuda para morir?",opts:{A:"Padecer una enfermedad incurable en fase terminal o un deterioro funcional grave.",B:"Sufrir una enfermedad que limite gravemente su autonomía.",C:"Padecer una enfermedad grave e incurable o un padecimiento grave, crónico e imposibilitante, causantes de un sufrimiento intolerable.",D:"Sufrir un dolor físico o psíquico que no puede ser tratado con paliativos."}},
  {n:189,texto:"Según la Ley Orgánica 3/2021, de 24 de marzo, de regulación de la eutanasia, ¿cuál debe ser la periodicidad mínima con la que el personal facultativo responsable debe consultar a la persona paciente, una vez presentada la solicitud, para confirmar si mantiene su deseo?",opts:{A:"Al menos cada 7 días.",B:"Al menos cada 15 días, debiendo dejarse constancia en la historia clínica.",C:"Al menos cada 30 días, si el procedimiento se extiende.",D:"Una única vez antes de la prestación."}},
  {n:190,texto:"Según la Ley Orgánica 3/2021, de 24 de marzo, de regulación de la eutanasia, ¿cuál es el derecho que asiste al personal sanitario directamente implicado en la prestación de ayuda para morir?",opts:{A:"Derecho a la reubicación en un puesto de trabajo diferente.",B:"Derecho a un incremento salarial por la complejidad de la prestación.",C:"Derecho a la objeción de conciencia.",D:"Derecho a recibir asistencia jurídica de oficio."}},
  {n:191,texto:"Según la Ley Orgánica 3/2021, de 24 de marzo, de regulación de la eutanasia, ¿qué define como 'padecimiento grave, crónico e imposibilitante'?",opts:{A:"Aquel que implica la existencia de sufrimiento físico o psíquico constante.",B:"Aquel que genera una limitación que incide directamente sobre la autonomía física y capacidad de expresar su voluntad de la persona paciente.",C:"La dependencia de otra persona para la realización de al menos dos actividades básicas de la vida diaria.",D:"Una dolencia que ha sido declarada irreversible y con un pronóstico de vida inferior a seis meses."}},
  {n:192,texto:"Según la Ley Orgánica 3/2021, de 24 de marzo, de regulación de la eutanasia, ¿cuál es el plazo que tiene la persona facultativa responsable para comunicar la resolución favorable a la Comisión de Garantía y Evaluación para su posterior verificación?",opts:{A:"Dentro de las 24 horas siguientes a la resolución.",B:"Dentro del día siguiente natural a la resolución.",C:"7 días desde la resolución favorable.",D:"No existe un plazo establecido para esta comunicación."}},
  {n:193,texto:"¿Cuál es el principio general que establece la Ley 53/1984, de 26 de diciembre, de Incompatibilidades del personal al servicio de las Administraciones Públicas?",opts:{A:"La libre acumulación de empleos públicos.",B:"La incompatibilidad para desempeñar más de un puesto en el sector público, salvo excepciones.",C:"La compatibilidad automática entre empleo público y privado.",D:"La compatibilidad solo en el ámbito sanitario."}},
  {n:194,texto:"Con carácter general, el personal comprendido en la Ley 53/1984, de 26 de diciembre, de Incompatibilidades del personal al servicio de las Administraciones Públicas, podrá desempeñar:",opts:{A:"Dos puestos públicos si uno es a tiempo parcial.",B:"Un segundo puesto público únicamente con autorización previa y en los supuestos previstos por la Ley.",C:"Cualquier actividad privada sin limitación.",D:"Dos puestos públicos si pertenecen a distinta Administración."}},
  {n:195,texto:"Según la Ley 53/1984, de 26 de diciembre, de Incompatibilidades del personal al servicio de las Administraciones Públicas, ¿qué requisito es imprescindible para autorizar la compatibilidad con una actividad privada?",opts:{A:"Que la actividad sea sanitaria.",B:"Que no se supere la jornada ordinaria establecida.",C:"Que no se comprometa la imparcialidad o independencia del personal público.",D:"Que lo autorice la jefatura inmediata sin más trámites."}},
  {n:196,texto:"Según la Ley 53/1984, de 26 de diciembre, de Incompatibilidades del personal al servicio de las Administraciones Públicas, ¿puede percibirse más de una remuneración con cargo a los presupuestos públicos?",opts:{A:"Sí, siempre que no superen el salario mínimo.",B:"No, salvo en los casos expresamente previstos en la Ley.",C:"Sí, sin limitación alguna.",D:"Solo si se trata de diferentes Administraciones autonómicas."}},
  {n:197,texto:"Según la Ley 53/1984, de 26 de diciembre, de Incompatibilidades del personal al servicio de las Administraciones Públicas, ¿qué ocurre si se desempeña una actividad incompatible sin autorización?",opts:{A:"No ocurre nada si es fuera del horario laboral.",B:"Se considera falta leve.",C:"Puede dar lugar a responsabilidad disciplinaria.",D:"Solo se devuelve la remuneración percibida."}},
  {n:198,texto:"Según la Ley 53/1984, de 26 de diciembre, de Incompatibilidades del personal al servicio de las Administraciones Públicas, ¿qué actividades están exceptuadas del régimen general de incompatibilidades?",opts:{A:"Las actividades docentes o de investigación en determinados supuestos.",B:"Cualquier actividad privada.",C:"Solo actividades artísticas.",D:"Actividades comerciales propias sin límite."}},
  {n:199,texto:"Según la Ley 53/1984, de 26 de diciembre, de Incompatibilidades del personal al servicio de las Administraciones Públicas, para que se autorice la compatibilidad para un segundo puesto público es necesario que:",opts:{A:"Sea en el mismo centro de trabajo.",B:"Sea la jornada completa.",C:"Sea en los supuestos tasados y no se modifique la jornada y horario del puesto principal.",D:"Lo apruebe el personal trabajador del servicio."}},
  {n:200,texto:"La finalidad principal de la Ley 53/1984, de 26 de diciembre, de Incompatibilidades del personal al servicio de las Administraciones Públicas, es:",opts:{A:"Incrementar los ingresos del personal público.",B:"Garantizar la dedicación y la imparcialidad en el servicio público.",C:"Permitir la pluriactividad generalizada.",D:"Reducir el número de personal público."}}
];

let estado={},orden=PREGUNTAS.map(p=>p.n),modoFallos=false;
function cargarEstado(){try{const r=localStorage.getItem(STORAGE_KEY);if(r)estado=JSON.parse(r);}catch(e){estado={};}}
function guardarEstado(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(estado));}catch(e){}}
function calcularStats(){let ok=0,fail=0;PREGUNTAS.forEach(p=>{if(estado[p.n]){if(estado[p.n].correcto)ok++;else fail++;}});return{ok,fail,total:PREGUNTAS.length};}
function actualizarHeader(){const s=calcularStats();const r=s.ok+s.fail;document.getElementById('barraFill').style.width=(r/s.total*100)+'%';document.getElementById('progresoTexto').textContent=r+' / '+s.total;document.getElementById('statOk').textContent=s.ok+' correctas';document.getElementById('statFail').textContent=s.fail+' incorrectas';}
function renderizar(){
  const c=document.getElementById('contenedor');c.innerHTML='';
  const s=calcularStats();
  if(s.ok+s.fail===s.total&&!modoFallos){const pct=Math.round(s.ok/s.total*100);const b=document.createElement('div');b.className='banner-completado';b.innerHTML=`<h2>🎉 ¡Batería completa!</h2><div class="puntuacion">${s.ok}/${s.total}</div><p>${pct}% de acierto · Preguntas 151–200 · ¡Has terminado las 200 preguntas!</p>`;c.appendChild(b);}
  const pm=modoFallos?PREGUNTAS.filter(p=>estado[p.n]&&!estado[p.n].correcto):orden.map(n=>PREGUNTAS.find(p=>p.n===n));
  if(modoFallos&&pm.length===0){c.innerHTML+='<div style="text-align:center;padding:40px;color:var(--gris);font-family:Syne,sans-serif;">¡No hay preguntas falladas! 🎯</div>';return;}
  pm.forEach(pregunta=>{
    if(!pregunta)return;
    const resp=RESPUESTAS[pregunta.n];const est=estado[pregunta.n];const resuelta=!!est;
    const card=document.createElement('div');card.className='pregunta-card'+(resuelta?(' resuelta'+(est.correcto?'':' fallo')):'');card.id='p'+pregunta.n;
    let html=`<div class="pregunta-num">Pregunta ${pregunta.n}</div><div class="pregunta-texto">${pregunta.n}.- ${pregunta.texto}</div><div class="opciones">`;
    Object.entries(pregunta.opts).forEach(([letra,texto])=>{
      let cls='opcion-btn';let disabled=resuelta?'disabled':'';
      if(resuelta){if(letra===resp){cls+=est.elegida===letra?' correcta':' correcta-marcada';}else if(letra===est.elegida&&!est.correcto){cls+=' incorrecta';}}
      html+=`<button class="${cls}" ${disabled} onclick="responder(${pregunta.n},'${letra}')"><span class="letra">${letra})</span>${texto}</button>`;
    });
    html+=`</div>`;
    if(resuelta){html+=est.correcto?`<div class="resultado-badge badge-ok">✓ Correcto</div>`:`<div class="resultado-badge badge-error">✗ Incorrecto — Respuesta: ${resp}</div>`;}
    if(resp==='NULA'){html+=`<div class="pregunta-nula">⚠ Esta pregunta fue declarada NULA en el cuadro de respuestas oficial.</div>`;}
    card.innerHTML=html;c.appendChild(card);
  });
}
function responder(num,letra){if(estado[num])return;const resp=RESPUESTAS[num];estado[num]={elegida:letra,correcto:letra===resp};guardarEstado();actualizarHeader();renderizar();setTimeout(()=>{const el=document.getElementById('p'+num);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});},100);}
function resetearTodo(){if(!confirm('¿Seguro que quieres reiniciar todo el progreso de este lote?'))return;estado={};guardarEstado();modoFallos=false;orden=PREGUNTAS.map(p=>p.n);actualizarHeader();renderizar();}
function mostrarSoloFallos(){modoFallos=!modoFallos;renderizar();}
function ordenAleatorio(){modoFallos=false;orden=[...PREGUNTAS.map(p=>p.n)].sort(()=>Math.random()-0.5);renderizar();window.scrollTo({top:0,behavior:'smooth'});}
cargarEstado();actualizarHeader();renderizar();
</script>
